<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drink Decision at Different Prices</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #ffffff; }

    @keyframes priceChange {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    @keyframes pricePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
      50% { box-shadow: 0 0 20px 10px rgba(59, 130, 246, 0.3); }
    }

    .price-highlight {
      animation: priceChange 0.5s ease-out, pricePulse 1.5s ease-in-out infinite;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .slide-in {
      animation: slideIn 0.4s ease-out;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .fade-out {
      animation: fadeOut 0.3s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // =============== QUALTRICS COMMUNICATION ===============
    let participantId = null;
    let gameId = null;

    window.addEventListener('message', function(event) {
      if (event.data.type === 'INIT') {
        console.log('Received INIT from Qualtrics:', event.data);
        participantId = event.data.participantId;
        gameId = event.data.gameId;

        if (event.data.gameConfig) {
          const qConfig = event.data.gameConfig;
          if (qConfig.id) CONFIG.id = qConfig.id;
          if (qConfig.playerName0) CONFIG.playerName0 = qConfig.playerName0;
          if (qConfig.playerName1) CONFIG.playerName1 = qConfig.playerName1;
          if (qConfig.playerName2Pos) CONFIG.playerName2Pos = qConfig.playerName2Pos;
          if (qConfig.playerName2Neg) CONFIG.playerName2Neg = qConfig.playerName2Neg;
          if (qConfig.playerIcon0) CONFIG.playerIcon0 = qConfig.playerIcon0;
          if (qConfig.currency) CONFIG.currency = qConfig.currency;
          if (qConfig.prices) CONFIG.prices = qConfig.prices;
          if (qConfig.priceOrder) CONFIG.priceOrder = qConfig.priceOrder;
          if (qConfig.randomizePrices !== undefined) CONFIG.randomizePrices = qConfig.randomizePrices;
          console.log('Applied config:', CONFIG);
        }

        markInitialized();
        sendDataToQualtrics('PRICE_ELICIT_START', { started: true });
      }
    });

    function sendDataToQualtrics(dataType, data) {
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'GAME_DATA',
          gameId: gameId,
          dataType: dataType,
          data: data,
          participantId: participantId,
          timestamp: new Date().toISOString()
        }, '*');
      }
      console.log('Sent to Qualtrics:', dataType, data);
    }

    let isInitialized = false;
    let initCallbacks = [];

    function onInitialized(callback) {
      if (isInitialized) callback();
      else initCallbacks.push(callback);
    }

    function markInitialized() {
      isInitialized = true;
      initCallbacks.forEach(cb => cb());
      initCallbacks = [];
    }

    // Configuration
    const CONFIG = {
      id: 1,
      playerName0: 'Driftwell',
      playerName1: 'Qivaryn',
      playerName2Pos: 'high energy',
      playerName2Neg: 'low energy',
      playerIcon0: '🥤',
      currency: '$',
      // Default prices to elicit (can be overwritten by Qualtrics)
      prices: [0.00, 0.25, 0.50, 0.75, 1.00, 1.25, 1.50, 1.75, 2.00],
      priceOrder: null,  // Will be set based on randomizePrices
      randomizePrices: true  // Whether to randomize price order
    };

    // Shuffle array helper
    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }
  </script>

  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

    // Intro Page Component
    function IntroPage({ onContinue, playerName0, playerName1, playerName2Pos, playerName2Neg, currency, numPrices }) {
      return (
        <div className="min-h-screen bg-white px-4 pt-0 pb-4">
          <div className="max-w-3xl mx-auto">
            <div className="bg-white rounded-xl shadow-lg p-8">
              <div className="text-center mb-6">
                <div className="text-5xl mb-4">{CONFIG.playerIcon0}</div>
                <h1 className="text-2xl font-bold text-gray-800">Your Drink Decisions</h1>
              </div>

              <div className="text-gray-700 space-y-4 mb-6">
                <p>
                  In this part, we want to understand your decision to drink <strong>{playerName0}</strong> at different prices.
                </p>

                <p>
                  You will see <strong>{numPrices} different prices</strong> for {playerName0}. For each price, please indicate whether you would choose to <strong>drink</strong> or <strong>skip</strong>.
                </p>

                <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                  <p className="text-blue-800">
                    <strong>Important:</strong> The price of {playerName0} will change each time. Pay attention to the price displayed before making your decision.
                  </p>
                </div>

                <p>
                  After you make each decision, you will move to the next price. You will <strong>not</strong> see the outcome ({playerName1} level or energy) for these decisions.
                </p>

                <p>
                  One of your decisions may be randomly selected to count for your bonus payment, so please answer each question as if it were the one that counts.
                </p>
              </div>

              <button
                onClick={onContinue}
                className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors"
              >
                I understand, let's begin
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Price Display Component - Makes price very salient
    function PriceDisplay({ price, currency, isNew }) {
      return (
        <div className={`bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl p-6 text-center shadow-lg ${isNew ? 'price-highlight' : ''}`}>
          <div className="text-blue-100 text-sm font-medium mb-1">CURRENT PRICE</div>
          <div className="text-white text-6xl font-bold">
            {currency}{price.toFixed(2)}
          </div>
          <div className="text-blue-200 text-sm mt-2">Cost to drink {CONFIG.playerName0}</div>
        </div>
      );
    }

    // Decision Panel Component
    function DecisionPanel({ price, currency, onChoice, disabled, playerName0, playerIcon0 }) {
      return (
        <div className="bg-white rounded-xl p-6 border border-gray-200 shadow-sm">
          <h4 className="text-gray-500 text-sm font-medium mb-4 text-center">
            At this price, would you drink {playerName0}?
          </h4>
          <div className="flex justify-center gap-4">
            <button
              onClick={() => onChoice(1)}
              disabled={disabled}
              className={`w-40 h-24 px-6 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-3 ${
                disabled
                  ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                  : 'bg-green-600 hover:bg-green-500 text-white shadow-lg hover:shadow-xl hover:scale-105 cursor-pointer'
              }`}
            >
              <span className="text-3xl">{playerIcon0}</span>
              <div className="text-left">
                <div className="text-lg">Drink</div>
                <div className="text-sm opacity-80">-{currency}{price.toFixed(2)}</div>
              </div>
            </button>
            <button
              onClick={() => onChoice(0)}
              disabled={disabled}
              className={`w-40 h-24 px-6 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-3 ${
                disabled
                  ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                  : 'bg-red-600 hover:bg-red-500 text-white shadow-lg hover:shadow-xl hover:scale-105 cursor-pointer'
              }`}
            >
              <span className="text-3xl">⊘</span>
              <div className="text-left">
                <div className="text-lg">Skip</div>
                <div className="text-sm opacity-80">{currency}0.00</div>
              </div>
            </button>
          </div>
        </div>
      );
    }

    // Progress Bar Component
    function ProgressBar({ current, total }) {
      const percentage = (current / total) * 100;
      return (
        <div className="mb-6">
          <div className="flex justify-between text-sm text-gray-600 mb-2">
            <span>Price {current} of {total}</span>
            <span>{Math.round(percentage)}% complete</span>
          </div>
          <div className="h-3 bg-gray-200 rounded-full overflow-hidden">
            <div
              className="h-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-500"
              style={{ width: `${percentage}%` }}
            />
          </div>
        </div>
      );
    }

    // Decision History Component
    function DecisionHistory({ decisions, prices, currency }) {
      if (decisions.length === 0) return null;

      return (
        <div className="bg-white rounded-xl p-4 border border-gray-200 shadow-sm mt-4">
          <h4 className="text-gray-500 text-sm font-medium mb-3">Your Decisions</h4>
          <div className="space-y-2 max-h-48 overflow-y-auto">
            {decisions.map((decision, idx) => (
              <div
                key={idx}
                className={`flex items-center justify-between px-3 py-2 rounded-lg text-sm ${
                  decision.choice === 1 ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'
                }`}
              >
                <span className="text-gray-600">
                  {currency}{decision.price.toFixed(2)}
                </span>
                <span className={`font-medium ${decision.choice === 1 ? 'text-green-600' : 'text-red-600'}`}>
                  {decision.choice === 1 ? `${CONFIG.playerIcon0} Drink` : '⊘ Skip'}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Transition Overlay
    function TransitionOverlay({ show, nextPrice, currency }) {
      if (!show) return null;

      return (
        <div className="fixed inset-0 bg-white/95 flex items-center justify-center z-50">
          <div className="text-center slide-in">
            <div className="text-gray-500 text-lg mb-2">Next Price</div>
            <div className="text-blue-600 text-7xl font-bold mb-4">
              {currency}{nextPrice.toFixed(2)}
            </div>
            <div className="text-gray-400">Get ready...</div>
          </div>
        </div>
      );
    }

    // Main App Component
    function PriceElicitationApp() {
      const [ready, setReady] = useState(false);
      const [showIntro, setShowIntro] = useState(true);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [decisions, setDecisions] = useState([]);
      const [completed, setCompleted] = useState(false);
      const [priceOrder, setPriceOrder] = useState([]);
      const [showTransition, setShowTransition] = useState(false);
      const [isNewPrice, setIsNewPrice] = useState(true);
      const [disabled, setDisabled] = useState(false);

      const roundTimesRef = useRef([]);
      const roundStartTimeRef = useRef(Date.now());
      const dataSentRef = useRef(false);

      // Initialize price order
      useEffect(() => {
        const timeout = setTimeout(() => {
          if (!ready) {
            console.log('Timeout: starting with default config');
            initializePrices();
            setReady(true);
          }
        }, 3000);

        onInitialized(() => {
          clearTimeout(timeout);
          initializePrices();
          setReady(true);
        });

        return () => clearTimeout(timeout);
      }, []);

      const initializePrices = () => {
        let order;
        if (CONFIG.priceOrder && CONFIG.priceOrder.length > 0) {
          order = CONFIG.priceOrder;
        } else if (CONFIG.randomizePrices) {
          order = shuffleArray(CONFIG.prices);
        } else {
          order = [...CONFIG.prices];
        }
        setPriceOrder(order);
        console.log('Price order:', order);
      };

      // Reset isNewPrice animation after it plays
      useEffect(() => {
        if (isNewPrice) {
          const timer = setTimeout(() => setIsNewPrice(false), 1500);
          return () => clearTimeout(timer);
        }
      }, [isNewPrice, currentIndex]);

      const handleChoice = useCallback((choice) => {
        const currentPrice = priceOrder[currentIndex];
        const responseTime = (Date.now() - roundStartTimeRef.current) / 1000;
        roundTimesRef.current.push(responseTime);

        const newDecision = {
          price: currentPrice,
          choice: choice,
          responseTime: responseTime,
          order: currentIndex + 1
        };

        const newDecisions = [...decisions, newDecision];
        setDecisions(newDecisions);
        setDisabled(true);

        // Send individual decision to Qualtrics
        sendDataToQualtrics('PRICE_DECISION', {
          ...newDecision,
          totalPrices: priceOrder.length
        });

        if (currentIndex < priceOrder.length - 1) {
          // Show transition to next price
          setShowTransition(true);

          setTimeout(() => {
            setShowTransition(false);
            setCurrentIndex(prev => prev + 1);
            setIsNewPrice(true);
            setDisabled(false);
            roundStartTimeRef.current = Date.now();
          }, 1200);
        } else {
          // All done
          setTimeout(() => {
            setCompleted(true);
          }, 500);
        }
      }, [currentIndex, decisions, priceOrder]);

      // Send final data when complete
      useEffect(() => {
        if (completed && !dataSentRef.current) {
          dataSentRef.current = true;

          // Sort decisions by price for analysis
          const sortedByPrice = [...decisions].sort((a, b) => a.price - b.price);

          // Find switching point (highest price where they still drink)
          const drinkDecisions = sortedByPrice.filter(d => d.choice === 1);
          const maxPriceDrink = drinkDecisions.length > 0
            ? Math.max(...drinkDecisions.map(d => d.price))
            : null;

          sendDataToQualtrics('PRICE_ELICIT_FINAL', {
            id: CONFIG.id,
            decisions: decisions,
            priceOrder: priceOrder,
            sortedByPrice: sortedByPrice,
            maxPriceDrink: maxPriceDrink,
            responseTimes: roundTimesRef.current,
            totalDrink: decisions.filter(d => d.choice === 1).length,
            totalSkip: decisions.filter(d => d.choice === 0).length
          });

          setTimeout(() => {
            sendDataToQualtrics('PRICE_ELICIT_COMPLETE', { completed: true, id: CONFIG.id });
          }, 500);
        }
      }, [completed, decisions, priceOrder]);

      if (!ready || priceOrder.length === 0) {
        return (
          <div className="min-h-screen bg-white flex items-center justify-center">
            <div className="text-gray-600 text-xl">Loading...</div>
          </div>
        );
      }

      if (showIntro) {
        return (
          <IntroPage
            onContinue={() => {
              setShowIntro(false);
              roundStartTimeRef.current = Date.now();
            }}
            playerName0={CONFIG.playerName0}
            playerName1={CONFIG.playerName1}
            playerName2Pos={CONFIG.playerName2Pos}
            playerName2Neg={CONFIG.playerName2Neg}
            currency={CONFIG.currency}
            numPrices={priceOrder.length}
          />
        );
      }

      if (completed) {
        const totalDrink = decisions.filter(d => d.choice === 1).length;
        return (
          <div className="min-h-screen bg-white flex items-center justify-center p-4">
            <div className="bg-white rounded-xl shadow-lg p-8 max-w-md text-center">
              <div className="text-5xl mb-4">✅</div>
              <h2 className="text-2xl font-bold text-gray-800 mb-2">All Done!</h2>
              <p className="text-gray-600 mb-4">
                Thank you for completing all {priceOrder.length} price decisions.
              </p>
              <div className="bg-gray-50 rounded-lg p-4 text-sm text-gray-600">
                <p>You chose to drink at <strong>{totalDrink}</strong> out of <strong>{priceOrder.length}</strong> prices.</p>
              </div>
            </div>
          </div>
        );
      }

      const currentPrice = priceOrder[currentIndex];

      return (
        <div className="min-h-screen bg-white px-4 pt-0 pb-4">
          <TransitionOverlay
            show={showTransition}
            nextPrice={priceOrder[currentIndex + 1] || 0}
            currency={CONFIG.currency}
          />

          <div className="max-w-2xl mx-auto">
            <ProgressBar current={currentIndex + 1} total={priceOrder.length} />

            <div className="slide-in" key={currentIndex}>
              <PriceDisplay
                price={currentPrice}
                currency={CONFIG.currency}
                isNew={isNewPrice}
              />

              <div className="mt-6">
                <DecisionPanel
                  price={currentPrice}
                  currency={CONFIG.currency}
                  onChoice={handleChoice}
                  disabled={disabled}
                  playerName0={CONFIG.playerName0}
                  playerIcon0={CONFIG.playerIcon0}
                />
              </div>
            </div>

            <DecisionHistory
              decisions={decisions}
              prices={priceOrder}
              currency={CONFIG.currency}
            />
          </div>
        </div>
      );
    }

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<PriceElicitationApp />);
  </script>
</body>
</html>
