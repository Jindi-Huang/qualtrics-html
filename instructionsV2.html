<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instructions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="shared-icons.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #ffffff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // =============== QUALTRICS COMMUNICATION ===============
    let participantId = null;
    let gameId = null;
    let configReceived = false;

    window.addEventListener('message', function(event) {
      if (event.data.type === 'INIT') {
        console.log('Received INIT from Qualtrics:', event.data);
        configReceived = true;
        participantId = event.data.participantId;
        gameId = event.data.gameId;

        if (event.data.gameConfig) {
          const qConfig = event.data.gameConfig;
          if (qConfig.supergame) CONFIG.supergame = qConfig.supergame;
          if (qConfig.experiment !== undefined) CONFIG.experiment = qConfig.experiment;
          if (qConfig.currency) CONFIG.currency = qConfig.currency;
          if (qConfig.basePay !== undefined) CONFIG.basePay = qConfig.basePay;
          if (qConfig.aCost !== undefined) CONFIG.aCost = qConfig.aCost;
          if (qConfig.aCostMigraines0 !== undefined) CONFIG.aCostMigraines0 = qConfig.aCostMigraines0;
          if (qConfig.aCostMigraines1 !== undefined) CONFIG.aCostMigraines1 = qConfig.aCostMigraines1;
          if (qConfig.yBonus !== undefined) CONFIG.yBonus = qConfig.yBonus;
          if (qConfig.nRounds !== undefined) CONFIG.nRounds = qConfig.nRounds;
          if (qConfig.playerName0) CONFIG.playerName0 = qConfig.playerName0;
          if (qConfig.playerName1) CONFIG.playerName1 = qConfig.playerName1;
          if (qConfig.playerIcon0) CONFIG.playerIcon0 = qConfig.playerIcon0;
          // 3 drink-chemical pairs with colors
          if (qConfig.playerName0_1) CONFIG.playerName0_1 = qConfig.playerName0_1;
          if (qConfig.playerName1_1) CONFIG.playerName1_1 = qConfig.playerName1_1;
          if (qConfig.color_1) CONFIG.color_1 = qConfig.color_1;
          if (qConfig.playerIcon0_1) CONFIG.playerIcon0_1 = qConfig.playerIcon0_1;
          if (qConfig.playerName0_2) CONFIG.playerName0_2 = qConfig.playerName0_2;
          if (qConfig.playerName1_2) CONFIG.playerName1_2 = qConfig.playerName1_2;
          if (qConfig.color_2) CONFIG.color_2 = qConfig.color_2;
          if (qConfig.playerIcon0_2) CONFIG.playerIcon0_2 = qConfig.playerIcon0_2;
          if (qConfig.playerName0_3) CONFIG.playerName0_3 = qConfig.playerName0_3;
          if (qConfig.playerName1_3) CONFIG.playerName1_3 = qConfig.playerName1_3;
          if (qConfig.color_3) CONFIG.color_3 = qConfig.color_3;
          if (qConfig.playerIcon0_3) CONFIG.playerIcon0_3 = qConfig.playerIcon0_3;
          // Migraines example labels — "might make you more {playerName2Neg_n}"
          if (qConfig.playerName2Neg_1) CONFIG.playerName2Neg_1 = qConfig.playerName2Neg_1;
          if (qConfig.playerName2Neg_2) CONFIG.playerName2Neg_2 = qConfig.playerName2Neg_2;
          console.log('Applied config:', CONFIG);
        }

        markInitialized();
      }
    });

    if (window.parent !== window) {
      window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
    }

    function sendDataToQualtrics(dataType, data) {
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'GAME_DATA',
          gameId: gameId,
          dataType: dataType,
          data: data,
          participantId: participantId,
          configReceived: configReceived,
          timestamp: new Date().toISOString()
        }, '*');
      }
      console.log('Sent to Qualtrics:', dataType, data);
    }

    let isInitialized = false;
    let initCallbacks = [];

    function onInitialized(callback) {
      if (isInitialized) callback();
      else initCallbacks.push(callback);
    }

    function markInitialized() {
      isInitialized = true;
      initCallbacks.forEach(cb => cb());
      initCallbacks = [];
    }

    // =============== CONFIG ===============
    // supergame: 'dieter' → mirrors dieterInstructionsV3.html
    //            'migraines' → mirrors counfoundedChoiceInstructionsV2.html
    const CONFIG = {
      supergame: 'dieter',
      experiment: 'EndogDieterRO',  // 'EndogDieterRO' triggers Y-before-X reveal order for dieter
      currency: '$',
      basePay: 2.00,
      aCost: 0.00,
      aCostMigraines0: 1.00,   // cost when not craving (positive)
      aCostMigraines1: -1.00,  // signed payoff when craving (stored negative; displayed via |value|)
      yBonus: 2.00,
      nRounds: 10,
      playerName0: 'Qivex-norm',
      playerName1: 'Qivex',
      playerIcon0: '',
      // 3 drink-chemical pairs with colors
      playerName0_1: 'Qivex-norm',
      playerName1_1: 'Qivex',
      color_1: 'purple',
      playerIcon0_1: '🥤',
      playerName0_2: 'Zerqalase-norm',
      playerName1_2: 'Zerqalase',
      color_2: 'blue',
      playerIcon0_2: '🍵',
      playerName0_3: 'Melythor-norm',
      playerName1_3: 'Melythor',
      color_3: 'teal',
      playerIcon0_3: '🍶',
      // Migraines per-drink "negative effect" labels (rendered as "might make you more X")
      playerName2Neg_1: 'tired',
      playerName2Neg_2: 'foggy'
    };

    // Allow URL override for standalone testing: ?supergame=migraines or ?supergame=dieter, ?experiment=EndogDieterRO
    try {
      const urlSupergame = new URLSearchParams(window.location.search).get('supergame');
      if (urlSupergame === 'migraines' || urlSupergame === 'dieter') CONFIG.supergame = urlSupergame;
      const urlExperiment = new URLSearchParams(window.location.search).get('experiment');
      if (urlExperiment) CONFIG.experiment = urlExperiment;
    } catch (e) {}

    // Note: getThemeIconColor() is loaded from shared-icons.js

    // Examples shown on page 1
    function getExamples() {
      if (CONFIG.supergame === 'migraines') {
        return [
          { drink: CONFIG.playerName0_1, chemical: CONFIG.playerName1_1, color: CONFIG.color_1, icon: CONFIG.playerIcon0_1, effect: `might make you more ${CONFIG.playerName2Neg_1}` },
          { drink: CONFIG.playerName0_2, chemical: CONFIG.playerName1_2, color: CONFIG.color_2, icon: CONFIG.playerIcon0_2, effect: `might make you more ${CONFIG.playerName2Neg_2}` }
        ];
      }
      return [
        { drink: CONFIG.playerName0_1, chemical: CONFIG.playerName1_1, color: CONFIG.color_1, icon: CONFIG.playerIcon0_1 },
        { drink: CONFIG.playerName0_2, chemical: CONFIG.playerName1_2, color: CONFIG.color_2, icon: CONFIG.playerIcon0_2 },
        { drink: CONFIG.playerName0_3, chemical: CONFIG.playerName1_3, color: CONFIG.color_3, icon: CONFIG.playerIcon0_3 }
      ];
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // =============== ICONS ===============

        </svg>
      );
    }

    function HappyFaceIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="currentColor">

    function SadFaceIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 1960040 1960040" xmlns="http://www.w3.org/2000/svg" fill="currentColor">

      return (

    // BioClip device icon (used inline in the dieter Payment page)
    function BioClipIcon({ className }) {
      return (
        <svg viewBox="0 0 120 160" className={className} xmlns="http://www.w3.org/2000/svg">

        </svg>
      );
    }

    // BioClip mini (used on the dieter "What Happens Each Week" + BioClip Trial pages)
    // status: 1 = normal, 0 = abnormal, null = reading, 'expired' = subscription expired
    function BioClipMini({ status }) {
      const isExpired = status === 'expired';

      const getStatusColor = () => {
        if (isExpired) return '#475569';
        if (status === null) return '#64748b';
        return status === 1 ? '#22c55e' : '#ef4444';
      };

      const getStatusBg = () => {
        if (isExpired) return '#1e293b';
        if (status === null) return '#1e293b';
        return status === 1 ? '#14532d' : '#7f1d1d';
      };

      return (
        <svg viewBox="0 0 120 160" className="w-24 h-32">
          <rect x="10" y="10" width="100" height="140" rx="12" fill="#0f172a" stroke="#334155" strokeWidth="2" />
          <rect x="18" y="20" width="84" height="100" rx="6" fill="#1e293b" />
          <rect x="22" y="24" width="76" height="92" rx="4" fill={getStatusBg()} />
          <circle cx="60" cy="55" r="24" fill={getStatusColor()} />
          {status === 1 && (
            <path d="M48 55 L56 63 L72 47" stroke="white" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round" />
          )}
          {status === 0 && (
            <g stroke="white" strokeWidth="4" strokeLinecap="round">
              <line x1="50" y1="45" x2="70" y2="65" />
              <line x1="70" y1="45" x2="50" y2="65" />
            </g>
          )}
          {isExpired ? (
            <text x="60" y="93" textAnchor="middle" fill="#94a3b8" fontSize="9" fontWeight="bold">
              <tspan x="60" dy="0">SUBSCRIPTION</tspan>
              <tspan x="60" dy="12">EXPIRED</tspan>
            </text>
          ) : (
            <text x="60" y="100" textAnchor="middle" fill={status === null ? '#64748b' : 'white'} fontSize="11" fontWeight="bold">
              {status === null ? 'READING...' : status === 1 ? 'NORMAL' : 'ABNORMAL'}
            </text>
          )}
          <rect x="30" y="126" width="60" height="18" rx="4" fill="#334155" />
          <text x="60" y="139" textAnchor="middle" fill="#94a3b8" fontSize="10" fontFamily="monospace">BioClip™</text>
          <path d="M0 50 L10 50 L10 110 L0 110 C-4 110 -6 105 -6 100 L-6 60 C-6 55 -4 50 0 50 Z" fill="#475569" />
        </svg>
      );
    }

    // Mood indicator mini
    function MoodMini({ mood }) {
      return (
        <div className={`w-20 h-20 rounded-full flex items-center justify-center transition-all duration-500 ${
          mood === null ? 'bg-gray-200' : mood === 1 ? 'bg-gradient-to-br from-emerald-400 to-green-600' : 'bg-gradient-to-br from-rose-400 to-red-600'
        }`}>
          {mood === null ? (
            <NeutralFaceIcon className="w-10 h-10 text-gray-400" />
          ) : mood === 1 ? (
            <HappyFaceIcon className="w-10 h-10 text-white" />
          ) : (
            <SadFaceIcon className="w-10 h-10 text-white" />
          )}
        </div>
      );
    }

    // Speech-bubble Morning icon (used by migraines page 2)
    function MorningIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">

        </svg>
      );
    }

    // Drink/Skip mini buttons — colors flip by supergame
    function DrinkButtonMini({ name, type }) {
      const isSkip = type === 'skip';
      const isMig = CONFIG.supergame === 'migraines';
      // Dieter: Drink=green, Skip=red. Migraines: Drink=red, Skip=green.
      const drinkColor = isMig ? 'red' : 'green';
      const skipColor  = isMig ? 'green' : 'red';
      const color = isSkip ? skipColor : drinkColor;
      const bgClass = `bg-${color}-500 border-${color}-600 border-b-${color}-700`;
      return (
        <div className={`w-20 py-3 rounded-xl flex flex-col items-center justify-center gap-1 border-2 shadow-md ${bgClass}`}>
          {isSkip ? (
            <SkipIcon className="w-5 h-5 text-white" />
          ) : (
            <DrinkIcon className="w-5 h-5 text-white" />
          )}
          <span className="text-sm font-bold text-white">{name}</span>
        </div>
      );
    }

    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // =============== INSTRUCTIONS APP ===============
    function Instructions() {
      const isMig = CONFIG.supergame === 'migraines';
      const isEndogDieterRO = !isMig && CONFIG.experiment === 'EndogDieterRO';

      const [ready, setReady] = useState(false);
      const [currentPage, setCurrentPage] = useState(0);
      const [attentionCheck, setAttentionCheck] = useState(0);
      const [comprehension, setComprehension] = useState({});
      const [wrongCountQ1, setWrongCountQ1] = useState(0);

                    <ul className="list-disc list-inside space-y-1 text-gray-500">
                      <li>If you have a craving, you <b>get {CONFIG.currency}{Math.abs(CONFIG.aCostMigraines1).toFixed(2)}</b> for consuming the drink (added to your baseline bonus).</li>
                      <li>If you don't have a craving, you <b>pay {CONFIG.currency}{CONFIG.aCostMigraines0.toFixed(2)}</b> for consuming the drink (deducted from your baseline bonus).</li>
                      <li>If you don't consume the drink, no money will be added or deducted.</li>
                    </ul>
                  </div>
                </div>
              ) : (
                <div className="flex items-center gap-3 bg-gray-100 rounded-lg p-3">
                  <DrinkIcon className="w-6 h-6 text-blue-600 flex-shrink-0" />
                  <div>
                    <div className="text-gray-900 font-medium">Drink Cost</div>
                    <div className="text-gray-500">If you consume the drink, you pay {CONFIG.currency}{CONFIG.aCost.toFixed(2)} for it (deducted from your baseline bonus).</div>
                  </div>
                </div>
              )}

              <div className="flex items-center gap-3 bg-gray-100 rounded-lg p-3">
                <HappyFaceIcon className="w-6 h-6 text-green-600 flex-shrink-0" />
                <div>
                  <div className="text-gray-900 font-medium">Feeling Good Bonus</div>
                  <div className="text-gray-500">If you feel good {isEndogDieterRO ? 'shortly after' : 'at the end of the day'}, you receive an additional <b>{CONFIG.currency}{CONFIG.yBonus.toFixed(2)} bonus</b>, if you feel bad, you don't.</div>
                </div>
              </div>

              {!isMig && (
                <div className="flex items-center gap-3 bg-gray-100 rounded-lg p-3">
                  <BioClipIcon className="w-6 h-8 flex-shrink-0" />
                  <div>
                    <div className="text-gray-900 font-medium">BioClip Reading</div>
                    <div className="text-gray-500">The BioClip's reading of your blood chemicals does not directly affect your payment.</div>
                  </div>
                </div>
              )}
            </div>

            <p className="text-gray-600 mt-4">
              <b>For each of the {isMig ? 'two' : 'three'} drinks in this survey{isMig ? '' : ' and the blood chemical they target'}, you will make decisions in {CONFIG.nRounds} rounds.</b> This may sound like a lot, but because each round only takes a few seconds, this is quite manageable.
            </p>
            <p className="text-gray-600 mt-2">
              You will make some additional decisions related to each drink. <b>Your bonus payment will be determined by a single decision from the entire survey,</b> randomly selected at the end.
            </p>
          </div>
        </section>
      );

      // Comprehension page (no page badge)
      const renderItem = (item, qNum) => (
        <label key={item.id} className="flex items-start gap-3 cursor-pointer group">
          <input
            type="checkbox"
            checked={!!comprehension[item.id]}
            onChange={() => setComprehension(prev => ({ ...prev, [item.id]: !prev[item.id] }))}
            className="mt-1 w-5 h-5 rounded border-gray-300 bg-white text-blue-600 cursor-pointer flex-shrink-0"
          />
          <span className="text-gray-600 group-hover:text-gray-900 transition-colors">
            {item.underline ? (<>{item.text}<span className="underline">{item.underline}</span>{item.after}</>) : item.text}
          </span>
        </label>
      );

      const comprehensionSection = (
        <section>
          <div className="bg-gray-50 rounded-xl p-4">
            <p className="text-gray-900 font-bold mb-4">
              Which of the following statements about your payment are correct? <span className="font-normal text-gray-600">Select all that apply.</span>
            </p>
            <div className="space-y-3">
              {q1Items.map(item => renderItem(item, 1))}
            </div>
            {q1Error && <p className="text-red-600 mt-3 font-medium">{q1Error}</p>}
          </div>

          <div className="bg-gray-50 rounded-xl p-4 mt-6">
            <p className="text-gray-900 font-bold mb-4">
              Which of the following statements about the study are correct? <span className="font-normal text-gray-600">Select all that apply.</span>
            </p>
            <div className="space-y-3">
              {q2Items.map(item => renderItem(item, 2))}
            </div>
            {q2Error && <p className="text-red-600 mt-3 font-medium">{q2Error}</p>}
          </div>
        </section>
      );

      // ====== Compose page array dynamically ======
      // Dieter: include the "BioClip data for one drink" page only for EndogDieterBinary; renumber the rest accordingly.
      const dieterPages = (() => {
        const arr = [setupSection, eachWeekSection];
        let n = 3;
        if (CONFIG.experiment === 'EndogDieterBinary') arr.push(bioClipTrialSection(n++));
        arr.push(whatYouKnowSection(n++));
        arr.push(twoPossibilitiesSection(n++));
        arr.push(noteSection(n++));
        arr.push(paymentSection(n++));
        arr.push(comprehensionSection);
        return arr;
      })();
      const pages = isMig
        ? [setupSection, eachWeekSection, paymentSection(3), twoPossibilitiesSection(4), noteSection(5), comprehensionSection]
        : dieterPages;

      const instructionCount = pages.length - 1; // last entry is comprehension
      const isLastPage = currentPage === pages.length - 1;
      const isOnComprehension = currentPage === instructionCount;

      return (
        <div className="min-h-screen bg-white px-4 pt-0 pb-4">
          <div className="max-w-5xl mx-auto">
            <div className="bg-white rounded-2xl px-6 pb-6 pt-2">
              <h1 className="text-3xl font-bold text-gray-900 mb-2 text-center">
                {isOnComprehension ? 'Comprehension Check' : 'Instructions'}
              </h1>

              {!isOnComprehension && (
                <p className="text-gray-700 text-center mb-2">
                  Do <span className="text-red-500 font-semibold">NOT</span> click Next on any instructions page without having read all of it carefully. Otherwise, you will fail the attention check!
                </p>
              )}

              {isOnComprehension && (
                <p className="text-gray-600 italic text-center mb-4">
                  To make sure you have understood these instructions, please answer the following questions.
                </p>
              )}

              {/* Page indicator — only on instruction pages */}
              {!isOnComprehension && (
                <div className="flex items-center justify-center gap-2 mb-6">
                  {Array.from({ length: instructionCount }, (_, i) => (
                    <div
                      key={i}
                      className={`w-3 h-3 rounded-full transition-all ${
                        i === currentPage ? 'bg-blue-400 scale-125' : i < currentPage ? 'bg-blue-300' : 'bg-gray-200'
                      }`}
                    />
                  ))}
                  <span className="text-gray-500 text-sm ml-2">Page {currentPage + 1} of {instructionCount}</span>
                </div>
              )}

              {/* Current page content */}
              {pages[currentPage]}

              {/* Navigation buttons */}
              <div className="flex justify-between items-center mt-8">
                <button
                  onClick={() => { recordPageTime(currentPage); setCurrentPage(p => p - 1); }}
                  disabled={currentPage === 0}
                  className={`px-6 py-3 rounded-xl font-bold transition-all ${
                    currentPage === 0
                      ? 'invisible'
                      : 'bg-gray-200 hover:bg-gray-300 text-gray-700'
                  }`}
                >Back</button>

                {isLastPage ? (
                  <button
                    onClick={handleContinue}
                    className={`px-8 py-3 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-400 hover:to-blue-500 text-white font-bold text-lg rounded-xl shadow-lg hover:shadow-xl ${showNextButton ? 'transition-opacity duration-1000 ease-in opacity-100' : 'opacity-0 pointer-events-none'}`}
                  >Submit</button>
                ) : (
                  <button
                    onClick={() => {
                      recordPageTime(currentPage);
                      if (currentPage === 1 && attentionCheck === 0) {
                        sendDataToQualtrics('INSTRUCTIONS_COMPLETE', {
                          completed: true, attentionCheck: 0, comprehension: {},
                          pageTimes: pageTimesRef.current, comprehTimes: comprehTimesRef.current,
                          gameVersionsDescriptionOrderDieter1:    isMig ? null : gameVersionsDescriptionOrderDieter1,
                          gameVersionsDescriptionOrderDieter2:    isMig ? null : gameVersionsDescriptionOrderDieter2,
                          gameVersionsDescriptionOrderMigraines1: isMig ? gameVersionsDescriptionOrderDieter1 : null,
                          gameVersionsDescriptionOrderMigraines2: isMig ? gameVersionsDescriptionOrderDieter2 : null
                        });
                        return;
                      }
                      setCurrentPage(p => p + 1);
                      window.scrollTo(0, 0);
                      if (window.parent !== window) window.parent.postMessage({ type: 'SCROLL_TO_TOP' }, '*');
                    }}
                    className={`px-8 py-3 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-400 hover:to-blue-500 text-white font-bold rounded-xl shadow-lg hover:shadow-xl ${showNextButton ? 'transition-opacity duration-1000 ease-in opacity-100' : 'opacity-0 pointer-events-none'}`}
                  >Next</button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<Instructions />);
  </script>
</body>
</html>
