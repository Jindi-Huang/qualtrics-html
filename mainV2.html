  <title>Beverage Experiment</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; background: #ffffff; }

    @keyframes first-round-shine-pill {
      0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
      50%      { box-shadow: 0 0 24px 6px rgba(251, 191, 36, 0.55); }
    }
    .first-round-shine-pill { animation: first-round-shine-pill 1.6s ease-in-out infinite; }

    @keyframes first-round-shine-panel {
      0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
      50%      { box-shadow: 0 0 28px 8px rgba(251, 191, 36, 0.55); }
    }
    .first-round-shine-panel { animation: first-round-shine-panel 1.6s ease-in-out infinite; }

    @keyframes attention-shine-pill {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
      50%      { box-shadow: 0 0 22px 6px rgba(245, 158, 11, 0.55); }
    }
    .attention-shine-pill { animation: attention-shine-pill 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // =============== QUALTRICS COMMUNICATION ===============
    let participantId = null;
    let gameId = null;
    let configReceived = false;

    window.addEventListener('message', function(event) {
      if (event.data.type === 'INIT') {
        console.log('Received INIT from Qualtrics:', event.data);
        configReceived = true;
        participantId = event.data.participantId;
        gameId = event.data.gameId;

        if (event.data.gameConfig) {
          const qConfig = event.data.gameConfig;

          // Read supergame first so supergame-dependent defaults reset
          if (qConfig.supergame) {
            CONFIG.supergame = qConfig.supergame;
            // Wipe fields we'll re-derive from supergame defaults
            if (qConfig.yBonus === undefined) CONFIG.yBonus = null;
            if (qConfig.nRounds === undefined) CONFIG.totalRounds = null;
            if (qConfig.playerName0 === undefined) CONFIG.playerName0 = null;
            if (qConfig.playerName1 === undefined) CONFIG.playerName1 = null;
            if (qConfig.order === undefined) CONFIG.order = null;
          }

          if (qConfig.playerName0) CONFIG.playerName0 = qConfig.playerName0;
          if (qConfig.playerName1) CONFIG.playerName1 = qConfig.playerName1;
          if (qConfig.playerName2Pos) CONFIG.playerName2Pos = qConfig.playerName2Pos;
          if (qConfig.playerName2Neg) CONFIG.playerName2Neg = qConfig.playerName2Neg;
          if (qConfig.playerIcon0) CONFIG.playerIcon0 = qConfig.playerIcon0;
          if (qConfig.currentSymbol) CONFIG.currentSymbol = qConfig.currentSymbol;
          if (qConfig.yBonus !== undefined) CONFIG.yBonus = qConfig.yBonus;
          if (qConfig.aCost !== undefined) CONFIG.aCost = qConfig.aCost;
          if (qConfig.nRounds !== undefined) CONFIG.totalRounds = parseInt(qConfig.nRounds) || CONFIG.totalRounds;
          if (qConfig.currency) CONFIG.currency = qConfig.currency;
          if (qConfig.id !== undefined) CONFIG.id = qConfig.id;
          // Dieter DGP params (collider / causal chain)
          if (qConfig.causal !== undefined) CONFIG.causal = qConfig.causal;
          if (qConfig.beta00 !== undefined) CONFIG.beta00 = qConfig.beta00;
          if (qConfig.beta01 !== undefined) CONFIG.beta01 = qConfig.beta01;
          if (qConfig.beta10 !== undefined) CONFIG.beta10 = qConfig.beta10;
          if (qConfig.beta11 !== undefined) CONFIG.beta11 = qConfig.beta11;
          if (qConfig.sigma0 !== undefined) CONFIG.sigma0 = qConfig.sigma0;
          if (qConfig.sigma1 !== undefined) CONFIG.sigma1 = qConfig.sigma1;
          if (qConfig.rho0 !== undefined) CONFIG.rho0 = qConfig.rho0;
          if (qConfig.rho1 !== undefined) CONFIG.rho1 = qConfig.rho1;
          // Migraines DGP params
          if (qConfig.pY !== undefined) CONFIG.pY = qConfig.pY;
          if (qConfig.pX_y !== undefined) CONFIG.pX_y = qConfig.pX_y;
          if (qConfig.pX_Y !== undefined) CONFIG.pX_Y = qConfig.pX_Y;
          if (qConfig.order) CONFIG.order = qConfig.order;
          if (qConfig.increasingPrice !== undefined) CONFIG.increasingPrice = parseInt(qConfig.increasingPrice);
          if (qConfig.cravingFirstHS !== undefined) CONFIG.cravingFirstHS = parseInt(qConfig.cravingFirstHS);
          if (qConfig.themeColor) CONFIG.themeColor = qConfig.themeColor;
          if (qConfig.aOnLeftDAG !== undefined) CONFIG.aOnLeftDAG = parseInt(qConfig.aOnLeftDAG);

          applySupergameDefaults();
          console.log('Applied config:', CONFIG);
        }

        markInitialized();
        sendDataToQualtrics('GAME_START', { started: true });
      }
    });

    if (window.parent !== window) {
      window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
    }

    function sendDataToQualtrics(dataType, data) {
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'GAME_DATA',
          gameId: gameId,
          dataType: dataType,
          data: data,
          participantId: participantId,
          configReceived: configReceived,
          timestamp: new Date().toISOString()
        }, '*');
      }
      console.log('Sent to Qualtrics:', dataType, data);
    }

    let isInitialized = false;
    let initCallbacks = [];
    function onInitialized(callback) {
      if (isInitialized) callback();
      else initCallbacks.push(callback);
    }
    function markInitialized() {
      isInitialized = true;
      initCallbacks.forEach(cb => cb());
      initCallbacks = [];
    }

    // =============== TRACKING ===============
    const tracking = {
      pageLoadTime: Date.now(),
      visibilityChanges: 0,
      blurEvents: 0,
      focusEvents: 0,
      copyEvents: 0,
      pasteEvents: 0,
      contextMenuEvents: 0,
      keyboardShortcuts: 0,
      tabSwitches: 0,
      lastVisibilityState: document.visibilityState
    };

    document.addEventListener('visibilitychange', () => {
      tracking.visibilityChanges++;
      if (document.visibilityState !== tracking.lastVisibilityState) {
        if (document.visibilityState === 'hidden') tracking.tabSwitches++;
        tracking.lastVisibilityState = document.visibilityState;
      }
    });
    window.addEventListener('blur', () => tracking.blurEvents++);
    window.addEventListener('focus', () => tracking.focusEvents++);
    document.addEventListener('copy', () => tracking.copyEvents++);
    document.addEventListener('paste', () => tracking.pasteEvents++);
    document.addEventListener('contextmenu', () => tracking.contextMenuEvents++);
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey || e.altKey) tracking.keyboardShortcuts++;
    });

    function getTrackingData() {
      return {
        ...tracking,
        totalDurationSec: (Date.now() - tracking.pageLoadTime) / 1000
      };
    }

    // =============== CONFIG ===============
    // supergame: 'dieter' → mirrors dietersDilemmaV2.html
    //            'migraines' → mirrors confoundedChoiceV2.html
    const CONFIG = {
      supergame: 'dieter',        // 'dieter' or 'migraines'

      // Game economics
      yBonus: null,               // null → supergame default (dieter:2, migraines:10)
      aCost: 1.50,
      totalRounds: null,          // null → default 10 for both supergames
      currency: '$',
      id: 1,

      // Dieter DGP (collider or causal chain)
      causal: 0,                  // 0 = collider, 1 = causal chain
      pY: 0.50,
      beta00: 0.05, beta01: 0.80, beta10: 0.80, beta11: 0.95,
      sigma0: 0.20, sigma1: 0.80,
      rho0: 0.20,  rho1: 0.80,

      // Migraines DGP (Y indep., X is a signal of Y, A does not enter)
      pX_y: 0.60,   // P(X=1 | Y=0)
      pX_Y: 0.10,   // P(X=1 | Y=1)

      // Display switch (dieter): 'AXY' shows X, 'AY' hides X
      order: null,                // null → supergame default (dieter:'AY', migraines:'AXY')

      // Price elicitation
      priceElicitationPrices: [0, 7.5, 15, 22.5, 30],
      priceElicitationBonus: 100,
      increasingPrice: 0,         // 1 = low to high, 0 = high to low
      cravingFirstHS: 1,          // 1 = craving case first, 0 = no-craving case first (per price level)

      // Player names (defaults overridden by supergame)
      playerName0: null,          // null → supergame default
      playerName1: null,          // null → supergame default
      playerName2: 'Feeling',
      playerName2Pos: 'energetic',
      playerName2Neg: 'tired',
      playerIcon0: '🥤',
      currentSymbol: null,
      themeColor: 'purple',
      aOnLeftDAG: 1           // 1 → A on left in DAG; 0 → A on right
    };

    function applySupergameDefaults() {
      const isMig = CONFIG.supergame === 'migraines';
      if (CONFIG.yBonus === null || CONFIG.yBonus === undefined) CONFIG.yBonus = isMig ? 10.00 : 10.00;
      if (CONFIG.totalRounds === null || CONFIG.totalRounds === undefined) CONFIG.totalRounds = 12;
      if (CONFIG.playerName0 === null || CONFIG.playerName0 === undefined) CONFIG.playerName0 = isMig ? 'Driftwell' : 'Zerqalase-norm';
      if (CONFIG.playerName1 === null || CONFIG.playerName1 === undefined) CONFIG.playerName1 = isMig ? 'Driftwell' : 'Zerqalase';
      if (CONFIG.order === null || CONFIG.order === undefined) CONFIG.order = isMig ? 'AXY' : 'AYX';
    }

    // Allow standalone testing: ?supergame=migraines or ?supergame=dieter
    try {
      const urlSupergame = new URLSearchParams(window.location.search).get('supergame');
      if (urlSupergame === 'migraines' || urlSupergame === 'dieter') CONFIG.supergame = urlSupergame;
    } catch (e) {}

    applySupergameDefaults();

    // =============== HELPERS ===============
    // Order of high-stakes prices to present (low-to-high or high-to-low)
    function getOrderedPrices() {
      const prices = [...CONFIG.priceElicitationPrices];
      return CONFIG.increasingPrice === 1 ? prices : prices.reverse();
    }

    // Migraines high-stakes: for each price, present BOTH craving (X=1) and no-craving (X=0).
    // CONFIG.cravingFirstHS = 1 → craving case first within each price level; 0 → no-craving first.
    function getOrderedHSRounds() {
      const prices = getOrderedPrices();
      const Xfirst = CONFIG.cravingFirstHS === 1 ? 1 : 0;
      const Xsecond = 1 - Xfirst;
      const rounds = [];
      for (const p of prices) {
        rounds.push({ price: p, X: Xfirst });
        rounds.push({ price: p, X: Xsecond });
      }
      return rounds;
    }
    function getHSTotalRounds() {
      return CONFIG.priceElicitationPrices.length * 2;
    }

    // Inconsistent-choice detector — direction flips with supergame.
    // Dieter (drink = pay): rational pattern is "drink only when price low"
    //   Decreasing display: inconsistent on Drink→Skip
    //   Increasing display: inconsistent on Skip→Drink
    // Migraines (drink = earn): rational pattern is "drink only when payment high"
    //   Decreasing display: inconsistent on Skip→Drink
    //   Increasing display: inconsistent on Drink→Skip
    function hasInconsistentChoices(sortedChoices) {
      if (sortedChoices.length < 2) return false;
      const isMig = CONFIG.supergame === 'migraines';
      const isDecreasing = CONFIG.increasingPrice === 0;

      for (let i = 1; i < sortedChoices.length; i++) {
        const prevChoice = sortedChoices[i - 1].choice;
        const currChoice = sortedChoices[i].choice;

        if (isMig) {
          if (isDecreasing) { if (prevChoice === 0 && currChoice === 1) return true; }
          else              { if (prevChoice === 1 && currChoice === 0) return true; }
        } else {
          if (isDecreasing) { if (prevChoice === 1 && currChoice === 0) return true; }
          else              { if (prevChoice === 0 && currChoice === 1) return true; }
        }
      }

      // Also flag multiple switches (back and forth)
      let switches = 0;
      for (let i = 1; i < sortedChoices.length; i++) {
        if (sortedChoices[i].choice !== sortedChoices[i - 1].choice) switches++;
      }
      return switches > 1;
    }

    // Simulate one round based on DGP. A only matters in dieter+causal=0 (collider) and dieter+causal=1 (chain).
    // In migraines, A does not enter the DGP.
    function simulateRound(A) {
      if (CONFIG.supergame === 'migraines') {
        const Y = Math.random() < CONFIG.pY ? 1 : 0;
        const pX = Y === 1 ? CONFIG.pX_Y : CONFIG.pX_y;
        const X = Math.random() < pX ? 1 : 0;
        return { A, X, Y };
      }
      // Dieter
      let X, Y;
      if (CONFIG.causal === 0) {
        const pX = [CONFIG.beta00, CONFIG.beta01, CONFIG.beta10, CONFIG.beta11];
        Y = Math.random() < CONFIG.pY ? 1 : 0;
        X = Math.random() < pX[A * 2 + Y] ? 1 : 0;
      } else {
        const pX = [CONFIG.sigma0, CONFIG.sigma1];
        const pY = [CONFIG.rho0, CONFIG.rho1];
        X = Math.random() < pX[A] ? 1 : 0;
        Y = Math.random() < pY[X] ? 1 : 0;
      }
      // In dieter+AY order, X is not displayed; record as 0
      if (CONFIG.order === 'AY') X = 0;
      return { A, X, Y };
    }

    function calculateStats(history) {
      const stats = {
        A1: { total: 0, X1: 0, Y1: 0 },
        A0: { total: 0, X1: 0, Y1: 0 },
        X1: { total: 0, Y1: 0 },
        X0: { total: 0, Y1: 0 }
      };
      history.forEach(round => {
        const [A, X, Y] = round;
        if (A === 1) {
          stats.A1.total++;
          if (X === 1) stats.A1.X1++;
          if (Y === 1) stats.A1.Y1++;
        } else {
          stats.A0.total++;
          if (X === 1) stats.A0.X1++;
          if (Y === 1) stats.A0.Y1++;
        }
        if (X === 1) {
          stats.X1.total++;
          if (Y === 1) stats.X1.Y1++;
        } else {
          stats.X0.total++;
          if (Y === 1) stats.X0.Y1++;
        }
      });
      return stats;
    }
  </script>

    const { useState, useEffect, useRef, useCallback } = React;

      return (
        <svg className={className} style={style} viewBox="80 0 305 462.848" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <polygon points="246.784,94.208 246.784,53.248 344.064,29.184 336.384,0 216.064,29.184 216.064,94.208 82.432,94.208 82.432,160.768 380.416,160.768 380.416,94.208"/>
          <path d="M102.912,186.368l35.328,249.856c2.048,15.36,15.36,26.624,30.208,26.624h124.416c15.36,0,28.16-11.264,30.208-26.624L358.4,186.368H102.912z"/>
        </svg>
      );
    }

    function SkipIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 512.095 512.095" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="m256.047 0c-141.411 0-256.047 114.636-256.047 256.047s114.636 256.047 256.047 256.047 256.047-114.636 256.047-256.047-114.636-256.047-256.047-256.047zm-192.313 256.047c0-106.212 86.102-192.313 192.313-192.313 41.614 0 80.139 13.221 111.61 35.687l-268.236 268.237c-22.466-31.471-35.687-69.996-35.687-111.611zm192.313 192.314c-41.589 0-80.092-13.204-111.552-35.644l268.221-268.221c22.441 31.46 35.644 69.964 35.644 111.552.001 106.211-86.101 192.313-192.313 192.313z"/>
        </svg>
      );
    }

    // MorningIcon — speech bubble with craving glyph (migraines only)
    function MorningIcon({ className, drinkName, X }) {
      const theme = getThemeClasses(CONFIG.themeColor);
      const icon = CONFIG.playerIcon0;
      const isDriftwell = icon === '🍵';
      const isMelloway = icon === '🍶';
      let cravingInner;
      if (X === null) {
        cravingInner = (
          <g className="text-gray-700">
            <circle cx="11.5" cy="10" r="0.8"/>
            <circle cx="14" cy="10" r="0.8"/>

      } else if (X === 0) {
        cravingInner = (
          <g className="text-gray-700" transform="translate(10.5, 6) scale(0.0156)">

      } else if (isDriftwell) {

            <path d="M443.882,5.28C440.842,1.92,436.554,0,432.01,0h-352c-4.512,0-8.832,1.92-11.872,5.28c-3.008,3.328-4.512,7.808-4.064,12.32l48,480c0.832,8.192,7.712,14.4,15.936,14.4h256c8.224,0,15.104-6.208,15.904-14.4l48-480C448.394,13.088,446.922,8.608,443.882,5.28z M401.29,162.496c-40.672,13.152-93.6,19.232-135.136-14.848c-52.064-42.72-115.872-35.36-159.136-22.496L97.706,32h316.608L401.29,162.496z"/>

    // =============== BIOCLIP (dieter X panel) ===============
    function BioClipLarge({ status }) {
      const isAYOrder = CONFIG.order === 'AY';

      const getStatusColor = () => {
        if (isAYOrder) return '#475569';
        if (status === null) return '#64748b';
        return status === 1 ? '#22c55e' : '#ef4444';
      };
      const getStatusBg = () => {
        if (isAYOrder) return '#1e293b';
        if (status === null) return '#1e293b';
        return status === 1 ? '#14532d' : '#7f1d1d';
      };

      return (
        <div className="flex flex-col items-center" style={{ width: '140px' }}>
          <svg viewBox="0 0 120 160" className="w-32 h-44">
            <rect x="10" y="10" width="100" height="140" rx="12" fill="#0f172a" stroke="#334155" strokeWidth="2" />
            <rect x="18" y="20" width="84" height="100" rx="6" fill="#1e293b" />
            <rect x="22" y="24" width="76" height="92" rx="4" fill={getStatusBg()} className="transition-all duration-500" />
            <circle cx="60" cy="55" r="24" fill={getStatusColor()} className="transition-all duration-300">
              {status !== null && !isAYOrder && (
                <animate attributeName="r" values="24;28;24" dur="0.5s" repeatCount="1" />
              )}
            </circle>
            {!isAYOrder && status === 1 && (
              <path d="M48 55 L56 63 L72 47" stroke="white" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round">
                <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="0.3s" fill="freeze" />
              </path>
            )}
            {!isAYOrder && status === 0 && (
              <g stroke="white" strokeWidth="4" strokeLinecap="round">
                <line x1="50" y1="45" x2="70" y2="65">
                  <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="0.2s" fill="freeze" />
                </line>
                <line x1="70" y1="45" x2="50" y2="65">
                  <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="0.2s" begin="0.2s" fill="freeze" />

              </g>

            {isAYOrder ? (
              <text x="60" y="93" textAnchor="middle" fill="#94a3b8" fontSize="9" fontWeight="bold">
                <tspan x="60" dy="0">SUBSCRIPTION</tspan>
                <tspan x="60" dy="12">EXPIRED</tspan>

            <text x="60" y="139" textAnchor="middle" fill="#94a3b8" fontSize="10" fontFamily="monospace">BioClip™</text>

    // =============== INLINE DRINK/SKIP BUTTONS (migraines: shown inside XYConnection) ===============
    function InlineDrinkSkipButtons({ onChoice, disabled, isFirstRound, selectedChoice, X }) {
      const theme = getThemeClasses(CONFIG.themeColor);
      const drinkPayoffText =
        X === 1 ? `+${CONFIG.currency}${CONFIG.aCost}` :
        X === 0 ? `-${CONFIG.currency}${CONFIG.aCost}` :
        null;
      const drinkPayoffPlaceholder = `+${CONFIG.currency}${CONFIG.aCost}`;
      return (
        <div className="flex flex-col items-center">

              onClick={() => onChoice(1)}

              className={`w-36 h-24 px-2 py-2 rounded-xl font-bold transition-all flex flex-col items-center justify-center gap-1 ${

                  ? selectedChoice === 1
                    ? `bg-red-600 border-2 border-red-600 shadow-md ring-4 ring-red-300`
                    : 'bg-gray-100 border-2 border-gray-200 cursor-not-allowed'
                  : `bg-red-500 border-2 border-red-500 shadow-md hover:shadow-lg hover:bg-red-600 hover:border-red-600 active:shadow-sm active:translate-y-0.5 cursor-pointer ${isFirstRound ? 'first-round-shine-panel' : ''}`
              }`}
            >
              <DrinkIcon className={`w-10 h-10 ${disabled && selectedChoice !== 1 ? 'text-gray-400' : theme.iconColor}`} drinkName={CONFIG.playerName0} />
              <div className="text-center">
                <div className={`text-sm font-bold ${drinkPayoffText === null ? 'invisible' : ''} ${disabled && selectedChoice !== 1 ? 'text-gray-300' : 'text-white'}`}>{drinkPayoffText === null ? drinkPayoffPlaceholder : drinkPayoffText}</div>
                <div className={`text-[10px] ${disabled && selectedChoice !== 1 ? 'text-gray-400' : 'text-white'}`}>Drink {CONFIG.playerName0}</div>

              onClick={() => onChoice(0)}
              disabled={disabled}
              className={`w-36 h-24 px-2 py-2 rounded-xl font-bold transition-all flex flex-col items-center justify-center gap-1 ${
                disabled
                  ? selectedChoice === 0
                    ? `bg-green-600 border-2 border-green-600 shadow-md ring-4 ring-green-300`
                    : 'bg-gray-100 border-2 border-gray-200 cursor-not-allowed'
                  : `bg-green-500 border-2 border-green-500 shadow-md hover:shadow-lg hover:bg-green-600 hover:border-green-600 active:shadow-sm active:translate-y-0.5 cursor-pointer ${isFirstRound ? 'first-round-shine-panel' : ''}`
              }`}
            >
              <SkipIcon className={`w-10 h-10 ${disabled && selectedChoice !== 0 ? 'text-gray-400' : 'text-white'}`} />
              <div className="text-center">
                <div className={`text-sm ${disabled && selectedChoice !== 0 ? 'text-gray-300' : 'text-white'}`}>{CONFIG.currency}0</div>
                <div className={`text-[10px] ${disabled && selectedChoice !== 0 ? 'text-gray-400' : 'text-white'}`}>Skip</div>

            </button>
          </div>
          <div className="text-lg font-bold text-gray-900 mt-4">Your Decision</div>
          <div className="h-12" />
        </div>
      );
    }

    function InlinePriceElicitationButtons({ price, onChoice, isFirstRound, selectedChoice, disabled, currentX }) {
      const isMig = CONFIG.supergame === 'migraines';
      const theme = getThemeClasses(CONFIG.themeColor);
      const drinkInactive = disabled && selectedChoice !== 1;
      const skipInactive = disabled && selectedChoice !== 0;
      // Migraines: button label flips by craving state (+$15 / -$15). Actual payment is always +price.
      // additional = total - button so the displayed math adds up; total is the same across both rows.
      const prices = CONFIG.priceElicitationPrices;
      const baseline = isMig ? prices[Math.floor(prices.length / 2)] : 0;
      const sign = isMig ? (currentX === 1 ? 1 : -1) : 1;
      const baselinePayment = sign * baseline;
      const additional = price - baselinePayment;
      const totalPayment = price;
      const formatSignedCurrency = (v) => v === 0
        ? `${CONFIG.currency}0`
        : `${v > 0 ? '+' : '-'}${CONFIG.currency}${Math.abs(v)}`;
      const xKnown = currentX === 0 || currentX === 1;
      const priceLabel = isMig
        ? (xKnown ? formatSignedCurrency(baselinePayment) : '')
        : (price === 0 ? 'Free' : `-${CONFIG.currency}${price}`);
      return (
        <div className="flex flex-col items-center">
          <div className="h-44 flex items-end justify-center gap-3">
            <button
              onClick={() => onChoice(1)}
              disabled={disabled}
              className={`w-36 h-24 px-2 py-2 rounded-xl font-bold transition-all flex flex-col items-center justify-center gap-1 ${
                disabled
                  ? selectedChoice === 1
                    ? `bg-red-600 border-2 border-red-600 shadow-md ring-4 ring-red-300`
                    : 'bg-gray-100 border-2 border-gray-200 cursor-not-allowed'
                  : selectedChoice === 1
                    ? `bg-red-600 border-2 border-red-600 shadow-md ring-4 ring-red-300 cursor-pointer`
                    : selectedChoice === 0
                      ? 'bg-gray-100 border-2 border-gray-200 cursor-pointer'
                      : `bg-red-500 border-2 border-red-500 shadow-md hover:shadow-lg hover:bg-red-600 hover:border-red-600 active:shadow-sm active:translate-y-0.5 cursor-pointer ${isFirstRound ? 'first-round-shine-panel' : ''}`
              }`}
            >
              <DrinkIcon className={`w-10 h-10 ${drinkInactive || selectedChoice === 0 ? 'text-gray-400' : theme.iconColor}`} drinkName={CONFIG.playerName0} />
              <div className="text-center">
                <div className={`text-sm font-bold ${drinkInactive ? 'text-gray-400' : 'text-white'}`}>{priceLabel}</div>
                <div className={`text-[10px] mt-1 ${drinkInactive || selectedChoice === 0 ? 'text-gray-400' : 'text-white'}`}>Drink {CONFIG.playerName0}</div>
              </div>
            </button>
            <button
              onClick={() => onChoice(0)}
              disabled={disabled}
              className={`w-36 h-24 px-2 py-2 rounded-xl font-bold transition-all flex flex-col items-center justify-center gap-1 ${
                disabled
                  ? selectedChoice === 0
                    ? `bg-green-600 border-2 border-green-600 shadow-md ring-4 ring-green-300`
                    : 'bg-gray-100 border-2 border-gray-200 cursor-not-allowed'
                  : selectedChoice === 0
                    ? `bg-green-600 border-2 border-green-600 shadow-md ring-4 ring-green-300 cursor-pointer`
                    : selectedChoice === 1
                      ? 'bg-gray-100 border-2 border-gray-200 cursor-pointer'
                      : `bg-green-500 border-2 border-green-500 shadow-md hover:shadow-lg hover:bg-green-600 hover:border-green-600 active:shadow-sm active:translate-y-0.5 cursor-pointer ${isFirstRound ? 'first-round-shine-panel' : ''}`
              }`}
            >
              <SkipIcon className={`w-10 h-10 ${skipInactive || selectedChoice === 1 ? 'text-gray-400' : 'text-white'}`} />
              <div className="text-center">
                <div className={`text-sm ${skipInactive || selectedChoice === 1 ? 'text-gray-300' : 'text-white'}`}>{CONFIG.currency}0</div>
                <div className={`text-[10px] ${skipInactive || selectedChoice === 1 ? 'text-gray-400' : 'text-white'}`}>Skip</div>
              </div>
            </button>
          </div>
          {isMig && (currentX === 0 || currentX === 1) && (
            <div className="mt-3 space-y-1 text-lg text-gray-600 text-left">
              <div className="flex items-center gap-2 whitespace-nowrap">
                <span>Additional payment for consuming the drink:</span>
                <span className="font-bold">{formatSignedCurrency(additional)}</span>
              </div>
              <div className="flex items-center gap-2 whitespace-nowrap">
                <span>Total payment for consuming the drink:</span>
                <span className="inline-block rounded px-2 py-0.5 font-bold bg-amber-400 text-amber-900">{formatSignedCurrency(totalPayment)}</span>
              </div>
            </div>
          )}
          <div className="text-lg font-bold text-gray-900 mt-4">Your Decision</div>
          <div className="h-12" />
        </div>
      );
    }

    // =============== MOOD LARGE ===============
    function MoodLarge({ mood, showBonus }) {
      const bonusAmount = showBonus || CONFIG.yBonus;
      return (
        <div className="flex flex-col items-center" style={{ width: '140px' }}>
          <div className="w-32 h-44 flex items-end justify-center">
            <div className={`w-32 h-32 rounded-full flex items-center justify-center transition-all duration-500 flex-shrink-0 ${
              mood === null ? 'bg-gray-200' : mood === 1 ? 'bg-gradient-to-br from-emerald-400 to-green-600' : 'bg-gradient-to-br from-rose-400 to-red-600'
            }`}>
              {mood === null ? (
                <NeutralFaceIcon className="w-16 h-16 text-gray-400 transition-all duration-300" />
              ) : mood === 1 ? (
                <HappyFaceIcon className="w-16 h-16 text-white transition-all duration-300" />
              ) : (
                <SadFaceIcon className="w-16 h-16 text-white transition-all duration-300" />
              )}
            </div>
          </div>
          <div className="text-lg font-bold text-gray-900 mt-4 text-center whitespace-nowrap">
            {mood === null ? (CONFIG.order === 'AYX' ? 'Shortly after...' : 'Later this day...') : mood === 1 ? `${CONFIG.playerName2Pos.charAt(0).toUpperCase() + CONFIG.playerName2Pos.slice(1)}!` : CONFIG.playerName2Neg.charAt(0).toUpperCase() + CONFIG.playerName2Neg.slice(1)}
          </div>
          <div className="h-12 flex items-center justify-center">
            {mood === null && showBonus ? (
              <div className="flex items-center gap-1 text-lg whitespace-nowrap">
                <span className="text-gray-600">(<span className="underline">If</span> {CONFIG.playerName2Pos}:</span>
                <span className="text-green-600 text-2xl font-bold">{CONFIG.currency}{bonusAmount}</span>
                <span className="text-gray-600">)</span>
              </div>
            ) : (
              <div className={`${mood === null ? 'invisible' : mood === 1 ? 'text-green-600 text-lg font-bold' : 'text-red-600 text-lg font-bold'}`}>
                {mood === null ? ' ' : mood === 1 ? `+${CONFIG.currency}${bonusAmount}` : `${CONFIG.currency}0`}
              </div>
            )}
          </div>
        </div>
      );
    }

    // =============== XY CONNECTION (left panel + rate box + mood) ===============
    function XYConnection({ X, Y, A, stats, hideRateBox, showBonus, actionSlot, alignStart }) {
      const isMig = CONFIG.supergame === 'migraines';
      const isAYOrder = CONFIG.order === 'AY';
      const isAYXOrder = !isMig && CONFIG.order === 'AYX';

      // Rate box display (and color): migraines splits by A; dieter splits by X (or Y in AYX)
      let leftLabel, rateValue, colorOn, rateBoxBorder;
      if (isMig) {
        const A1Y1Rate = stats.A1.total > 0 ? Math.round((stats.A1.Y1 / stats.A1.total) * 100) : null;
        const A0Y1Rate = stats.A0.total > 0 ? Math.round((stats.A0.Y1 / stats.A0.total) * 100) : null;
        const showConnection = A !== null;
        const connectionColor = A === 1 ? '#ef4444' : '#22c55e';
        leftLabel = A === null ? 'Historical Rate' : A === 1 ? 'When DRINK' : 'When SKIP';
        rateValue = A === null ? null : A === 1 ? A1Y1Rate : A0Y1Rate;
        rateBoxBorder = showConnection ? (A === 1 ? 'border-red-500' : 'border-green-500') : 'border-gray-300';
        colorOn = { showConnection, connectionColor };
      } else if (isAYXOrder) {
        // AYX: condition on Y (mood) — rate shows P(X=normal | Y)
        const Y1Total = stats.X1.Y1 + stats.X0.Y1;
        const Y0Total = (stats.X1.total - stats.X1.Y1) + (stats.X0.total - stats.X0.Y1);
        const Y1X1Rate = Y1Total > 0 ? Math.round((stats.X1.Y1 / Y1Total) * 100) : null;
        const Y0X1Rate = Y0Total > 0 ? Math.round(((stats.X1.total - stats.X1.Y1) / Y0Total) * 100) : null;
        const showConnection = Y !== null;
        const connectionColor = Y === 1 ? '#22c55e' : '#ef4444';
        leftLabel = Y === null ? 'Historical Rate' : Y === 1 ? `When ${CONFIG.playerName2Pos.toUpperCase()}` : `When ${CONFIG.playerName2Neg.toUpperCase()}`;
        rateValue = Y === null ? null : Y === 1 ? Y1X1Rate : Y0X1Rate;
        rateBoxBorder = showConnection ? (Y === 1 ? 'border-green-500' : 'border-red-500') : 'border-gray-300';
        colorOn = { showConnection, connectionColor };
      } else {
        const X1Y1Rate = stats.X1.total > 0 ? Math.round((stats.X1.Y1 / stats.X1.total) * 100) : null;
        const X0Y1Rate = stats.X0.total > 0 ? Math.round((stats.X0.Y1 / stats.X0.total) * 100) : null;
        const showConnection = X !== null && !isAYOrder;
        const connectionColor = X === 1 ? '#22c55e' : '#ef4444';
        leftLabel = isAYOrder ? 'Historical Rate' : X === null ? 'Historical Rate' : X === 1 ? 'When NORMAL' : 'When ABNORMAL';
        rateValue = isAYOrder || X === null ? null : X === 1 ? X1Y1Rate : X0Y1Rate;
        rateBoxBorder = showConnection ? (X === 1 ? 'border-green-500' : 'border-red-500') : 'border-gray-300';
        colorOn = { showConnection, connectionColor };
      }

      return (
        <div className={`relative flex ${alignStart ? 'items-start' : 'items-center'} justify-center pt-8 pb-2 ${isMig ? 'gap-12' : 'gap-8'}`}>
          {/* Left panel: dieter shows BioClip (or Y face if order==='AYX'); migraines shows action slot (or BioClip if not provided) */}
          {isMig
            ? (actionSlot || <BioClipLarge status={null} />)
            : isAYXOrder
              ? <MoodLarge mood={Y} showBonus={showBonus} />
              : <BioClipLarge status={isAYOrder ? null : X} />}

          <div className={`flex flex-col items-center relative ${alignStart ? 'h-44 justify-end' : ''}`}>
            <svg width="180" height="80" className="absolute" style={alignStart ? { bottom: '10px' } : { top: '50%', transform: 'translateY(-50%)' }}>
              <line x1="0" y1="40" x2="180" y2="40" stroke="#d1d5db" strokeWidth="4" strokeDasharray="8,4" />
              {colorOn.showConnection && (
                <>
                  <line
                    x1="0" y1="40" x2="180" y2="40"

    // =============== DAG / BELIEF IFRAMES ===============
    function DAGIframe({ onComplete, playerName0, playerName1, playerIcon0, nRounds, themeColor }) {
      const iframeRef = useRef(null);
      const isMig = CONFIG.supergame === 'migraines';
      const dagSrc = isMig ? 'dagElicitationV3.html' : 'dagElicitationV2.html';

      useEffect(() => {
        const handleMessage = (event) => {
          if (event.data.type === 'DAG_DATA' && event.data.dataType === 'DAG_COMPLETE') {
            const d = event.data.data;
            onComplete(d.initialDAG, d.finalDAG, d.confidence, d.DAGAlertCount, d.initialDAGTime, d.finalDAGTime, d.confidenceTime);
          }
        };
        window.addEventListener('message', handleMessage);

        const sendInit = () => {
          if (iframeRef.current && iframeRef.current.contentWindow) {
            iframeRef.current.contentWindow.postMessage({
              type: 'INIT',
              gameConfig: {
                playerName0, playerName1, playerIcon0, nRounds, themeColor,
                aOnLeftDAG: CONFIG.aOnLeftDAG,
                ...(isMig ? { supergame: 'migraines' } : {})
              }
            }, '*');
          }
        };
        const timeout = setTimeout(sendInit, 500);

        return () => {
          window.removeEventListener('message', handleMessage);
          clearTimeout(timeout);
        };
      }, [onComplete, playerName0, playerName1, playerIcon0, nRounds, themeColor, isMig]);

      return (
        <iframe
          ref={iframeRef}
          src={dagSrc}
          style={{ width: '100%', height: '100vh', border: 'none' }}
          onLoad={() => {
            if (iframeRef.current && iframeRef.current.contentWindow) {
              iframeRef.current.contentWindow.postMessage({
                type: 'INIT',
                gameConfig: {
                  playerName0, playerName1, playerIcon0, themeColor,
                  aOnLeftDAG: CONFIG.aOnLeftDAG,
                  ...(isMig ? { supergame: 'migraines' } : {})
                }
              }, '*');
            }
          }}
        />
      );
    }

    function BeliefIframe({ onComplete, playerName0, playerName1, playerName2Pos, playerName2Neg, aCost, currency, order, themeColor }) {
      const iframeRef = useRef(null);
      const beliefDataRef = useRef(null);
      const isMig = CONFIG.supergame === 'migraines';

      useEffect(() => {
        const handleMessage = (event) => {
          if (event.data.type === 'GAME_DATA' && event.data.dataType === 'CAUSAL_BELIEFS') {
            beliefDataRef.current = event.data.data;
          }
          if (event.data.type === 'GAME_DATA' && event.data.dataType === 'ELICIT_COMPLETE') {
            if (beliefDataRef.current) {
              onComplete(beliefDataRef.current);
              beliefDataRef.current = null;
            } else {
              onComplete({});
            }
          }
        };
        window.addEventListener('message', handleMessage);

        const mainCausals = isMig
          ? [
              { causalElicit: "AY", exoButton: 0, id: "AY0" },
              { causalElicit: "AY", exoButton: 1, id: "AY1" }
            ]
          : (order === 'AY' ? [{ causalElicit: "AY", exoButton: null, id: "AY" }] : [{ causalElicit: "XY", exoButton: null, id: "XY" }]);

        const sendInit = () => {
          if (iframeRef.current && iframeRef.current.contentWindow) {
            iframeRef.current.contentWindow.postMessage({
              type: 'INIT',
              gameConfig: {
                playerName0, playerName1, playerName2Pos, playerName2Neg,
                aCost, currency, themeColor,
                skipIntro: true,
                forceSkipPieCharts: true,
                mainCausals,
                beliefPaymentMax: 10,
                beliefPaymentIncentive: 0.5,
                ...(isMig ? { supergame: 'migraines' } : { order })
              }
            }, '*');
          }
        };
        const timeout = setTimeout(sendInit, 500);
        return () => {
          window.removeEventListener('message', handleMessage);
          clearTimeout(timeout);
        };
      }, [onComplete, playerName0, playerName1, playerName2Pos, playerName2Neg, aCost, currency, order, themeColor, isMig]);

      return (
        <iframe
          ref={iframeRef}
          src="beliefV2.html"
          style={{ width: '100%', height: '100vh', border: 'none' }}
          onLoad={() => {
            if (iframeRef.current && iframeRef.current.contentWindow) {
              const mainCausals = isMig
                ? [
                    { causalElicit: "AY", exoButton: 0, id: "AY0" },
                    { causalElicit: "AY", exoButton: 1, id: "AY1" }
                  ]
                : (order === 'AY' ? [{ causalElicit: "AY", exoButton: null, id: "AY" }] : [{ causalElicit: "XY", exoButton: null, id: "XY" }]);
              iframeRef.current.contentWindow.postMessage({
                type: 'INIT',
                gameConfig: {
                  playerName0, playerName1, playerName2Pos, playerName2Neg,
                  aCost, currency, themeColor,
                  skipIntro: true,
                  forceSkipPieCharts: true,
                  mainCausals,
                  beliefPaymentMax: 10,
                  beliefPaymentIncentive: 0.5,
                  ...(isMig ? { supergame: 'migraines' } : { order })
                }
              }, '*');
            }
          }}
        />
      );
    }

    function CompactHistory({ history }) {

    // =============== PRICE ELICITATION INTRO ===============

    // =============== PRICE DIVIDER PAGE ===============
    function PriceDividerPage({ nextPrice, nextX, nextRound, totalRounds, onContinue, choices, onGoBack, isFinalReview }) {
      const isMig = CONFIG.supergame === 'migraines';
      const [isLoading, setIsLoading] = useState(true);
      const [showRest, setShowRest] = useState(false);
      const orderedPrices = getOrderedPrices();
      const theme = getThemeClasses(CONFIG.themeColor);

      // For migraines, check inconsistency separately for craving (X=1) and no-craving (X=0).
      let isInconsistent;
      if (isMig) {
        const sortedCraving = orderedPrices.map(p => choices.find(c => c.price === p && c.X === 1)).filter(c => c !== undefined);
        const sortedNoCraving = orderedPrices.map(p => choices.find(c => c.price === p && c.X === 0)).filter(c => c !== undefined);
        isInconsistent = hasInconsistentChoices(sortedCraving) || hasInconsistentChoices(sortedNoCraving);
      } else {
        const sortedChoices = orderedPrices.map(p => choices.find(c => c.price === p)).filter(c => c !== undefined);
        isInconsistent = hasInconsistentChoices(sortedChoices);
      }

      useEffect(() => {
        setIsLoading(true);
        setShowRest(false);
        const t1 = setTimeout(() => setIsLoading(false), 1000);
        // For migraines (non-review), show title only for ~1.5s, then reveal rest.
        // Other cases reveal the rest immediately after the spinner.
        const restDelay = (isMig && !isFinalReview) ? 2500 : 1000;
        const t2 = setTimeout(() => setShowRest(true), restDelay);
        return () => { clearTimeout(t1); clearTimeout(t2); };

        return (
          <div className="min-h-screen bg-white flex items-start justify-center pt-12">

              <p className="text-gray-500">Loading...</p>
            </div>
          </div>
        );
      }

      const headline = isMig ? `Drinking ${CONFIG.playerName0} now pays you:` : `The price of ${CONFIG.playerName0} is now:`;
      // Migraines preview values
      const prices = CONFIG.priceElicitationPrices;
      const baseline = prices[Math.floor(prices.length / 2)];
      const additional = nextPrice - baseline;
      const formatSignedCurrency = (v) => v === 0
        ? `${CONFIG.currency}0`
        : `${v > 0 ? '+' : '-'}${CONFIG.currency}${Math.abs(v)}`;

      return (
        <div className="min-h-screen bg-white px-4 pt-8">

                    {nextX === 1 ? (
                      <>In the Next Choice, You Have a <span className="bg-yellow-200 px-2 py-0.5 rounded">Craving</span></>
                    ) : (
                      <>In the Next Choice, You Have <span className="bg-yellow-200 px-2 py-0.5 rounded">No Craving</span></>
                    )}
                  </h1>
                </div>
              ) : (
                <h1 className="text-3xl font-bold text-gray-900 mb-4">Next Choice</h1>
              )
            )}

            {showRest && !isFinalReview && (
              isMig ? (() => {
                // Button label flips by craving state; actual payment is always +price.
                // paymentChange = total - button so the displayed math adds up; total is same across rows.
                const sign = nextX === 1 ? 1 : -1;
                const buttonAmount = sign * baseline;
                const paymentChange = nextPrice - buttonAmount;
                const totalPayment = nextPrice;
                return (
                  <div className="flex flex-col items-center mb-6">
                    {/* Drink button preview */}
                    <div className="w-36 h-24 px-2 py-2 rounded-xl font-bold flex flex-col items-center justify-center gap-1 border-2 bg-red-500 border-red-500 shadow-md">
                      <DrinkIcon className={`w-10 h-10 ${theme.iconColor}`} drinkName={CONFIG.playerName0} />
                      <div className="text-center">
                        <div className="text-sm font-bold text-white">{formatSignedCurrency(buttonAmount)}</div>
                        <div className="text-[10px] mt-1 text-white">Drink {CONFIG.playerName0}</div>
                      </div>
                    </div>
                    {/* Additional and Total payment lines, aligned left under button */}
                    <div className="mt-3 space-y-1 text-lg text-gray-600 text-left">
                      <div className="flex items-center gap-2 whitespace-nowrap">
                        <span>Additional payment for consuming the drink:</span>
                        <span className="font-bold">{formatSignedCurrency(paymentChange)}</span>
                      </div>
                      <div className="flex items-center gap-2 whitespace-nowrap">
                        <span>Total payment for consuming the drink:</span>
                        <span className="inline-block rounded px-2 py-0.5 font-bold bg-amber-400 text-amber-900">{formatSignedCurrency(totalPayment)}</span>
                      </div>
                    </div>
                    <p className="text-gray-700 text-lg mt-4">
                      Bonus for feeling {CONFIG.playerName2Pos}: <span className="text-3xl font-bold text-green-600">{CONFIG.currency}{CONFIG.priceElicitationBonus}</span>
                    </p>
                  </div>
                );
              })() : (
                <div className="mb-6 border-2 border-gray-200 rounded-xl p-6 inline-block">
                  <p className="text-gray-700 text-lg">{headline}</p>
                  <div className="text-4xl font-bold text-amber-600 mt-3">
                    {nextPrice === 0 ? 'Free' : `${CONFIG.currency}${nextPrice}`}
                  </div>
                  <p className="text-gray-700 text-lg mt-4">
                    Bonus for feeling {CONFIG.playerName2Pos}: <span className="text-3xl font-bold text-green-600">{CONFIG.currency}{CONFIG.priceElicitationBonus}</span>
                  </p>
                </div>
              )
            )}

            {isFinalReview && (
              <p className="text-gray-700 text-xl mb-6">
                You have completed all {totalRounds} choices. Please review your choices below and click "Submit" to continue.
              </p>
            )}

            {showRest && (<>
            {/* Choices so far — chip grid */}
            <div className="mb-6">
              <p className="text-gray-500 text-sm mb-2">Your choices:</p>
              {isMig ? (
                <>
                  {[1, 0].map((rowX) => (
                    <div key={rowX} className="flex items-center justify-center gap-2 mb-1.5">
                      <span className="text-gray-600 text-xs w-24 text-right">{rowX === 1 ? 'Craving:' : 'No craving:'}</span>
                      <div className="flex flex-wrap gap-1.5">
                        {orderedPrices.map((price) => {
                          const choiceData = choices.find(c => c.price === price && c.X === rowX);
                          const hsIdx = getOrderedHSRounds().findIndex(r => r.price === price && r.X === rowX);
                          const isNextChoice = !isFinalReview && hsIdx === nextRound - 1;
                          const isPastChoice = choiceData !== undefined;
                          return (
                            <button
                              key={`${price}-${rowX}`}
                              onClick={() => isPastChoice && onGoBack && onGoBack(hsIdx + 1)}
                              disabled={!isPastChoice}
                              className={`px-2 py-1 rounded text-xs font-medium transition-all ${
                                isNextChoice
                                  ? 'bg-amber-50 border border-amber-300 text-amber-600'
                                  : choiceData
                                    ? choiceData.choice === 1
                                      ? 'bg-blue-50 border border-blue-200 text-blue-600 hover:bg-blue-100 cursor-pointer'
                                      : 'bg-gray-100 border border-gray-200 text-gray-500 hover:bg-gray-200 cursor-pointer'
                                    : 'bg-white border border-gray-100 text-gray-300'
                              }`}
                            >
                              <div>Total: {CONFIG.currency}{price}</div>
                              <div className="text-xs">
                                {choiceData ? (choiceData.choice === 1 ? 'Drink' : 'Skip') : '—'}
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </>
              ) : (
                <div className="flex flex-wrap justify-center gap-1.5">
                  {orderedPrices.map((price, idx) => {
                    const choiceData = choices.find(c => c.price === price);
                    const isNextChoice = !isFinalReview && idx === nextRound - 1;
                    const isPastChoice = choiceData !== undefined;
                    return (
                      <button
                        key={price}
                        onClick={() => isPastChoice && onGoBack && onGoBack(idx + 1)}
                        disabled={!isPastChoice}
                        className={`px-2 py-1 rounded text-xs font-medium transition-all ${
                          isNextChoice
                            ? 'bg-amber-50 border border-amber-300 text-amber-600'
                            : choiceData
                              ? choiceData.choice === 1
                                ? 'bg-blue-50 border border-blue-200 text-blue-600 hover:bg-blue-100 cursor-pointer'
                                : 'bg-gray-100 border border-gray-200 text-gray-500 hover:bg-gray-200 cursor-pointer'
                              : 'bg-white border border-gray-100 text-gray-300'
                        }`}
                      >
                        <div>{price === 0 ? 'Free' : `${CONFIG.currency}${price}`}</div>
                        <div className="text-xs">
                          {choiceData ? (choiceData.choice === 1 ? 'Drink' : 'Skip') : '—'}
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
              {choices.length > 0 && (
                <p className="text-gray-400 text-xs mt-2">Click on any choice to change it</p>
              )}
            </div>

            {isInconsistent && (
              <div className="bg-red-50 border border-red-200 rounded-lg p-3 mb-6">
                <div className="flex items-center justify-center gap-2 text-red-600 font-medium text-sm mb-1">
                  <span>⚠️</span>
                  <span>Please Double-Check Your Choices</span>
                </div>
                <p className="text-red-500 text-xs">
                  {isMig
                    ? `Your choices seem inconsistent: you chose to skip ${CONFIG.playerName0} at a higher payment but drink it at a lower payment. Usually, people are more willing to drink when the payment is higher. Please click on any choice above to change it, or continue if this is intentional.`
                    : `Your choices seem inconsistent: you chose to drink ${CONFIG.playerName0} at a higher price but skip it at a lower price. Usually, people are more willing to drink when the price is lower. Please click on any choice above to change it, or continue if this is intentional.`}
                </p>
              </div>
            )}

            <button
              onClick={onContinue}
              className={`px-8 py-4 ${theme.buttonBg} ${theme.buttonHover} text-white font-bold text-lg rounded-xl shadow-lg hover:shadow-xl transition-all`}
            >
              {isFinalReview ? 'Submit' : 'Continue'}
            </button>
            </>)}
          </div>
        </div>
      );
    }

    // =============== PRICE ELICITATION PANEL (per-choice page) ===============
    function PriceElicitationPanel({ price, roundNumber, totalRounds, onChoice, stats, history, waitingForSpace, pendingChoice, currentX, decisionEnabled }) {
      const isMig = CONFIG.supergame === 'migraines';

      let pillText;

                  <div className="text-amber-600 text-lg">{totalRounds}</div>

                  <div className="h-full bg-gradient-to-r from-amber-400 to-amber-600 transition-all duration-300" style={{ width: `${(roundNumber / totalRounds) * 100}%` }} />

              <XYConnection
                X={null}
                A={null}
                Y={null}
                stats={stats}
                hideRateBox={false}
                showBonus={CONFIG.priceElicitationBonus}
                alignStart={isMig}
                actionSlot={isMig ? (
                  <InlinePriceElicitationButtons
                    price={price}
                    onChoice={onChoice}

              />

            <div className="grid grid-cols-3 gap-4">
              {isMig ? (

              ) : (
                <PriceElicitationDecisionPanel
                  price={price}
                  onChoice={onChoice}
                  stats={stats}
                  isFirstRound={roundNumber === 1 && !waitingForSpace}
