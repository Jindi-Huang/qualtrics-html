                />
              )}
              <XStatsPanel stats={stats} currentX={null} currentY={null} currentA={null} />
              <CompactHistory history={history} />
            </div>
          </div>
        </div>
      );
    }

    // =============== MAIN APP ===============
    function BeverageExperiment() {
      const isMig = CONFIG.supergame === 'migraines';

      const [ready, setReady] = useState(false);
      const [currentRound, setCurrentRound] = useState(1);
      const [phase, setPhase] = useState('decision');
      const [history, setHistory] = useState([]);
      const [currentA, setCurrentA] = useState(null);
      const [currentX, setCurrentX] = useState(null);
      const [currentY, setCurrentY] = useState(null);
      const [showNewDay, setShowNewDay] = useState(false);
      const [nextDayNumber, setNextDayNumber] = useState(2);

      const [showDAG, setShowDAG] = useState(false);
      const [dagCompleted, setDagCompleted] = useState(false);
      const [dagData, setDagData] = useState({ initial: null, final: null, confidence: null, alertCount: null });
      const [hideRateBox, setHideRateBox] = useState(false);

      const [showBelief, setShowBelief] = useState(false);
      const [beliefData, setBeliefData] = useState(null);

      const [priceElicitationRound, setPriceElicitationRound] = useState(0);
      const [priceElicitationChoices, setPriceElicitationChoices] = useState([]);
      const [showPriceDivider, setShowPriceDivider] = useState(false);
      const [priceElicitationReturnRound, setPriceElicitationReturnRound] = useState(null);

      const [waitingForSpace, setWaitingForSpace] = useState(null);
      const [pendingResult, setPendingResult] = useState(null);
      const [decisionEnabled, setDecisionEnabled] = useState(false); // migraines-only gate

      const [priceElicitationWaitingForSpace, setPriceElicitationWaitingForSpace] = useState(false);
      const [pendingPriceChoice, setPendingPriceChoice] = useState(null);

      const roundTimesRef = useRef([]);
      const roundStartTimeRef = useRef(Date.now());
      const dataSentRef = useRef(false);
      const halfwayDAGShownRef = useRef(false);
      const beliefShownRef = useRef(false);
      const advancePendingRef = useRef(false);
      const gameCompleteRef = useRef(false);
      const roundTimestampsRef = useRef([]);
      const phaseStartTimeRef = useRef(Date.now());
      const sampledForRoundRef = useRef(null);
      const sampledForPriceRoundRef = useRef(null);

      // Warn before unload
      useEffect(() => {
        const handler = (e) => {
          if (gameCompleteRef.current) return;
          e.preventDefault();
          e.returnValue = '';
        };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, []);

      // Init: wait for Qualtrics config (max 3 s)
      useEffect(() => {
        const timeout = setTimeout(() => {
          if (!ready) {
            console.log('Timeout: starting with default config');
            setReady(true);
            roundStartTimeRef.current = Date.now();
            phaseStartTimeRef.current = Date.now();
          }
        }, 3000);
        onInitialized(() => {
          clearTimeout(timeout);
          setReady(true);
          roundStartTimeRef.current = Date.now();
          phaseStartTimeRef.current = Date.now();
        });
        return () => clearTimeout(timeout);
      }, []);

      // Space-bar listener for main outcome→next-round (price elicitation auto-advances now)
      useEffect(() => {
        const handleKeyDown = (e) => {
          // Main round: outcome → next round
          if (e.code === 'Space' && waitingForSpace === 'nextRound') {
            e.preventDefault();
            if (advancePendingRef.current) return;
            advancePendingRef.current = true;
            const remaining = Math.max(0, 1000 - (Date.now() - phaseStartTimeRef.current));

            setTimeout(() => {
              advancePendingRef.current = false;
              const currentTimestamps = roundTimestampsRef.current[roundTimestampsRef.current.length - 1];
              if (currentTimestamps) currentTimestamps.outcomeViewTime = (Date.now() - phaseStartTimeRef.current) / 1000;

              setWaitingForSpace(null);
              setPendingResult(null);

              if (currentRound >= CONFIG.totalRounds) {
                setPhase('priceIntro');
              } else if (currentRound === 10 && !beliefShownRef.current) {
                beliefShownRef.current = true;
                setShowBelief(true);
              } else if (currentRound === Math.floor(CONFIG.totalRounds / 2) && !halfwayDAGShownRef.current && CONFIG.order !== 'AY') {
                halfwayDAGShownRef.current = true;
                setShowDAG(true);
              } else {
                setNextDayNumber(currentRound + 1);
                setShowNewDay(true);
                setTimeout(() => {
                  setCurrentA(null);
                  setCurrentX(null);
                  setCurrentY(null);
                  setDecisionEnabled(false);
                }, 200);
                setTimeout(() => {
                  setShowNewDay(false);
                  setCurrentRound(prev => prev + 1);
                  setPhase('decision');
                  roundStartTimeRef.current = Date.now();
                  phaseStartTimeRef.current = Date.now();
                }, 1000);
              }
            }, remaining);
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [waitingForSpace, pendingResult, currentRound]);

      const stats = calculateStats(history);

      // ---- handleChoice: dieter samples here; migraines uses pre-sampled pendingResult ----
      const handleChoice = useCallback((A) => {
        const decisionTime = (Date.now() - roundStartTimeRef.current) / 1000;
        roundTimesRef.current.push(decisionTime);
        roundTimestampsRef.current.push({
          round: currentRound,
          decisionTime,
          chemicalViewTime: null,
          outcomeViewTime: null
        });

        setCurrentA(A);

        if (isMig) {
          // Migraines: X+Y were sampled at round start; just transition to outcome after a brief reveal
          const result = pendingResult || simulateRound(A);
          setTimeout(() => {
            phaseStartTimeRef.current = Date.now();
            setPhase('outcome');
            setCurrentY(result.Y);
            setHistory(prev => [...prev, [A, result.X, result.Y]]);
            setWaitingForSpace('nextRound');
          }, 1200);
          return;
        }

        // Dieter: classic 3-phase cascade — decision → chemical → outcome
        // AYX: Y reveals first (in 'chemical'), then X reveals (in 'outcome')
        // AXY/AY: X reveals first (in 'chemical'), then Y reveals (in 'outcome')
        const isAYX = CONFIG.order === 'AYX';
        setPhase('chemical');
        const result = simulateRound(A);
        setPendingResult({ A, X: result.X, Y: result.Y });
        const preChemicalDelay = CONFIG.order === 'AY' ? 0 : 800;
        setTimeout(() => {
          if (isAYX) setCurrentY(result.Y);
          else setCurrentX(result.X);
          phaseStartTimeRef.current = Date.now();
          setTimeout(() => {
            const currentTimestamps = roundTimestampsRef.current[roundTimestampsRef.current.length - 1];
            if (currentTimestamps) currentTimestamps.chemicalViewTime = (Date.now() - phaseStartTimeRef.current) / 1000;
            phaseStartTimeRef.current = Date.now();
            setPhase('outcome');
            if (isAYX) setCurrentX(result.X);
            else setCurrentY(result.Y);
            setHistory(prev => [...prev, [A, result.X, result.Y]]);
            setWaitingForSpace('nextRound');
          }, 1200);
        }, preChemicalDelay);
      }, [currentRound, isMig, pendingResult]);

      // ---- migraines-only: sample X+Y at start of each main-game decision round ----
      useEffect(() => {
        if (!isMig) return;
        if (!ready) return;
        if (phase !== 'decision') return;
        if (showNewDay) return;
        if (currentX !== null) return;
        if (sampledForRoundRef.current === currentRound) return;
        sampledForRoundRef.current = currentRound;
        const result = simulateRound(0);
        setPendingResult({ A: null, X: result.X, Y: result.Y });
        const timer = setTimeout(() => setCurrentX(result.X), 1200);
        return () => clearTimeout(timer);
      }, [ready, phase, showNewDay, currentX, currentRound, isMig]);

      // ---- migraines-only: enable buttons shortly after craving is revealed ----
      useEffect(() => {
        if (!isMig) return;
        if (phase !== 'decision') return;
        if (currentX === null) return;
        if (decisionEnabled) return;
        const timer = setTimeout(() => {
          setDecisionEnabled(true);
          roundStartTimeRef.current = Date.now();
          phaseStartTimeRef.current = Date.now();
        }, 600);
        return () => clearTimeout(timer);
      }, [phase, currentX, decisionEnabled, isMig]);

      // ---- migraines-only: reset craving state on price-round transitions ----
      useEffect(() => {
        if (!isMig) return;
        if (phase !== 'priceElicitation') return;
        setCurrentX(null);
        setCurrentY(null);
        setDecisionEnabled(false);
        setPendingResult(null);
        sampledForPriceRoundRef.current = null;
      }, [phase, priceElicitationRound, showPriceDivider, isMig]);

      // ---- migraines-only: sample for each high-stakes round (X forced by getOrderedHSRounds) ----
      useEffect(() => {
        if (!isMig) return;
        if (!ready) return;
        if (phase !== 'priceElicitation') return;
        if (showPriceDivider) return;
        if (priceElicitationRound === 0) return;
        if (currentX !== null) return;
        if (sampledForPriceRoundRef.current === priceElicitationRound) return;
        sampledForPriceRoundRef.current = priceElicitationRound;
        const result = simulateRound(0);
        const hsRound = getOrderedHSRounds()[priceElicitationRound - 1];
        const X = hsRound ? hsRound.X : 1;
        setPendingResult({ A: null, X, Y: result.Y });
        const timer = setTimeout(() => setCurrentX(X), 1200);
        return () => clearTimeout(timer);
      }, [ready, phase, showPriceDivider, currentX, priceElicitationRound, isMig]);

      // ---- migraines-only: enable high-stakes buttons as soon as craving is revealed ----
      useEffect(() => {
        if (!isMig) return;
        if (phase !== 'priceElicitation') return;
        if (currentX === null) return;
        if (decisionEnabled) return;
        setDecisionEnabled(true);
      }, [phase, currentX, decisionEnabled, isMig]);

      // Price elicitation handlers
      const handlePriceIntroContinue = useCallback(() => {
        setPriceElicitationRound(0);
        setShowPriceDivider(true);
        setPhase('priceElicitation');
      }, []);

      const commitPriceChoice = useCallback((choice) => {
        const hsRound = isMig ? getOrderedHSRounds()[priceElicitationRound - 1] : null;
        const currentPrice = isMig ? hsRound.price : getOrderedPrices()[priceElicitationRound - 1];
        const currentRoundX = isMig ? hsRound.X : null;
        const existingIndex = isMig
          ? priceElicitationChoices.findIndex(c => c.price === currentPrice && c.X === currentRoundX)
          : priceElicitationChoices.findIndex(c => c.price === currentPrice);
        const isEditing = existingIndex >= 0;

        const sampledX = isMig ? (pendingResult ? pendingResult.X : currentX) : undefined;
        const sampledY = isMig ? (pendingResult ? pendingResult.Y : currentY) : undefined;
        const entry = isMig
          ? { price: currentPrice, choice, X: sampledX, Y: sampledY }
          : { price: currentPrice, choice };

        let newChoices;
        if (isEditing) {
          newChoices = [...priceElicitationChoices];
          newChoices[existingIndex] = entry;
        } else {
          newChoices = [...priceElicitationChoices, entry];
        }

        setPriceElicitationChoices(newChoices);
        setPriceElicitationWaitingForSpace(false);
        setPendingPriceChoice(null);

        const totalHSRounds = isMig ? getHSTotalRounds() : CONFIG.priceElicitationPrices.length;
        if (isEditing && priceElicitationReturnRound !== null) {
          setPriceElicitationRound(priceElicitationReturnRound);
          setPriceElicitationReturnRound(null);
          setShowPriceDivider(true);
        } else if (newChoices.length >= totalHSRounds) {
          setShowPriceDivider(true);
          setPriceElicitationRound(totalHSRounds);
        } else {
          setShowPriceDivider(true);
        }
      }, [isMig, priceElicitationRound, priceElicitationChoices, pendingResult, currentX, currentY, priceElicitationReturnRound]);

      const handlePriceElicitationChoice = useCallback((choice) => {
        const currentPrice = isMig
          ? getOrderedHSRounds()[priceElicitationRound - 1].price
          : getOrderedPrices()[priceElicitationRound - 1];
        setPendingPriceChoice({ price: currentPrice, choice });
        setPriceElicitationWaitingForSpace(true);
        // Auto-forward to summary page after brief visual feedback
        setTimeout(() => commitPriceChoice(choice), 500);
      }, [priceElicitationRound, isMig, commitPriceChoice]);

      const handleGoBackToChoice = useCallback((roundNumber) => {
        setPriceElicitationReturnRound(priceElicitationRound);
        setPriceElicitationRound(roundNumber);
        setShowPriceDivider(false);
      }, [priceElicitationRound]);

      const handlePriceDividerContinue = useCallback(() => {
        setShowPriceDivider(false);
        if (priceElicitationRound === 0) setPriceElicitationRound(1);
        else setPriceElicitationRound(prev => prev + 1);
      }, [priceElicitationRound]);

      const handleDAGComplete = useCallback((initialDAG, finalDAG, confidence, DAGAlertCount, initialDAGTime, finalDAGTime, confidenceTime) => {
        setDagData({ initial: initialDAG, final: finalDAG, confidence, alertCount: DAGAlertCount, initialDAGTime, finalDAGTime, confidenceTime });
        setDagCompleted(true);
        setShowDAG(false);
        sendDataToQualtrics('DAG_DATA', {
          initialDAG, finalDAG, confidence, DAGAlertCount,
          initialDAGTime, finalDAGTime, confidenceTime,
          completedAtRound: currentRound
        });
        setCurrentA(null); setCurrentX(null); setCurrentY(null); setDecisionEnabled(false);
        setNextDayNumber(currentRound + 1);
        setShowNewDay(true);
        setPhase('decision');
        setTimeout(() => {
          setShowNewDay(false);
          setCurrentRound(prev => prev + 1);
          roundStartTimeRef.current = Date.now();
          phaseStartTimeRef.current = Date.now();
        }, 1000);
      }, [currentRound]);

      const handleBeliefComplete = useCallback((data) => {
        setBeliefData(data);
        setShowBelief(false);
        sendDataToQualtrics('BELIEF_DATA', { ...data, completedAtRound: currentRound });
        window.scrollTo({ top: 0, behavior: 'smooth' });
        if (window.parent !== window) window.parent.postMessage({ type: 'SCROLL_TO_TOP' }, '*');
        setCurrentA(null); setCurrentX(null); setCurrentY(null); setDecisionEnabled(false);
        setNextDayNumber(currentRound + 1);
        setShowNewDay(true);
        setPhase('decision');
        setTimeout(() => {
          setShowNewDay(false);
          setCurrentRound(prev => prev + 1);
          roundStartTimeRef.current = Date.now();
          phaseStartTimeRef.current = Date.now();
        }, 1000);
      }, [currentRound]);

      if (!ready) {
        return (
          <div className="min-h-screen bg-white flex items-start justify-center pt-12">
            <div className="text-gray-700 text-xl">Loading...</div>
          </div>
        );
      }

      // ---- Final data submission ----
      if (phase === 'complete' && history.length === CONFIG.totalRounds && priceElicitationChoices.length === (isMig ? getHSTotalRounds() : CONFIG.priceElicitationPrices.length) && !dataSentRef.current) {
        dataSentRef.current = true;

        // High-stakes outcomes: migraines reuses sampled X/Y from each round; dieter simulates fresh
        const highStakeOutcomes = priceElicitationChoices.map(c => {
          if (isMig && (c.X === 0 || c.X === 1) && (c.Y === 0 || c.Y === 1)) {
            return { price: c.price, choice: c.choice, X: c.X, Y: c.Y };
          }
          const result = simulateRound(c.choice);
          return { price: c.price, choice: c.choice, X: result.X, Y: result.Y };
        });

        // Per-round payment: migraines (drink pays when craving), dieter (drink always costs)
        const payment = isMig
          ? history.map(([A, X, Y]) => (X === 1 ? CONFIG.aCost : -CONFIG.aCost) * A + CONFIG.yBonus * Y)
          : history.map(([A, X, Y]) => -CONFIG.aCost * A + CONFIG.yBonus * Y);

        // High-stakes payment
        const paymentHighStake = isMig
          ? highStakeOutcomes.map(c => 30 + (c.choice === 1 ? c.price : 0) + (c.Y === 1 ? CONFIG.priceElicitationBonus : 0))
          : highStakeOutcomes.map(c => 30 + (c.choice === 1 ? -c.price : 0) + (c.Y === 1 ? CONFIG.priceElicitationBonus : 0));

        sendDataToQualtrics('FINAL_DATA', {
          history,
          roundTimes: roundTimesRef.current,
          roundTimestamps: roundTimestampsRef.current,
          payment,
          dagInitial: dagData.initial,
          dagFinal: dagData.final,
          dagConfidence: dagData.confidence,
          DAGAlertCount: dagData.alertCount,
          initialDAGTime: dagData.initialDAGTime,
          finalDAGTime: dagData.finalDAGTime,
          confidenceTime: dagData.confidenceTime,
          beliefData,
          priceElicitation: priceElicitationChoices,
          highStakeOutcomes,
          paymentHighStake,
          tracking: getTrackingData()
        });

        setTimeout(() => {
          gameCompleteRef.current = true;
          sendDataToQualtrics('GAME_COMPLETE', { completed: true, tracking: getTrackingData() });
        }, 500);
      }

      // ---- Route to DAG / Belief iframes ----
      if (showDAG) {
        return (
          <DAGIframe
            onComplete={handleDAGComplete}
            playerName0={CONFIG.playerName0}
            playerName1={CONFIG.playerName1}
            playerIcon0={CONFIG.playerIcon0}
            nRounds={CONFIG.totalRounds}
            themeColor={CONFIG.themeColor}
          />
        );
      }
      if (showBelief) {
        return (
          <BeliefIframe
            onComplete={handleBeliefComplete}
            playerName0={CONFIG.playerName0}
            playerName1={CONFIG.playerName1}
            playerName2Pos={CONFIG.playerName2Pos}
            playerName2Neg={CONFIG.playerName2Neg}
            aCost={CONFIG.aCost}
            currency={CONFIG.currency}
            order={CONFIG.order}
            themeColor={CONFIG.themeColor}
          />
        );
      }

      // ---- Price elicitation flow ----
      if (phase === 'priceIntro') {
        return <PriceElicitationIntro onContinue={handlePriceIntroContinue} />;
      }
      if (phase === 'priceElicitation' && showPriceDivider) {
        const hsTotal = isMig ? getHSTotalRounds() : CONFIG.priceElicitationPrices.length;
        const isFinalReview = priceElicitationChoices.length >= hsTotal;
        const nextRound = priceElicitationRound === 0 ? 1 : priceElicitationRound + 1;
        const nextHSRound = isMig ? getOrderedHSRounds()[nextRound - 1] : null;
        const nextPrice = isFinalReview ? null : (isMig ? nextHSRound.price : getOrderedPrices()[nextRound - 1]);
        const nextX = isMig && nextHSRound ? nextHSRound.X : null;
        return (
          <PriceDividerPage
            nextPrice={nextPrice}
            nextX={nextX}
            nextRound={nextRound}
            totalRounds={hsTotal}
            onContinue={isFinalReview ? () => setPhase('complete') : handlePriceDividerContinue}
            choices={priceElicitationChoices}
            onGoBack={handleGoBackToChoice}
            isFinalReview={isFinalReview}
          />
        );
      }
      if (phase === 'priceElicitation') {
        const hsTotal = isMig ? getHSTotalRounds() : CONFIG.priceElicitationPrices.length;
        const currentPrice = isMig
          ? getOrderedHSRounds()[priceElicitationRound - 1].price
          : getOrderedPrices()[priceElicitationRound - 1];
        return (
          <PriceElicitationPanel
            price={currentPrice}
            roundNumber={priceElicitationRound}
            totalRounds={hsTotal}
            onChoice={handlePriceElicitationChoice}
            stats={stats}
            history={history}
            waitingForSpace={priceElicitationWaitingForSpace}
            pendingChoice={pendingPriceChoice?.choice}
            currentX={currentX}
            decisionEnabled={decisionEnabled}
          />
        );
      }
      if (phase === 'complete') {
        return <div className="min-h-screen bg-white" />;
      }

      // ---- Main game render ----
      const theme = getThemeClasses(CONFIG.themeColor);

      // Pill text varies by supergame and phase
      const renderPillText = () => {
        if (isMig) {
          if (phase === 'decision' && currentX === null) return 'Morning...';
          if (phase === 'decision' && currentX !== null && !decisionEnabled) return `Morning: ${currentX === 1 ? 'Craving' : 'NO craving'}`;
          if (phase === 'decision' && currentX !== null && decisionEnabled) return `Your Decision: Will you drink ${CONFIG.playerName0}?`;
        } else {
          if (phase === 'decision') return `Morning: Will you drink ${CONFIG.playerName0}?`;
          if (phase === 'chemical') {
            if (CONFIG.order === 'AY') return 'Later this day...';
            if (CONFIG.order === 'AYX') {
              // AYX: Y is the first reveal — show anticipation until Y is set, then mood pill
              if (currentY === null) return 'Shortly after...';
              const moodName = currentY === 1
                ? `${CONFIG.playerName2Pos.charAt(0).toUpperCase() + CONFIG.playerName2Pos.slice(1)}!`
                : CONFIG.playerName2Neg.charAt(0).toUpperCase() + CONFIG.playerName2Neg.slice(1);
              const Face = currentY === 1 ? HappyFaceIcon : SadFaceIcon;
              return <>Shortly after: {moodName} <Face className="w-5 h-5 inline-block" /></>;
            }
            return `Reading your ${CONFIG.playerName1} level...`;
          }
        }
        if (phase === 'outcome') {
          // AYX: X is the second reveal — announce the level + Press-Space in the same pill
          if (CONFIG.order === 'AYX') {
            if (waitingForSpace === 'nextRound') {
              return (
                <>
                  Your {CONFIG.playerName1} Level is {currentX === 1 ? 'Normal' : 'Abnormal'}.
                  <br />
                  Press "Space" to continue
                </>
              );
            }
            return <>Reading your {CONFIG.playerName1} level...</>;
          }
          const moodName = currentY === 1
            ? `${CONFIG.playerName2Pos.charAt(0).toUpperCase() + CONFIG.playerName2Pos.slice(1)}!`
            : CONFIG.playerName2Neg.charAt(0).toUpperCase() + CONFIG.playerName2Neg.slice(1);
          const Face = currentY === 1 ? HappyFaceIcon : SadFaceIcon;
          return (
            <>Later this day: {moodName} <Face className="w-5 h-5 inline-block" />
              {waitingForSpace === 'nextRound' ? (<><br />Press "Space" to continue</>) : null}
            </>
          );
        }
        return '';
      };

      // Pill background color
      let pillClass = theme.pillBg + ' ' + theme.pillText + ' border ' + theme.pillBorder;
      if (phase === 'chemical') {
        // AYX 'chemical' phase reveals Y — color by mood; otherwise neutral amber
        if (CONFIG.order === 'AYX' && currentY !== null) {
          pillClass = currentY === 1
            ? 'bg-green-50 text-green-700 border border-green-200'
            : 'bg-red-50 text-red-700 border border-red-200';
        } else {
          pillClass = 'bg-amber-50 text-amber-700 border border-amber-200';
        }
      }
      else if (phase === 'outcome') {
        // AYX 'outcome': amber while "Reading..."; color by X (Normal=green, Abnormal=red) once announced
        if (CONFIG.order === 'AYX') {
          if (waitingForSpace === 'nextRound') {
            pillClass = currentX === 1
              ? 'bg-green-50 text-green-700 border border-green-200'
              : 'bg-red-50 text-red-700 border border-red-200';
          } else {
            pillClass = 'bg-amber-50 text-amber-700 border border-amber-200';
          }
        } else {
          pillClass = currentY === 1
            ? 'bg-green-50 text-green-700 border border-green-200'
            : 'bg-red-50 text-red-700 border border-red-200';
        }
      }

      const firstRoundShine = isMig
        ? (currentRound === 1 && phase === 'decision' && decisionEnabled)
        : (currentRound === 1 && phase === 'decision');

      return (
        <div className="min-h-screen bg-white px-4 pt-0 pb-4">
          <div className="max-w-6xl mx-auto">
            <div className={`${theme.panelBg} rounded-2xl p-6 mb-4 border ${theme.panelBorder} shadow-sm relative overflow-hidden`}>
              <NewDayOverlay show={showNewDay} dayNumber={nextDayNumber} />

              <div className="text-center mb-4 h-14 flex items-center justify-center">
                <span className={`inline-block px-4 py-2 rounded-full text-sm font-medium ${pillClass} ${firstRoundShine ? 'first-round-shine-pill' : ''}`}>
                  {renderPillText()}
                </span>
              </div>

              <div className="absolute top-4 left-4 bg-white rounded-xl px-4 py-2 border border-gray-200 shadow-sm">
                <div className="text-gray-700 font-medium text-sm mb-1">Monday</div>
                <div className="flex items-center gap-3">
                  <div>
                    <span className="text-gray-400 text-sm">Week</span>
                    <div className="text-gray-900 text-2xl font-bold">{currentRound}</div>
                  </div>
                  <div className="text-gray-300 text-xl">/</div>
                  <div className="text-gray-400 text-lg">{CONFIG.totalRounds}</div>
                </div>
                <div className="w-20 h-2 bg-gray-200 rounded-full mt-2 overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-300" style={{ width: `${(currentRound / CONFIG.totalRounds) * 100}%` }} />
                </div>
              </div>

              <XYConnection
                X={isMig ? null : currentX}
                A={isMig ? currentA : null}
                Y={currentY}
                stats={stats}
                hideRateBox={hideRateBox}
                actionSlot={isMig ? (
                  <InlineDrinkSkipButtons
                    onChoice={handleChoice}
                    disabled={phase !== 'decision' || !decisionEnabled || currentA !== null}
                    isFirstRound={currentRound === 1 && decisionEnabled}
                    selectedChoice={currentA}
                    X={currentX}
                  />
                ) : null}
              />
            </div>

            <div className="grid grid-cols-3 gap-4">
              {isMig ? (
                <DrinkDecisionPanel stats={stats} X={currentX} />
              ) : (
                <DrinkDecisionPanel
                  onChoice={handleChoice}
                  disabled={phase !== 'decision'}
                  stats={stats}
                  isFirstRound={currentRound === 1}
                  selectedChoice={currentA}
                />
              )}
              <XStatsPanel stats={stats} currentX={currentX} currentY={currentY} currentA={currentA} />
              <CompactHistory history={history} />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BeverageExperiment />);
  </script>
</body>
</html>
