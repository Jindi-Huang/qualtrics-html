<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dieter's Dilemma</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #ffffff; }

    /* First-round guidance: two-step shine/blink */
    @keyframes shineGlow {
      0%, 100% { box-shadow: 0 0 4px 2px rgba(250,204,21,0.3); }
      50% { box-shadow: 0 0 16px 6px rgba(250,204,21,0.7); }
    }
    /* Step 1: pill shines first (0–2s) */
    .first-round-shine-pill {
      animation: shineGlow 0.65s ease-in-out 3;
    }
    /* Step 2: panel shines after (starts at 2s), loops until choice */
    .first-round-shine-panel {
      animation: shineGlow 0.8s ease-in-out 2s infinite;
    }

    /* Hide slider thumb when confidence not yet selected */
    .slider-hidden-thumb::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      opacity: 0;
    }
    .slider-hidden-thumb::-moz-range-thumb {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    // =============== QUALTRICS COMMUNICATION ===============
    let participantId = null;
    let gameId = null;
    
    // Receive config from Qualtrics
    window.addEventListener('message', function(event) {
      if (event.data.type === 'INIT') {
        console.log('Received INIT from Qualtrics:', event.data);
        participantId = event.data.participantId;
        gameId = event.data.gameId;
        
        if (event.data.gameConfig) {
          const qConfig = event.data.gameConfig;
          if (qConfig.nRounds !== undefined) CONFIG.totalRounds = parseInt(qConfig.nRounds) || CONFIG.totalRounds;
          if (qConfig.id) CONFIG.id = qConfig.id;
          if (qConfig.yBonus !== undefined) CONFIG.yBonus = qConfig.yBonus;
          if (qConfig.aCost !== undefined) CONFIG.aCost = qConfig.aCost;
          if (qConfig.pY !== undefined) CONFIG.pY = qConfig.pY;
          if (qConfig.playerName0) CONFIG.playerName0 = qConfig.playerName0;
          if (qConfig.playerName1) CONFIG.playerName1 = qConfig.playerName1;
          if (qConfig.playerName2) CONFIG.playerName2 = qConfig.playerName2;
          if (qConfig.playerName2Pos) CONFIG.playerName2Pos = qConfig.playerName2Pos;
          if (qConfig.playerName2Neg) CONFIG.playerName2Neg = qConfig.playerName2Neg;
          if (qConfig.playerIcon0) CONFIG.playerIcon0 = qConfig.playerIcon0;
          if (qConfig.currentSymbol) CONFIG.currentSymbol = qConfig.currentSymbol;
          if (qConfig.causal !== undefined) CONFIG.causal = qConfig.causal;
          // Collider parameters (causal=0)
          if (qConfig.beta00 !== undefined) CONFIG.beta00 = qConfig.beta00;
          if (qConfig.beta01 !== undefined) CONFIG.beta01 = qConfig.beta01;
          if (qConfig.beta10 !== undefined) CONFIG.beta10 = qConfig.beta10;
          if (qConfig.beta11 !== undefined) CONFIG.beta11 = qConfig.beta11;
          // Causal parameters (causal=1)
          if (qConfig.sigma0 !== undefined) CONFIG.sigma0 = qConfig.sigma0;
          if (qConfig.sigma1 !== undefined) CONFIG.sigma1 = qConfig.sigma1;
          if (qConfig.rho0 !== undefined) CONFIG.rho0 = qConfig.rho0;
          if (qConfig.rho1 !== undefined) CONFIG.rho1 = qConfig.rho1;
          if (qConfig.order) CONFIG.order = qConfig.order;
          if (qConfig.increasingPrice !== undefined) CONFIG.increasingPrice = parseInt(qConfig.increasingPrice);
          if (qConfig.themeColor) CONFIG.themeColor = qConfig.themeColor;
          console.log('Applied config:', CONFIG);
        }
        
        // Mark as initialized and trigger callbacks
        markInitialized();
        
        sendDataToQualtrics('GAME_START', { started: true });
      }
    });
    
    // Send data to Qualtrics
    function sendDataToQualtrics(dataType, data) {
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'GAME_DATA',
          gameId: gameId,
          dataType: dataType,
          data: data,
          participantId: participantId,
          timestamp: new Date().toISOString()
        }, '*');
      }
      console.log('Sent to Qualtrics:', dataType, data);
    }
    
    // =============== INTERACTION TRACKING ===============
    const trackingStartTime = Date.now();
    let mouseMoved = false;
    let mouseMoveCount = 0;
    let clickCount = 0;
    let keyCount = 0;
    let pasted = false;
    let copied = false;
    let tabHidden = false;
    let windowBlurred = false;
    let scrollEventCount = 0;
    let eventLog = [];

    // Mouse movement tracking
    document.addEventListener("mousemove", () => {
      mouseMoveCount += 1;
      mouseMoved = true;
    });

    // Scroll tracking
    document.addEventListener("scroll", () => {
      scrollEventCount += 1;
    }, { passive: true });

    // Click tracking
    document.addEventListener("click", () => {
      clickCount += 1;
    });

    // Keyboard tracking
    document.addEventListener("keydown", () => {
      keyCount += 1;
    });

    // Paste tracking
    document.addEventListener("paste", () => {
      pasted = true;
      eventLog.push({ event: "PASTE", time: Date.now() });
    });

    // Copy tracking
    document.addEventListener("copy", () => {
      copied = true;
      eventLog.push({ event: "COPY", time: Date.now() });
    });

    // Tab visibility tracking
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        tabHidden = true;
        eventLog.push({ event: "TAB_HIDDEN", time: Date.now() });
      } else {
        eventLog.push({ event: "TAB_VISIBLE", time: Date.now() });
      }
    });

    // Window focus tracking
    window.addEventListener("blur", () => {
      windowBlurred = true;
      eventLog.push({ event: "WINDOW_BLUR", time: Date.now() });
    });

    window.addEventListener("focus", () => {
      eventLog.push({ event: "WINDOW_FOCUS", time: Date.now() });
    });

    // Function to get all tracking data
    function getTrackingData() {
      const endTime = Date.now();
      const timeOnPage = Math.round((endTime - trackingStartTime) / 1000);
      return {
        start_time: trackingStartTime,
        time_on_page: timeOnPage,
        mouse_moved: mouseMoved,
        mouse_move_count: mouseMoveCount,
        click_count: clickCount,
        total_keys: keyCount,
        paste_detected: pasted,
        copy_detected: copied,
        tab_hidden: tabHidden,
        window_blurred: windowBlurred,
        scroll_event_count: scrollEventCount,
        event_log: eventLog
      };
    }

    // Configuration (matches Qualtrics embedded data names)
    // A = drink decision (1=drink, 0=skip)
    // X = chemical level (1=normal, 0=abnormal)
    // Y = feeling (1=playerName2Pos, 0=playerName2Neg)
    const CONFIG = {
      yBonus: 2.00,           // Bonus when Y=1
      aCost: 1.50,            // Cost of drinking (A=1)
      totalRounds: 80,
      currency: '$',
      id: 1,
      
      // DGP parameters
      causal: 0,              // 0 = collider, 1 = causal chain
      pY: 0.50,               // P(Y=1) base probability (used when causal=0)
      
      // Collider parameters (causal=0): P(X=1) = beta[A*2 + Y]
      beta00: 0.05,           // P(X=1 | A=0, Y=0)
      beta01: 0.80,           // P(X=1 | A=0, Y=1)
      beta10: 0.80,           // P(X=1 | A=1, Y=0)
      beta11: 0.95,           // P(X=1 | A=1, Y=1)
      
      // Causal chain parameters (causal=1)
      sigma0: 0.20,           // P(X=1 | A=0)
      sigma1: 0.80,           // P(X=1 | A=1)
      rho0: 0.20,             // P(Y=1 | X=0)
      rho1: 0.80,             // P(Y=1 | X=1)

      // Display order
      order: 'AXY',            // 'AXY' shows all, 'AY' hides X

      // Price elicitation prices (low to high)
      priceElicitationPrices: [0, 2.5, 5, 7.5, 9.5, 12, 14.5],
      priceElicitationBonus: 50,
      increasingPrice: 0,       // 1 = low to high, 0 = high to low

      playerName0: 'Zerqalase-norm', // Drink name (A)
      playerName1: 'Zerqalase',   // Chemical name (X)
      playerName2: 'Feeling',   // Outcome name (Y)
      playerName2Pos: 'energetic', // Positive outcome (Y=1)
      playerName2Neg: 'tired',     // Negative outcome (Y=0)
      playerIcon0: '🥤',        // Icon for drink action (A)
      currentSymbol: null,      // HTML for scenario tile display
      themeColor: 'purple',       // Theme color for backgrounds: 'blue', 'purple', 'teal', 'yellow'
    };

    // Theme color helper - returns background classes based on theme
    function getThemeClasses() {
      const themes = {
        blue: {
          panelBg: 'bg-blue-50',
          panelBorder: 'border-blue-200',
          statBoxBg: 'bg-blue-50/50',
          buttonBg: 'bg-blue-600',
          buttonHover: 'hover:bg-blue-500',
          buttonRing: 'ring-blue-300',
          pillBg: 'bg-blue-50',
          pillText: 'text-blue-700',
          pillBorder: 'border-blue-200',
          iconColor: 'text-blue-600',
        },
        purple: {
          panelBg: 'bg-purple-50',
          panelBorder: 'border-purple-200',
          statBoxBg: 'bg-purple-50/50',
          buttonBg: 'bg-purple-600',
          buttonHover: 'hover:bg-purple-500',
          buttonRing: 'ring-purple-300',
          pillBg: 'bg-purple-50',
          pillText: 'text-purple-700',
          pillBorder: 'border-purple-200',
          iconColor: 'text-purple-600',
        },
        teal: {
          panelBg: 'bg-teal-50',
          panelBorder: 'border-teal-200',
          statBoxBg: 'bg-teal-50/50',
          buttonBg: 'bg-teal-600',
          buttonHover: 'hover:bg-teal-500',
          buttonRing: 'ring-teal-300',
          pillBg: 'bg-teal-50',
          pillText: 'text-teal-700',
          pillBorder: 'border-teal-200',
          iconColor: 'text-teal-600',
        },
        yellow: {
          panelBg: 'bg-amber-50',
          panelBorder: 'border-amber-300',
          statBoxBg: 'bg-amber-50/50',
          buttonBg: 'bg-amber-600',
          buttonHover: 'hover:bg-amber-500',
          buttonRing: 'ring-amber-400',
          pillBg: 'bg-amber-100',
          pillText: 'text-amber-800',
          pillBorder: 'border-amber-400',
          iconColor: 'text-amber-700',
        }
      };
      return themes[CONFIG.themeColor] || themes.blue;
    }
  </script>

    function SadFaceIcon({ className }) {
      return (

          <path d="m980022 0c270553 0 515558 109746 692917 287105s287105 422365 287105 692917c0 270553-109746 515558-287105 692917s-422365 287105-692917 287105c-270553 0-515558-109746-692917-287105s-287105-422365-287105-692917c0-270553 109746-515558 287105-692917s422365-287105 692917-287105zm593936 386086c-152010-152010-362027-246064-593936-246064s-441926 94054-593936 246064-246064 362027-246064 593936 94054 441926 246064 593936 362027 246064 593936 246064 441926-94054 593936-246064 246064-362027 246064-593936-94054-441926-246064-593936z" fillRule="nonzero"/>

    function NeutralFaceIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="currentColor" stroke="currentColor">
          <path d="m42.07179 9.7714a22.99476 22.99476 0 1 1 -4.0696-4.0195" fill="none" strokeLinecap="round" strokeMiterlimit="10" strokeWidth="2"/>
          <circle cx="40.094" cy="7.781" r="1" stroke="none"/>
          <ellipse cx="31.6" cy="19.125" rx="2.4" ry="3" stroke="none"/>
          <ellipse cx="16.4" cy="19.125" rx="2.4" ry="3" stroke="none"/>
        </svg>
      );
    }
    
    // Track if config has been received from Qualtrics
    let isInitialized = false;
    let initCallbacks = [];
    
    function onInitialized(callback) {
      if (isInitialized) {
        callback();
      } else {
        initCallbacks.push(callback);
      }
    }
    
    function markInitialized() {
      isInitialized = true;
      initCallbacks.forEach(cb => cb());
      initCallbacks = [];
    }

    // Get price elicitation prices in correct order based on increasingPrice config
    function getOrderedPrices() {
      const prices = [...CONFIG.priceElicitationPrices];
      return CONFIG.increasingPrice === 1 ? prices : prices.reverse();
    }

    // Check if choices are inconsistent
    // For decreasing prices: inconsistent if user drinks at higher price but skips at lower price
    // For increasing prices: inconsistent if user skips at lower price but drinks at higher price
    function hasInconsistentChoices(sortedChoices) {
      if (sortedChoices.length < 2) return false;

      // For decreasing prices (high to low), rational behavior is: Skip...Skip, Drink...Drink
      // Inconsistent: any switch from Drink (1) to Skip (0)
      // For increasing prices (low to high), rational behavior is: Drink...Drink, Skip...Skip
      // Inconsistent: any switch from Skip (0) to Drink (1)

      const isDecreasing = CONFIG.increasingPrice === 0;

      for (let i = 1; i < sortedChoices.length; i++) {
        const prevChoice = sortedChoices[i - 1].choice;
        const currChoice = sortedChoices[i].choice;

        if (isDecreasing) {
          // For decreasing prices: Drink then Skip is inconsistent
          if (prevChoice === 1 && currChoice === 0) return true;
        } else {
          // For increasing prices: Skip then Drink is inconsistent
          if (prevChoice === 0 && currChoice === 1) return true;
        }
      }

      // Also check for multiple switches (back and forth)
      let switches = 0;
      for (let i = 1; i < sortedChoices.length; i++) {
        if (sortedChoices[i].choice !== sortedChoices[i - 1].choice) {
          switches++;
        }
      }
      return switches > 1;
    }

    // Simulate one round based on DGP
    // A = drink (1/0), X = chemical normal (1/0), Y = feel good (1/0)
    function simulateRound(A) {
      let X, Y;

      if (CONFIG.causal === 0) {
        // Collider: Y is independent, X depends on both A and Y
        const pX = [CONFIG.beta00, CONFIG.beta01, CONFIG.beta10, CONFIG.beta11];
        Y = Math.random() < CONFIG.pY ? 1 : 0;
        X = Math.random() < pX[A * 2 + Y] ? 1 : 0;
      } else {
        // Causal chain: A -> X -> Y
        const pX = [CONFIG.sigma0, CONFIG.sigma1];
        const pY = [CONFIG.rho0, CONFIG.rho1];
        X = Math.random() < pX[A] ? 1 : 0;
        Y = Math.random() < pY[X] ? 1 : 0;
      }

      // For AY order, set X to 0 for data recording (not shown to participant)
      if (CONFIG.order === 'AY') {
        X = 0;
      }

      return { A, X, Y };
    }

    // Statistics calculator
    // history format: [[A, X, Y], [A, X, Y], ...]
    function calculateStats(history) {
      const stats = {
        A1: { total: 0, X1: 0, Y1: 0 },  // When A=1 (drank)
        A0: { total: 0, X1: 0, Y1: 0 },  // When A=0 (skipped)
        X1: { total: 0, Y1: 0 },          // When X=1 (normal)
        X0: { total: 0, Y1: 0 },          // When X=0 (abnormal)
      };
      
      history.forEach(round => {
        const [A, X, Y] = round;
        
        if (A === 1) {
          stats.A1.total++;
          if (X === 1) stats.A1.X1++;
          if (Y === 1) stats.A1.Y1++;
        } else {
          stats.A0.total++;
          if (X === 1) stats.A0.X1++;
          if (Y === 1) stats.A0.Y1++;
        }
        
        if (X === 1) {
          stats.X1.total++;
          if (Y === 1) stats.X1.Y1++;
        } else {
          stats.X0.total++;
          if (Y === 1) stats.X0.Y1++;
        }
      });
      
      return stats;
    }

    // Calendar Icon for New Day overlay
    function CalendarIcon({ className }) {
      return (

    // DAG Iframe Component
    function DAGIframe({ onComplete, playerName0, playerName1, playerIcon0, nRounds, themeColor }) {
      const iframeRef = useRef(null);

      useEffect(() => {
        const handleMessage = (event) => {
          if (event.data.type === 'DAG_DATA' && event.data.dataType === 'DAG_COMPLETE') {
            const data = event.data.data;
            onComplete(data.initialDAG, data.finalDAG, data.confidence, data.DAGAlertCount, data.initialDAGTime, data.finalDAGTime, data.confidenceTime);
          }
        };

        window.addEventListener('message', handleMessage);

        // Send INIT to iframe once loaded
        const sendInit = () => {
          if (iframeRef.current && iframeRef.current.contentWindow) {
            iframeRef.current.contentWindow.postMessage({
              type: 'INIT',
              gameConfig: {
                playerName0: playerName0,
                playerName1: playerName1,
                playerIcon0: playerIcon0,
                nRounds: nRounds,
                themeColor: themeColor
              }
            }, '*');
          }
        };

        // Try sending after a short delay to ensure iframe is loaded
        const timeout = setTimeout(sendInit, 500);

        return () => {
          window.removeEventListener('message', handleMessage);
          clearTimeout(timeout);
        };
      }, [onComplete, playerName0, playerName1, playerIcon0, nRounds, themeColor]);

      return (
        <iframe
          ref={iframeRef}
          src="dagElicitationV2.html"
          style={{ width: '100%', height: '100vh', border: 'none' }}
          onLoad={() => {
            if (iframeRef.current && iframeRef.current.contentWindow) {
              iframeRef.current.contentWindow.postMessage({
                type: 'INIT',
                gameConfig: {
                  playerName0: playerName0,
                  playerName1: playerName1,
                  playerIcon0: playerIcon0,
                  themeColor: themeColor
                }
              }, '*');
            }
          }}
        />
      );
    }

    // Belief Elicitation Iframe Component
    function BeliefIframe({ onComplete, playerName0, playerName1, playerName2Pos, playerName2Neg, aCost, currency, order, themeColor }) {
      const iframeRef = useRef(null);
      const beliefDataRef = useRef(null);

      useEffect(() => {
        const handleMessage = (event) => {
          // Capture belief data when sent
          if (event.data.type === 'GAME_DATA' && event.data.dataType === 'CAUSAL_BELIEFS') {
            beliefDataRef.current = event.data.data;
          }
          // Call onComplete when elicitation is complete
          if (event.data.type === 'GAME_DATA' && event.data.dataType === 'ELICIT_COMPLETE') {
            onComplete(beliefDataRef.current || event.data.data);
          }
        };

        window.addEventListener('message', handleMessage);

        // Send INIT to iframe once loaded
        const sendInit = () => {
          if (iframeRef.current && iframeRef.current.contentWindow) {
            // Determine which causal to show based on order
            const mainCausals = order === 'AY'
              ? [{ causalElicit: "AY", exoButton: null, id: "AY" }]
              : [{ causalElicit: "XY", exoButton: null, id: "XY" }];

            iframeRef.current.contentWindow.postMessage({
              type: 'INIT',
              gameConfig: {
                playerName0: playerName0,
                playerName1: playerName1,
                playerName2Pos: playerName2Pos,
                playerName2Neg: playerName2Neg,
                aCost: aCost,
                currency: currency,
                order: order,
                themeColor: themeColor,
                skipIntro: true,
                mainCausals: mainCausals
              }
            }, '*');
          }
        };

        // Try sending after a short delay to ensure iframe is loaded
        const timeout = setTimeout(sendInit, 500);

        return () => {
          window.removeEventListener('message', handleMessage);
          clearTimeout(timeout);
        };
      }, [onComplete, playerName0, playerName1, playerName2Pos, playerName2Neg, aCost, currency, order, themeColor]);

      return (
        <iframe
          ref={iframeRef}
          src="dietersDilemmaBeliefV2.html"
          style={{ width: '100%', height: '100vh', border: 'none' }}
          onLoad={() => {
            if (iframeRef.current && iframeRef.current.contentWindow) {
              // Determine which causal to show based on order
              const mainCausals = order === 'AY'
                ? [{ causalElicit: "AY", exoButton: null, id: "AY" }]
                : [{ causalElicit: "XY", exoButton: null, id: "XY" }];

              iframeRef.current.contentWindow.postMessage({
                type: 'INIT',
                gameConfig: {
                  playerName0: playerName0,
                  playerName1: playerName1,
                  playerName2Pos: playerName2Pos,
                  playerName2Neg: playerName2Neg,
                  aCost: aCost,
                  currency: currency,
                  order: order,
                  themeColor: themeColor,
                  skipIntro: true,
                  mainCausals: mainCausals
                }
              }, '*');
            }
          }}
        />
      );
    }

    // Main experiment component
    function BeverageExperiment() {
      const [ready, setReady] = useState(false);
      const [currentRound, setCurrentRound] = useState(1);
      const [phase, setPhase] = useState('decision');
      const [history, setHistory] = useState([]);  // [[A, X, Y], ...]
      const [currentA, setCurrentA] = useState(null);
      const [currentX, setCurrentX] = useState(null);
      const [currentY, setCurrentY] = useState(null);
      const [showNewDay, setShowNewDay] = useState(false);
      const [nextDayNumber, setNextDayNumber] = useState(2);
      
      // DAG-related state
      const [showDAG, setShowDAG] = useState(false);
      const [dagCompleted, setDagCompleted] = useState(false);
      const [dagData, setDagData] = useState({ initial: null, final: null, confidence: null, alertCount: null });
      const [hideRateBox, setHideRateBox] = useState(false);

      // Belief elicitation state
      const [showBelief, setShowBelief] = useState(false);
      const [beliefData, setBeliefData] = useState(null);

      // Price elicitation state
      const [priceElicitationRound, setPriceElicitationRound] = useState(0);
      const [priceElicitationChoices, setPriceElicitationChoices] = useState([]);
      const [showPriceDivider, setShowPriceDivider] = useState(false);
      const [priceElicitationReturnRound, setPriceElicitationReturnRound] = useState(null);

      // Space bar progression state
      const [waitingForSpace, setWaitingForSpace] = useState(null); // 'outcome' or 'nextRound'
      const [pendingResult, setPendingResult] = useState(null); // Store simulated result

      // Price elicitation space bar state
      const [priceElicitationWaitingForSpace, setPriceElicitationWaitingForSpace] = useState(false);
      const [pendingPriceChoice, setPendingPriceChoice] = useState(null); // { price, choice }

      const roundTimesRef = useRef([]);
      const roundStartTimeRef = useRef(Date.now());
      const dataSentRef = useRef(false);
      const halfwayDAGShownRef = useRef(false);
      const beliefShownRef = useRef(false);

      // Detailed timestamps for each round: { decision, chemical, outcome, nextRound }
      const roundTimestampsRef = useRef([]);
      const phaseStartTimeRef = useRef(Date.now());
      
      // Wait for Qualtrics config before showing game (max 3 seconds)
      useEffect(() => {
        const timeout = setTimeout(() => {
          if (!ready) {
            console.log('Timeout: starting with default config');
            setReady(true);
            roundStartTimeRef.current = Date.now();
            phaseStartTimeRef.current = Date.now();
          }
        }, 3000);

        onInitialized(() => {
          clearTimeout(timeout);
          setReady(true);
          roundStartTimeRef.current = Date.now();
          phaseStartTimeRef.current = Date.now();
        });

        return () => clearTimeout(timeout);
      }, []);

      // Listen for space bar to progress through phases
      useEffect(() => {
        const handleKeyDown = (e) => {
          // Handle price elicitation space bar
          if (e.code === 'Space' && priceElicitationWaitingForSpace && pendingPriceChoice) {
            e.preventDefault();

            const { price, choice } = pendingPriceChoice;
            const currentPrice = getOrderedPrices()[priceElicitationRound - 1];

            // Check if we're editing an existing choice or adding a new one
            const existingIndex = priceElicitationChoices.findIndex(c => c.price === currentPrice);
            let newChoices;
            const isEditing = existingIndex >= 0;

            if (isEditing) {
              newChoices = [...priceElicitationChoices];
              newChoices[existingIndex] = { price: currentPrice, choice };
            } else {
              newChoices = [...priceElicitationChoices, { price: currentPrice, choice }];
            }

            setPriceElicitationChoices(newChoices);
            setPriceElicitationWaitingForSpace(false);
            setPendingPriceChoice(null);

            // If we were editing and have a return round, go back to where we were
            if (isEditing && priceElicitationReturnRound !== null) {
              setPriceElicitationRound(priceElicitationReturnRound);
              setPriceElicitationReturnRound(null);
              setShowPriceDivider(true);
            } else if (newChoices.length >= CONFIG.priceElicitationPrices.length) {
              // All price elicitation rounds done - show final review
              setShowPriceDivider(true);
              setPriceElicitationRound(CONFIG.priceElicitationPrices.length);
            } else {
              // Show divider before next price
              setShowPriceDivider(true);
            }
            return;
          }

          if (e.code === 'Space' && waitingForSpace === 'outcome') {
            e.preventDefault();
            // Record time spent viewing chemical level
            const currentTimestamps = roundTimestampsRef.current[roundTimestampsRef.current.length - 1];
            if (currentTimestamps) {
              currentTimestamps.chemicalViewTime = (Date.now() - phaseStartTimeRef.current) / 1000;
            }
            phaseStartTimeRef.current = Date.now();

            // Show outcome
            setPhase('outcome');
            setCurrentY(pendingResult.Y);
            setHistory(prev => [...prev, [pendingResult.A, pendingResult.X, pendingResult.Y]]);
            setWaitingForSpace('nextRound');
          }

          if (e.code === 'Enter' && waitingForSpace === 'nextRound') {
            e.preventDefault();
            // Record time spent viewing outcome
            const currentTimestamps = roundTimestampsRef.current[roundTimestampsRef.current.length - 1];
            if (currentTimestamps) {
              currentTimestamps.outcomeViewTime = (Date.now() - phaseStartTimeRef.current) / 1000;
            }

            setWaitingForSpace(null);
            setPendingResult(null);

            if (currentRound >= CONFIG.totalRounds) {
              setPhase('priceIntro');
            } else {
              // Check if we're at round 10 and haven't shown belief elicitation yet
              if (currentRound === 10 && !beliefShownRef.current) {
                beliefShownRef.current = true;
                setShowBelief(true);
              }
              // Check if we're at the halfway point and haven't shown DAG yet (skip for AY order)
              else if (currentRound === Math.floor(CONFIG.totalRounds / 2) && !halfwayDAGShownRef.current && CONFIG.order !== 'AY') {
                halfwayDAGShownRef.current = true;
                setShowDAG(true);
              } else {
                // Trigger "New Day" overlay
                setNextDayNumber(currentRound + 1);
                setShowNewDay(true);

                // Clear current values after a short delay
                setTimeout(() => {
                  setCurrentA(null);
                  setCurrentX(null);
                  setCurrentY(null);
                }, 200);

                // Hide overlay and advance to next round
                setTimeout(() => {
                  setShowNewDay(false);
                  setCurrentRound(prev => prev + 1);
                  setPhase('decision');
                  roundStartTimeRef.current = Date.now();
                  phaseStartTimeRef.current = Date.now();
                }, 1000);
              }
            }
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [waitingForSpace, pendingResult, currentRound, priceElicitationWaitingForSpace, pendingPriceChoice, priceElicitationRound, priceElicitationChoices, priceElicitationReturnRound]);
      
      const stats = calculateStats(history);
      
      const handleChoice = useCallback((A) => {
        const decisionTime = (Date.now() - roundStartTimeRef.current) / 1000;
        roundTimesRef.current.push(decisionTime);

        // Initialize timestamps for this round
        roundTimestampsRef.current.push({
          round: currentRound,
          decisionTime: decisionTime,
          chemicalViewTime: null,
          outcomeViewTime: null
        });

        setCurrentA(A);
        setPhase('chemical');

        const result = simulateRound(A);
        setPendingResult({ A, X: result.X, Y: result.Y });

        // Show chemical level after a brief delay, then wait for space bar
        setTimeout(() => {
          setCurrentX(result.X);
          phaseStartTimeRef.current = Date.now();
          setWaitingForSpace('outcome');
        }, 800);
      }, [currentRound]);
      
      // Handle price elicitation intro continue
      const handlePriceIntroContinue = useCallback(() => {
        setPriceElicitationRound(0);
        setShowPriceDivider(true);
        setPhase('priceElicitation');
      }, []);

      // Handle price elicitation choice - set pending and wait for space
      const handlePriceElicitationChoice = useCallback((choice) => {
        const currentPrice = getOrderedPrices()[priceElicitationRound - 1];
        setPendingPriceChoice({ price: currentPrice, choice });
        setPriceElicitationWaitingForSpace(true);
      }, [priceElicitationRound]);

      // Handle going back to edit a previous choice
      const handleGoBackToChoice = useCallback((roundNumber) => {
        // Store where to return after editing (current round, so divider shows correct next choice)
        setPriceElicitationReturnRound(priceElicitationRound);
        setPriceElicitationRound(roundNumber);
        setShowPriceDivider(false);
      }, [priceElicitationRound]);

      // Handle price divider continue
      const handlePriceDividerContinue = useCallback(() => {
        setShowPriceDivider(false);
        if (priceElicitationRound === 0) {
          setPriceElicitationRound(1);
        } else {
          setPriceElicitationRound(prev => prev + 1);
        }
      }, [priceElicitationRound]);

      // Handle DAG completion
      const handleDAGComplete = useCallback((initialDAG, finalDAG, confidence, DAGAlertCount, initialDAGTime, finalDAGTime, confidenceTime) => {
        setDagData({ initial: initialDAG, final: finalDAG, confidence: confidence, alertCount: DAGAlertCount, initialDAGTime, finalDAGTime, confidenceTime });
        setDagCompleted(true);
        setShowDAG(false);
        
        // Send DAG data to Qualtrics
        sendDataToQualtrics('DAG_DATA', {
          initialDAG: initialDAG,
          finalDAG: finalDAG,
          confidence: confidence,
          DAGAlertCount: DAGAlertCount,
          initialDAGTime: initialDAGTime,
          finalDAGTime: finalDAGTime,
          confidenceTime: confidenceTime,
          completedAtRound: currentRound
        });
        
        // Continue to next round - immediately show new day overlay
        setCurrentA(null);
        setCurrentX(null);
        setCurrentY(null);
        setNextDayNumber(currentRound + 1);
        setShowNewDay(true);
        setPhase('decision');

        setTimeout(() => {
          setShowNewDay(false);
          setCurrentRound(prev => prev + 1);
          roundStartTimeRef.current = Date.now();
          phaseStartTimeRef.current = Date.now();
        }, 1000);
      }, [currentRound]);

      // Handle Belief elicitation completion
      const handleBeliefComplete = useCallback((data) => {
        setBeliefData(data);
        setShowBelief(false);

        // Send belief data to Qualtrics
        sendDataToQualtrics('BELIEF_DATA', {
          ...data,
          completedAtRound: currentRound
        });

        // Scroll to top so the next round is visible (works for both standalone and Qualtrics iframe)
        window.scrollTo({ top: 0, behavior: 'smooth' });
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'SCROLL_TO_TOP' }, '*');
        }

        // Continue to next round - immediately show new day overlay
        setCurrentA(null);
        setCurrentX(null);
        setCurrentY(null);
        setNextDayNumber(currentRound + 1);
        setShowNewDay(true);
        setPhase('decision');

        setTimeout(() => {
          setShowNewDay(false);
          setCurrentRound(prev => prev + 1);
          roundStartTimeRef.current = Date.now();
          phaseStartTimeRef.current = Date.now();
        }, 1000);
      }, [currentRound]);

      // Show loading screen while waiting for Qualtrics config
      if (!ready) {
        return (
          <div className="min-h-screen bg-white flex items-start justify-center pt-12">
            <div className="text-gray-700 text-xl">Loading...</div>
          </div>
        );
      }
      
      // Send final data when game completes
      if (phase === 'complete' && history.length === CONFIG.totalRounds && priceElicitationChoices.length === CONFIG.priceElicitationPrices.length && !dataSentRef.current) {
        dataSentRef.current = true;

        // Simulate outcomes for high stakes choices using DGP
        const highStakeOutcomes = priceElicitationChoices.map(c => {
          const result = simulateRound(c.choice);
          return { price: c.price, choice: c.choice, X: result.X, Y: result.Y };
        });

        sendDataToQualtrics('FINAL_DATA', {
          history: history,  // [[A, X, Y], [A, X, Y], ...]
          roundTimes: roundTimesRef.current,
          roundTimestamps: roundTimestampsRef.current, // Detailed timestamps per round
          payment: history.map(([A, X, Y]) => -CONFIG.aCost * A + CONFIG.yBonus * Y),
          dagInitial: dagData.initial,
          dagFinal: dagData.final,
          dagConfidence: dagData.confidence,
          DAGAlertCount: dagData.alertCount,
          initialDAGTime: dagData.initialDAGTime,
          finalDAGTime: dagData.finalDAGTime,
          confidenceTime: dagData.confidenceTime,
          // Belief elicitation data (after round 10)
          beliefData: beliefData,
          priceElicitation: priceElicitationChoices,
          highStakeOutcomes: highStakeOutcomes,
          paymentHighStake: highStakeOutcomes.map(c => 15 + (c.choice === 1 ? -c.price : 0) + (c.Y === 1 ? CONFIG.priceElicitationBonus : 0)),
          tracking: getTrackingData()
        });

        setTimeout(() => {
          sendDataToQualtrics('GAME_COMPLETE', { completed: true, tracking: getTrackingData() });
        }, 500);
      }
      
      // Show DAG drawing interface (loads from separate file)
      if (showDAG) {
        return (
          <DAGIframe
            onComplete={handleDAGComplete}
            playerName0={CONFIG.playerName0}
            playerName1={CONFIG.playerName1}
            playerIcon0={CONFIG.playerIcon0}
            nRounds={CONFIG.totalRounds}
            themeColor={CONFIG.themeColor}
          />
        );
      }

      // Show Belief elicitation interface (loads from separate file)
      if (showBelief) {
        return (
          <BeliefIframe
            onComplete={handleBeliefComplete}
            playerName0={CONFIG.playerName0}
            playerName1={CONFIG.playerName1}
            playerName2Pos={CONFIG.playerName2Pos}
            playerName2Neg={CONFIG.playerName2Neg}
            aCost={CONFIG.aCost}
            currency={CONFIG.currency}
            order={CONFIG.order}
            themeColor={CONFIG.themeColor}
          />
        );
      }

      // Show price elicitation intro
      if (phase === 'priceIntro') {
        return <PriceElicitationIntro onContinue={handlePriceIntroContinue} />;
      }

      // Show price divider between rounds (and before first round)
      if (phase === 'priceElicitation' && showPriceDivider) {
        const isFinalReview = priceElicitationChoices.length >= CONFIG.priceElicitationPrices.length;
        const nextRound = priceElicitationRound === 0 ? 1 : priceElicitationRound + 1;
        const nextPrice = isFinalReview ? null : getOrderedPrices()[nextRound - 1];
        return (
          <PriceDividerPage
            nextPrice={nextPrice}
            nextRound={nextRound}
            totalRounds={CONFIG.priceElicitationPrices.length}
            onContinue={isFinalReview ? () => setPhase('complete') : handlePriceDividerContinue}
            choices={priceElicitationChoices}
            onGoBack={handleGoBackToChoice}
            isFinalReview={isFinalReview}
          />
        );
      }

      // Show price elicitation rounds
      if (phase === 'priceElicitation') {
        const currentPrice = getOrderedPrices()[priceElicitationRound - 1];
        return (
          <PriceElicitationPanel
            price={currentPrice}
            roundNumber={priceElicitationRound}
            totalRounds={CONFIG.priceElicitationPrices.length}
            onChoice={handlePriceElicitationChoice}
            stats={stats}
            history={history}
            waitingForSpace={priceElicitationWaitingForSpace}
            pendingChoice={pendingPriceChoice?.choice}
          />
        );
      }

      // Show blank page when complete
      if (phase === 'complete') {
        return (
          <div className="min-h-screen bg-white">
          </div>
        );
      }

      const theme = getThemeClasses();

      return (
        <div className="min-h-screen bg-white px-4 pt-0 pb-4">
          <div className="max-w-6xl mx-auto">
              <div className={`${theme.panelBg} rounded-2xl p-6 mb-4 border ${theme.panelBorder} shadow-sm relative overflow-hidden`}>
              <NewDayOverlay show={showNewDay} dayNumber={nextDayNumber} />

              <div className="text-center mb-4 h-14 flex items-center justify-center">
                <span className={`inline-block px-4 py-2 rounded-full text-sm font-medium ${
                  phase === 'decision' ? `${theme.pillBg} ${theme.pillText} border ${theme.pillBorder}` :
                  phase === 'chemical' ? 'bg-amber-50 text-amber-700 border border-amber-200' :
                  currentY === 1 ? 'bg-green-50 text-green-700 border border-green-200' :
                  'bg-red-50 text-red-700 border border-red-200'
                } ${currentRound === 1 && phase === 'decision' ? 'first-round-shine-pill' : ''}`}>
                  {phase === 'decision' && `Morning: Will you drink ${CONFIG.playerName0}?`}
                  {phase === 'chemical' && (
                    waitingForSpace === 'outcome'
                      ? 'Press "Space" to see how you feel'
                      : (CONFIG.order === 'AY' ? 'Later this day...' : `Reading your ${CONFIG.playerName1} level...`)
                  )}
                  {phase === 'outcome' && (
                    waitingForSpace === 'nextRound'
                      ? <>{currentY === 1 ? `${CONFIG.playerName2Pos.charAt(0).toUpperCase() + CONFIG.playerName2Pos.slice(1)}!` : `${CONFIG.playerName2Neg.charAt(0).toUpperCase() + CONFIG.playerName2Neg.slice(1)}`} {currentY === 1 ? <HappyFaceIcon className="w-5 h-5 inline-block" /> : <SadFaceIcon className="w-5 h-5 inline-block" />}<br />Press "Return" to continue to the next week</>
                      : <>Later this day: {currentY === 1 ? `${CONFIG.playerName2Pos.charAt(0).toUpperCase() + CONFIG.playerName2Pos.slice(1)}!` : `${CONFIG.playerName2Neg.charAt(0).toUpperCase() + CONFIG.playerName2Neg.slice(1)}`} {currentY === 1 ? <HappyFaceIcon className="w-5 h-5 inline-block" /> : <SadFaceIcon className="w-5 h-5 inline-block" />}</>
                  )}
                </span>
              </div>

              <div className="absolute top-4 left-4 bg-white rounded-xl px-4 py-2 border border-gray-200 shadow-sm">
                <div className="text-gray-700 font-medium text-sm mb-1">Monday</div>
                <div className="flex items-center gap-3">
                  <div>
                    <span className="text-gray-400 text-sm">Week</span>
                    <div className="text-gray-900 text-2xl font-bold">{currentRound}</div>
                  </div>
                  <div className="text-gray-300 text-xl">/</div>
                  <div className="text-gray-400 text-lg">{CONFIG.totalRounds}</div>
                </div>
                <div className="w-20 h-2 bg-gray-200 rounded-full mt-2 overflow-hidden">
                  <div
                    className="h-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-300"
                    style={{ width: `${(currentRound / CONFIG.totalRounds) * 100}%` }}
                  />
                </div>
              </div>

              <XYConnection
                X={currentX}
                Y={currentY}
                stats={stats}
                hideRateBox={hideRateBox}
              />
            </div>

            <div className="grid grid-cols-3 gap-4">
              <DrinkDecisionPanel
                onChoice={handleChoice}
                disabled={phase !== 'decision'}
                stats={stats}
                isFirstRound={currentRound === 1}
                selectedChoice={currentA}
              />
              <XStatsPanel stats={stats} currentX={currentX} />
              <CompactHistory history={history} />
            </div>
          </div>
        </div>
      );
    }

    // Render the app
    ReactDOM.createRoot(document.getElementById('root')).render(<BeverageExperiment />);
  </script>
</body>
</html>
