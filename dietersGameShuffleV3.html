<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenario Reveal</title>
  <script src="shared-icons.js"></script>
  <style>
    :root {
      --size: 145px;
      --gap: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 4px 20px 20px 20px;
    }

    h1 {
      color: #1e293b;
      margin-bottom: 30px;
      font-size: 1.8rem;
      text-align: center;
    }

    #container {
      position: relative;
      width: calc(var(--size) * 3 + var(--gap) * 2);
      height: calc(var(--size) * 3 + var(--gap) * 2);
    }

    .tile {
      position: absolute;
      width: var(--size);
      height: var(--size);
      perspective: 600px;
      transition: left 0.3s ease-in-out, top 0.3s ease-in-out, opacity 0.4s ease, transform 0.5s ease;
      cursor: default;
    }

    .tile.faded {
      opacity: 0.15;
      transform: scale(0.9);
    }

    .tile.chosen {
      z-index: 100;
      transform: scale(1.8);
      left: calc(50% - var(--size) / 2) !important;
      top: calc(50% - var(--size) / 2) !important;
    }

    .inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s ease-in-out;
      transform-style: preserve-3d;
    }

    .tile.flipped .inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .back {
      background: linear-gradient(145deg,
        hsl(var(--hue), 50%, 92%),
        hsl(var(--hue), 40%, 85%));
      border: 3px solid hsl(var(--hue), 60%, 70%);
    }

    .back::after {
      content: '?';
      font-size: 3rem;
      color: hsl(var(--hue), 40%, 60%);
      font-weight: bold;
    }

    .front {
      background: linear-gradient(145deg, #ffffff, #f8fafc);
      border: 3px solid hsl(var(--hue), 60%, 65%);
      transform: rotateY(180deg);
      padding: 8px;
    }

    .tile.chosen .front {
      padding: 15px;
    }

    .drink-icon {
      margin-bottom: 4px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tile.chosen .drink-icon {
      margin-bottom: 8px;
    }

    .drink-name {
      font-size: 0.7rem;
      font-weight: 700;
      color: hsl(var(--hue), 70%, 35%);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .tile.chosen .drink-name {
      font-size: 0.8rem;
      margin-bottom: 5px;
    }

    .chemical-name {
      font-size: 0.6rem;
      font-weight: 600;
      color: #64748b;
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 8px;
    }

    .tile.chosen .chemical-name {
      font-size: 0.85rem;
      padding: 4px 12px;
    }

    .divider {
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, hsl(var(--hue), 60%, 70%), transparent);
      margin: 4px 0;
    }

    .tile.chosen .divider {
      margin: 8px 0;
    }

    #continueBtn {
      display: none;
      margin-top: 10px;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--btn-color-light), var(--btn-color-dark));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px var(--btn-shadow);
      transition: all 0.3s ease;
    }

    #continueBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--btn-shadow-hover);
    }

    #message {
      color: #64748b;
      margin-top: 20px;
      font-size: 1rem;
      text-align: center;
      min-height: 24px;
    }

    /* Transition screen styles */
    #transitionScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px;
      padding-top: 80px;
      text-align: center;
    }

    #transitionScreen .button-container {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: flex-end;
    }

    #transitionScreen.visible {
      display: flex;
    }

    .transition-title {
      font-size: 1.8rem;
      font-weight: bold;
      color: #1e293b;
      margin-bottom: 30px;
    }

    .transition-message {
      font-size: 1.2rem;
      color: #475569;
      max-width: 900px;
      line-height: 1.6;
      margin-bottom: 30px;
      text-align: left;
    }

    #transitionContinueBtn {
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--btn-color-light), var(--btn-color-dark));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px var(--btn-shadow);
    }

    #transitionContinueBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--btn-shadow-hover);
    }

  </style>
</head>
<body>
  <!-- Transition Screen for switching chemicals -->
  <div id="transitionScreen">
    <div class="transition-title">New Drink and New Blood Chemical</div>
    <div class="transition-message" id="transitionMessage">From now on, your decisions concern a new drink and a new blood chemical. Anything you observed in the previous rounds involved a different drink and chemical, and is not relevant to the decisions you will make later.</div>
    <div class="button-container">
      <button id="transitionContinueBtn">Continue</button>
    </div>
  </div>

  <h2 id="studyCounter" style="color: #1e293b; margin-bottom: 24px; font-size: 1.8rem; text-align: center;"></h2>
  <h1 id="title"></h1>
  <ul id="bonusInfo" style="color: #475569; font-size: 1.2rem; text-align: left; margin: 0 auto 20px auto; max-width: 900px; line-height: 1.6;"></ul>
  <div id="container"></div>
  <div id="message"></div>
  <button id="continueBtn">Continue</button>

  <script>
    // =============== QUALTRICS COMMUNICATION ===============
    let participantId = null;
    let gameId = null;

    window.addEventListener('message', function(event) {
      if (event.data.type === 'INIT') {
        console.log('Received INIT from Qualtrics:', event.data);
        participantId = event.data.participantId;
        gameId = event.data.gameId;

        if (event.data.gameConfig) {
          const qConfig = event.data.gameConfig;
          if (qConfig.playerName0) CONFIG.playerName0 = qConfig.playerName0;
          if (qConfig.playerName1) CONFIG.playerName1 = qConfig.playerName1;
          if (qConfig.playerIcon0) CONFIG.playerIcon0 = qConfig.playerIcon0;
          if (qConfig.gameCounter !== undefined) {
            CONFIG.gameCounter = qConfig.gameCounter;
          }
          if (qConfig.nSupergames !== undefined) {
            CONFIG.nSupergames = qConfig.nSupergames;
          }
          if (qConfig.yBonus !== undefined) CONFIG.yBonus = qConfig.yBonus;
          if (qConfig.aCost !== undefined) CONFIG.aCost = qConfig.aCost;
          if (qConfig.currency) CONFIG.currency = qConfig.currency;
          if (qConfig.order) CONFIG.order = qConfig.order;
          if (qConfig.nRounds !== undefined) CONFIG.nRounds = qConfig.nRounds;
          if (qConfig.themeColor) CONFIG.themeColor = qConfig.themeColor;
          console.log('Applied config:', CONFIG);
        }

        markInitialized();
      }
    });

    function sendDataToQualtrics(dataType, data) {
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'GAME_DATA',
          gameId: gameId,
          dataType: dataType,
          data: data,
          participantId: participantId,
          timestamp: new Date().toISOString()
        }, '*');
      }
      console.log('Sent to Qualtrics:', dataType, data);
    }

    let isInitialized = false;
    let initCallbacks = [];

    function onInitialized(callback) {
      if (isInitialized) callback();
      else initCallbacks.push(callback);
    }

    function markInitialized() {
      isInitialized = true;
      initCallbacks.forEach(cb => cb());
      initCallbacks = [];
    }

    // =============== CONFIGURATION ===============
    const CONFIG = {
      playerName0: 'Zerqalase-norm',  // Drink name (A)
      playerName1: 'Zerqalase',       // Chemical name (X)
      playerIcon0: '',            // Deprecated - now using SVG
      gameCounter: 2,             // Current game number
      nSupergames: 1,             // Total number of games
      nRounds: 30,                // Number of rounds
      yBonus: 0.10,               // Bonus for feeling good
      aCost: 0.05,                // Cost of drinking
      currency: '$',              // Currency symbol
      order: 'AY',                // Order: 'AXY' or 'AY'
      themeColor: 'purple'        // Theme color: 'blue', 'purple', 'teal', 'yellow'
    };

    // Note: getThemeColorsVanilla() and getDrinkIconSVG() are loaded from shared-icons.js
    // Wrapper for compatibility with existing code
    function getThemeClasses() {
      return getThemeColorsVanilla(CONFIG.themeColor);
    }

    // Get button colors for CSS variables based on theme
    function getButtonColors(themeColor) {
      const themes = {
        blue: { light: '#3b82f6', dark: '#2563eb', shadow: 'rgba(59, 130, 246, 0.4)', shadowHover: 'rgba(59, 130, 246, 0.5)' },
        purple: { light: '#a855f7', dark: '#9333ea', shadow: 'rgba(147, 51, 234, 0.4)', shadowHover: 'rgba(147, 51, 234, 0.5)' },
        teal: { light: '#14b8a6', dark: '#0d9488', shadow: 'rgba(13, 148, 136, 0.4)', shadowHover: 'rgba(13, 148, 136, 0.5)' },
        yellow: { light: '#f59e0b', dark: '#d97706', shadow: 'rgba(217, 119, 6, 0.4)', shadowHover: 'rgba(217, 119, 6, 0.5)' }
      };
      return themes[themeColor] || themes.blue;
    }

    // Apply button theme colors to CSS variables
    function applyButtonTheme() {
      const colors = getButtonColors(CONFIG.themeColor);
      document.documentElement.style.setProperty('--btn-color-light', colors.light);
      document.documentElement.style.setProperty('--btn-color-dark', colors.dark);
      document.documentElement.style.setProperty('--btn-shadow', colors.shadow);
      document.documentElement.style.setProperty('--btn-shadow-hover', colors.shadowHover);
    }

    function updateTitle() {
      const counterEl = document.getElementById('studyCounter');
      if (counterEl) {
        counterEl.textContent = `Drink ${CONFIG.gameCounter}`;
      }
      const titleEl = document.getElementById('title');
      if (titleEl) {
        titleEl.innerHTML = `<span style="font-weight: normal">The next ${CONFIG.nRounds} rounds will be about</span> drinking ${CONFIG.playerName0}<span style="font-weight: normal">, your</span> ${CONFIG.playerName1} levels <span style="font-weight: normal">and</span> how you feel.`;
      }
      const bonusEl = document.getElementById('bonusInfo');
      if (bonusEl) {
        let bonusHTML = `<li>If you feel good at the end of the day, you receive an additional ${CONFIG.currency}${Number(CONFIG.yBonus).toFixed(2)} bonus. If you feel bad, you don't.</li>` +
          `<li>If you consume the drink, you pay ${CONFIG.currency}${Number(CONFIG.aCost).toFixed(2)} for it (deducted from your baseline bonus).</li>`;
        if (CONFIG.order === 'AY') {
          bonusHTML += `<li>The trial subscription to the BioClip extension has expired. You no longer see the blood chemical levels.</li>`;
        }
        bonusEl.innerHTML = bonusHTML;
      }
    }

    // defaultHue is now determined by getThemeClasses()

    // =============== GENERATE TILE HTML ===============
    function generateTileHTML(scenario, size = 'default') {
      const theme = getThemeClasses();

      // Size configurations
      const sizes = {
        small: {
          width: 100, height: 100, padding: 8, borderWidth: 2, borderRadius: 12,
          iconSize: '1.5rem', iconMargin: 4,
          nameSize: '0.6rem', nameMargin: 3,
          dividerMargin: 3,
          chemSize: '0.55rem', chemPadding: '2px 6px'
        },
        default: {
          width: 160, height: 160, padding: 15, borderWidth: 3, borderRadius: 16,
          iconSize: '2.5rem', iconMargin: 8,
          nameSize: '0.9rem', nameMargin: 6,
          dividerMargin: 6,
          chemSize: '0.8rem', chemPadding: '4px 12px'
        },
        large: {
          width: 220, height: 220, padding: 20, borderWidth: 4, borderRadius: 20,
          iconSize: '3.5rem', iconMargin: 12,
          nameSize: '1.1rem', nameMargin: 8,
          dividerMargin: 10,
          chemSize: '0.95rem', chemPadding: '6px 16px'
        }
      };

      const s = sizes[size] || sizes.default;

      return `<div style="
        width: ${s.width}px;
        height: ${s.height}px;
        background: linear-gradient(145deg, #ffffff, #f0f4f8);
        border: ${s.borderWidth}px solid ${theme.borderColor};
        border-radius: ${s.borderRadius}px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: ${s.padding}px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        font-family: 'Segoe UI', system-ui, sans-serif;
        box-sizing: border-box;
      ">
        <div style="
          margin-bottom: ${s.iconMargin}px;
          filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        ">${getDrinkIconSVG(scenario.drinkName, s.iconSize)}</div>
        <div style="
          font-size: ${s.nameSize};
          font-weight: 700;
          color: ${theme.textColor};
          text-transform: uppercase;
          letter-spacing: 0.5px;
          white-space: nowrap;
        ">${scenario.drinkName.toUpperCase()}</div>
      </div>`;
    }

    // =============== MAIN LOGIC ===============
    function startReveal() {
      const container = document.getElementById('container');
      const message = document.getElementById('message');
      const continueBtn = document.getElementById('continueBtn');

      if (!container) return;
      container.textContent = "";

      const chosenScenario = {
        drinkName: CONFIG.playerName0,
        drinkIcon: CONFIG.playerIcon0,
        chemicalName: CONFIG.playerName1
      };

      // Update title with scenario info
      updateTitle();

      // Apply theme colors to button
      applyButtonTheme();

      // Create single tile for the chosen scenario - centered
      const theme = getThemeClasses();
      const tile = document.createElement('div');
      tile.className = 'tile flipped';
      tile.style.setProperty('--hue', theme.hue);
      tile.style.position = 'absolute';
      tile.style.left = '50%';
      tile.style.top = '50%';
      tile.style.transform = 'translate(-50%, -50%) scale(1.8)';

      // Create tile structure
      const inner = document.createElement('div');
      inner.className = 'inner';
      inner.style.transform = 'rotateY(180deg)';

      const front = document.createElement('div');
      front.className = 'face front';

      // Add content to front face
      const drinkIcon = document.createElement('div');
      drinkIcon.className = 'drink-icon';
      drinkIcon.innerHTML = getDrinkIconSVG(chosenScenario.drinkName, '3rem');

      const drinkName = document.createElement('div');
      drinkName.className = 'drink-name';
      drinkName.textContent = chosenScenario.drinkName;

      front.appendChild(drinkIcon);
      front.appendChild(drinkName);

      inner.appendChild(front);
      tile.appendChild(inner);

      // Keep container size for centering
      container.style.position = 'relative';
      container.style.width = '300px';
      container.style.height = '300px';
      container.appendChild(tile);

      // Hide the message
      message.textContent = '';

      // Generate HTML for the tile (self-contained with inline styles)
      const tileHTML = generateTileHTML(chosenScenario);

      // Show continue button immediately
      continueBtn.style.display = 'block';

      // Send data to Qualtrics
      sendDataToQualtrics('SCENARIO_REVEALED', {
        drinkName: chosenScenario.drinkName,
        drinkIcon: chosenScenario.drinkIcon,
        chemicalName: chosenScenario.chemicalName,
        tileHTML: tileHTML
      });

      // Continue button handler
      continueBtn.addEventListener('click', () => {
        // Disable button to prevent multiple clicks
        continueBtn.disabled = true;
        continueBtn.style.opacity = '0.5';
        continueBtn.style.cursor = 'not-allowed';

        sendDataToQualtrics('SCENARIO_COMPLETE', {
          drinkName: chosenScenario.drinkName,
          drinkIcon: chosenScenario.drinkIcon,
          chemicalName: chosenScenario.chemicalName,
          tileHTML: tileHTML
        });
      }, { once: true });
    }

    // Show transition screen for game 2+
    function showTransitionScreen(callback) {
      const transitionScreen = document.getElementById('transitionScreen');
      const transitionBtn = document.getElementById('transitionContinueBtn');

      // Apply button theme colors before showing
      applyButtonTheme();

      // Show the screen
      transitionScreen.classList.add('visible');

      // Handle continue button
      transitionBtn.addEventListener('click', () => {
        transitionScreen.classList.remove('visible');
        callback();
      }, { once: true });
    }

    // Start after initialization or timeout
    const timeout = setTimeout(() => {
      if (!isInitialized) {
        console.log('Timeout: starting with default config');
        if (CONFIG.gameCounter >= 2) {
          showTransitionScreen(startReveal);
        } else {
          startReveal();
        }
      }
    }, 3000);

    onInitialized(() => {
      clearTimeout(timeout);
      if (CONFIG.gameCounter >= 2) {
        showTransitionScreen(startReveal);
      } else {
        startReveal();
      }
    });
  </script>
</body>
</html>
