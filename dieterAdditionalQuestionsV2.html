<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Additional Questions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; background: #ffffff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // =============== IFRAME HEIGHT REPORTING ===============
    function reportHeight() {
      if (window.parent !== window) {
        const height = document.body.scrollHeight || document.documentElement.scrollHeight;
        window.parent.postMessage({ iframeHeight: height }, '*');
      }
    }
    window.addEventListener('load', () => {
      reportHeight();
      setTimeout(reportHeight, 500);
      setTimeout(reportHeight, 1000);
    });
    window.addEventListener('resize', reportHeight);
    const observer = new MutationObserver(reportHeight);
    observer.observe(document.body, { childList: true, subtree: true, attributes: true });

    // =============== QUALTRICS COMMUNICATION ===============
    let participantId = null;
    let gameId = null;

    window.addEventListener('message', function(event) {
      if (event.data.type === 'INIT') {
        console.log('Received INIT from Qualtrics:', event.data);
        participantId = event.data.participantId;
        gameId = event.data.gameId;

        if (event.data.gameConfig) {
          const qConfig = event.data.gameConfig;
          if (qConfig.playerName0) CONFIG.playerName0 = qConfig.playerName0;
          if (qConfig.playerName1) CONFIG.playerName1 = qConfig.playerName1;
          if (qConfig.playerName2Pos) CONFIG.playerName2Pos = qConfig.playerName2Pos;
          if (qConfig.playerName2) CONFIG.playerName2 = qConfig.playerName2;
          if (qConfig.playerPronoun2) CONFIG.playerPronoun2 = qConfig.playerPronoun2;
          if (qConfig.playerIcon0) CONFIG.playerIcon0 = qConfig.playerIcon0;
          if (qConfig.nRounds !== undefined) CONFIG.nRounds = qConfig.nRounds;
          if (qConfig.currentSymbol) CONFIG.currentSymbol = qConfig.currentSymbol;
          if (qConfig.gameCounter !== undefined) CONFIG.gameCounter = qConfig.gameCounter;
          if (qConfig.gameVersionsDescriptionOrderDieter1) CONFIG.gameVersionsDescriptionOrderDieter1 = qConfig.gameVersionsDescriptionOrderDieter1;
          if (qConfig.gameVersionsDescriptionOrderDieter2) CONFIG.gameVersionsDescriptionOrderDieter2 = qConfig.gameVersionsDescriptionOrderDieter2;
          if (qConfig.order) CONFIG.order = qConfig.order;
          if (qConfig.themeColor) CONFIG.themeColor = qConfig.themeColor;
          console.log('Applied config:', CONFIG);
        }

        markInitialized();
        sendDataToQualtrics('QUESTIONS_START', { started: true });
      }
    });

    // Tell Qualtrics we're ready and need an INIT (handles refresh — Qualtrics's
    // initial INIT setTimeout only fires once per question load, so on refresh
    // we ask explicitly).
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
    }

    function sendDataToQualtrics(dataType, data) {
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'GAME_DATA',
          gameId: gameId,
          dataType: dataType,
          data: data,
          participantId: participantId,
          timestamp: new Date().toISOString()
        }, '*');
      }
      console.log('Sent to Qualtrics:', dataType, data);
    }

    let isInitialized = false;
    let initCallbacks = [];

    function onInitialized(callback) {
      if (isInitialized) callback();
      else initCallbacks.push(callback);
    }

    function markInitialized() {
      isInitialized = true;
      initCallbacks.forEach(cb => cb());
      initCallbacks = [];
    }

    // =============== CONFIGURATION ===============
    const CONFIG = {
      playerName0: 'Qivex-norm',
      playerName1: 'Qivex',
      playerName2Pos: 'energetic',
      playerName2: 'Qivex',
      playerPronoun2: 'it',
      playerIcon0: '',
      nRounds: 30,
      currentSymbol: '1',
      gameCounter: 1,
      gameVersionsDescriptionOrderDieter1: 'A',
      gameVersionsDescriptionOrderDieter2: 'B',
      order: 'AY',  // 'AXY' shows all questions, 'AY' hides X-related questions
      themeColor: 'purple'  // Theme color: 'blue', 'purple', 'teal', 'yellow'
    };

    // Theme color helper (inlined from shared-icons.js to keep this file self-contained)
    function getThemeClasses(themeColor) {
      const themes = {
        blue: {
          panelBg: 'bg-blue-50', panelBorder: 'border-blue-200', statBoxBg: 'bg-blue-50/50',
          buttonBg: 'bg-blue-600', buttonHover: 'hover:bg-blue-500', buttonRing: 'ring-blue-300',
          pillBg: 'bg-blue-50', pillText: 'text-blue-700', pillBorder: 'border-blue-200',
          iconColor: 'text-blue-600', focusRing: 'focus:ring-blue-400', focusBorder: 'focus:border-blue-400',
        },
        purple: {
          panelBg: 'bg-purple-50', panelBorder: 'border-purple-200', statBoxBg: 'bg-purple-50/50',
          buttonBg: 'bg-purple-600', buttonHover: 'hover:bg-purple-500', buttonRing: 'ring-purple-300',
          pillBg: 'bg-purple-50', pillText: 'text-purple-700', pillBorder: 'border-purple-200',
          iconColor: 'text-purple-600', focusRing: 'focus:ring-purple-400', focusBorder: 'focus:border-purple-400',
        },
        teal: {
          panelBg: 'bg-teal-50', panelBorder: 'border-teal-200', statBoxBg: 'bg-teal-50/50',
          buttonBg: 'bg-teal-600', buttonHover: 'hover:bg-teal-500', buttonRing: 'ring-teal-300',
          pillBg: 'bg-teal-50', pillText: 'text-teal-700', pillBorder: 'border-teal-200',
          iconColor: 'text-teal-600', focusRing: 'focus:ring-teal-400', focusBorder: 'focus:border-teal-400',
        },
        yellow: {
          panelBg: 'bg-amber-50', panelBorder: 'border-amber-300', statBoxBg: 'bg-amber-50/50',
          buttonBg: 'bg-amber-600', buttonHover: 'hover:bg-amber-500', buttonRing: 'ring-amber-400',
          pillBg: 'bg-amber-100', pillText: 'text-amber-800', pillBorder: 'border-amber-400',
          iconColor: 'text-amber-700', focusRing: 'focus:ring-amber-400', focusBorder: 'focus:border-amber-400',
        }
      };
      return themes[themeColor] || themes.blue;
    }
    const getThemeClassesLocal = () => getThemeClasses(CONFIG.themeColor);
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // SVG Icons
    function DrinkIcon({ className, drinkName }) {
      // Zyrax-norm: cup/glass icon
      if (drinkName && drinkName.toLowerCase().includes('zerqalase')) {
        return (
          <svg className={className} viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="M443.882,5.28C440.842,1.92,436.554,0,432.01,0h-352c-4.512,0-8.832,1.92-11.872,5.28c-3.008,3.328-4.512,7.808-4.064,12.32l48,480c0.832,8.192,7.712,14.4,15.936,14.4h256c8.224,0,15.104-6.208,15.904-14.4l48-480C448.394,13.088,446.922,8.608,443.882,5.28z M401.29,162.496c-40.672,13.152-93.6,19.232-135.136-14.848c-52.064-42.72-115.872-35.36-159.136-22.496L97.706,32h316.608L401.29,162.496z"/>
          </svg>
        );
      }
      // Nexol-norm: bottle/flask icon
      if (drinkName && drinkName.toLowerCase().includes('melythor')) {
        return (
          <svg className={className} viewBox="25 0 50 100" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="m68.3983231 39.4338799v51.373867c0 3.6944504-2.9977417 6.6922531-6.6921844 6.6922531h-23.4122773c-3.6944466 0-6.6921864-2.9978027-6.6921864-6.6922531v-51.373867c0-3.2933311 1.0977535-6.4916306 3.1244678-9.0988846l5.3199768-6.8294144c1.2877464-1.6572304 1.9844475-3.6839428 1.9844475-5.773922v-2.7444191h15.9388657v2.7444191c0 2.0899792.696701 4.1166916 1.9844475 5.773922l5.3199768 6.8294144c2.0267105 2.607254 3.124466 5.8055534 3.124466 9.0988846z"/>
            <path d="m58.727375 11.8242331h-17.45475c-.7878952 0-1.426609-.6387148-1.426609-1.426609v-6.471015c-.0000001-.7878943.6387138-1.4266091 1.426609-1.4266091h17.45475c.7878952 0 1.426609.6387148 1.426609 1.4266093v6.471015c.0000001.787894-.6387138 1.4266088-1.426609 1.4266088z"/>
          </svg>
        );
      }
      // Qivex-norm (default): cup with straw icon
      return (
        <svg className={className} viewBox="0 0 462.848 462.848" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <polygon points="246.784,94.208 246.784,53.248 344.064,29.184 336.384,0 216.064,29.184 216.064,94.208 82.432,94.208 82.432,160.768 380.416,160.768 380.416,94.208"/>
          <path d="M102.912,186.368l35.328,249.856c2.048,15.36,15.36,26.624,30.208,26.624h124.416c15.36,0,28.16-11.264,30.208-26.624L358.4,186.368H102.912z"/>
        </svg>
      );
    }

    function SkipIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 512.095 512.095" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="m256.047 0c-141.411 0-256.047 114.636-256.047 256.047s114.636 256.047 256.047 256.047 256.047-114.636 256.047-256.047-114.636-256.047-256.047-256.047zm-192.313 256.047c0-106.212 86.102-192.313 192.313-192.313 41.614 0 80.139 13.221 111.61 35.687l-268.236 268.237c-22.466-31.471-35.687-69.996-35.687-111.611zm192.313 192.314c-41.589 0-80.092-13.204-111.552-35.644l268.221-268.221c22.441 31.46 35.644 69.964 35.644 111.552.001 106.211-86.101 192.313-192.313 192.313z"/>
        </svg>
      );
    }

    const PERCENTAGE_OPTIONS = [
      '0 - 10%',
      '11 - 20%',
      '21 - 30%',
      '31 - 40%',
      '41 - 50%',
      '51 - 60%',
      '61 - 70%',
      '71 - 80%',
      '81 - 90%',
      '91 - 100%'
    ];

    function RadioQuestion({ questionNumber, questionText, questionContent, introText, options, selectedValue, onChange }) {
      const optionList = options || PERCENTAGE_OPTIONS;
      return (
        <div className="mb-8">
          {introText && (
            <p className="text-base text-gray-600 mb-3" dangerouslySetInnerHTML={{ __html: introText }} />
          )}
          {questionContent ? (
            <p className="text-base text-gray-800 mb-4">Q{questionNumber}. {questionContent}</p>
          ) : (
            <p className="text-base text-gray-800 mb-4" dangerouslySetInnerHTML={{ __html: `Q${questionNumber}. ${questionText}` }} />
          )}
          <div className="space-y-2 ml-4">
            {optionList.map((option, idx) => (
              <label key={idx} className="flex items-start gap-3 cursor-pointer py-1 px-3 rounded-lg hover:bg-gray-50 transition-colors">
                <input
                  type="radio"
                  name={`q${questionNumber}`}
                  value={typeof option === 'string' ? option : option.value}
                  checked={selectedValue === (typeof option === 'string' ? option : option.value)}
                  onChange={() => onChange(typeof option === 'string' ? option : option.value)}
                  className="w-4 h-4 text-blue-600 cursor-pointer mt-0.5 flex-shrink-0"
                />
                {typeof option === 'string' ? (
                  <span className="text-sm text-gray-700">{option}</span>
                ) : (
                  <span className="text-sm text-gray-700" dangerouslySetInnerHTML={{ __html: option.label }} />
                )}
              </label>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [answers, setAnswers] = useState({
        q1: null,
        q2: null,
        q3: null,
        q4: null,
        q5: null,
        q7: '',
        q8: ''
      });
      const [page, setPage] = useState(1);
      const [error, setError] = useState('');
      const [submitted, setSubmitted] = useState(false);
      const [ready, setReady] = useState(false);

      // Keystroke logging for open-ended questions
      const keylogQ7 = useRef([]);
      const keylogQ8 = useRef([]);
      const lastLenQ7 = useRef(0);
      const lastLenQ8 = useRef(0);

      const handleKeyDown = (e, keylogRef) => {
        keylogRef.current.push({
          key: e.key,
          time: Date.now()
        });
      };

      const handleInputChange = (e, keylogRef, lastLenRef, key) => {
        const value = e.target.value;
        const len = value.length;
        const jump = len - lastLenRef.current;

        // Detect large input jumps (e.g., paste)
        if (jump > 10) {
          keylogRef.current.push({
            key: "INPUT_JUMP",
            time: Date.now(),
            jump: jump,
            total: len
          });
        }

        lastLenRef.current = len;
        handleChange(key, value);
      };

      const isAYOrder = CONFIG.order === 'AY';

      useEffect(() => {
        onInitialized(() => setReady(true));
        const timeout = setTimeout(() => {
          if (!isInitialized) {
            console.log('Timeout: starting with default config');
            setReady(true);
          }
        }, 3000);
        return () => clearTimeout(timeout);
      }, []);

      const handleChange = (key, value) => {
        setAnswers(prev => ({ ...prev, [key]: value }));
        setError('');
      };

      const handleNextPage = (requiredKeys, nextPage) => {
        const unanswered = requiredKeys.filter(k => answers[k] === null);
        if (unanswered.length > 0) {
          const nums = unanswered.map(k => k.replace('q', 'Q'));
          setError(`Please answer all questions. Missing: ${nums.join(', ')}`);
          return;
        }
        setError('');
        setPage(nextPage);
        window.scrollTo(0, 0);
        // Tell parent to scroll to top (for iframe embedding)
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'SCROLL_TO_TOP' }, '*');
        }
      };

      const handleSubmit = () => {
        const missing = [];
        if (!answers.q7.trim()) missing.push(isAYOrder ? 'Q5' : 'Q6');
        if (!answers.q8.trim()) missing.push(isAYOrder ? 'Q6' : 'Q7');
        if (missing.length > 0) {
          setError(`Please answer all questions. Missing: ${missing.join(', ')}`);
          return;
        }

        setSubmitted(true);
        // Convert to numerical indices (0-9)
        const pctIndex = (val) => PERCENTAGE_OPTIONS.indexOf(val);

        sendDataToQualtrics('QUESTIONS_COMPLETE', {
          dieterPA: pctIndex(answers.q1),
          dieterPX: pctIndex(answers.q2),
          dieterPY: pctIndex(answers.q3),
          dieterSameNo: pctIndex(answers.q4),
          dieterSameYes: pctIndex(answers.q5),
          dieterVersion: null,
          dieterOwnWords: answers.q7,
          dieterOwnWordsDAG: answers.q8,
          keylogOwnWords: keylogQ7.current,
          keylogOwnWordsDAG: keylogQ8.current
        });
      };

      if (!ready) {
        return (
          <div className="min-h-screen bg-white flex items-center justify-center">
            <p className="text-gray-500 text-lg">Loading...</p>
          </div>
        );
      }

      const page1Questions = [
        {
          key: 'q1',
          content: (
            <>
              How often did <strong>you drink {CONFIG.playerName0}</strong> <DrinkIcon className={`inline-block w-4 h-4 align-middle mx-1 ${getThemeClassesLocal().iconColor}`} drinkName={CONFIG.playerName0} /> <span style={{color: '#64748b', fontStyle: 'italic'}}>(what percentage of the weeks)</span>?
            </>
          )
        },
        ...(isAYOrder ? [] : [{
          key: 'q2',
          text: `How often was your <strong>${CONFIG.playerName1}</strong> level normal <span style="color: #64748b; font-style: italic;">(what percentage of the weeks)</span>?`
        }]),
        {
          key: 'q3',
          text: `How often did you feel <strong>${CONFIG.playerName2Pos}</strong> <span style="color: #64748b; font-style: italic;">(what percentage of the weeks)</span>?`
        }
      ];

      const q4 = {
        key: 'q4',
        text: isAYOrder
          ? `<strong>Whenever you did NOT drink ${CONFIG.playerName0}</strong>, how often did you feel ${CONFIG.playerName2Pos}?`
          : `<strong>Whenever you did NOT drink ${CONFIG.playerName0}</strong>, how often was your ${CONFIG.playerName1} level normal and you also felt ${CONFIG.playerName2Pos}?`
      };

      const q5 = {
        key: 'q5',
        text: isAYOrder
          ? `<strong>Whenever you did drink ${CONFIG.playerName0}</strong>, how often did you feel ${CONFIG.playerName2Pos}?`
          : `<strong>Whenever you did drink ${CONFIG.playerName0}</strong>, how often was your ${CONFIG.playerName1} level normal and you also felt ${CONFIG.playerName2Pos}?`
      };

      return (
        <div className="min-h-screen bg-white pt-0 pb-10 px-4">
          <div className="max-w-5xl mx-auto">
            <h1 className="text-2xl font-bold text-gray-900 mb-4 text-center">
              Questions about Drink {CONFIG.gameCounter}
            </h1>

            {page === 1 && (
              <>
                <p className="text-base text-gray-800 mb-8">
                  {isAYOrder
                    ? `Now, please answer some questions about ${CONFIG.playerName0} and how you feel. You made decisions about ${CONFIG.playerName0} for ${CONFIG.nRounds} weeks; please only consider the second half of that period (weeks ${Math.floor(CONFIG.nRounds / 2)} to ${CONFIG.nRounds}) when answering these questions.`
                    : `Now, please answer some questions about ${CONFIG.playerName0}, ${CONFIG.playerName1} and how you feel. You made decisions about ${CONFIG.playerName0} for ${CONFIG.nRounds} weeks; please only consider the second half of that period (weeks ${Math.floor(CONFIG.nRounds / 2)} to ${CONFIG.nRounds}) when answering these questions.`
                  }
                </p>

                <div className="bg-white border border-gray-200 rounded-xl p-8 shadow-sm">
                  {page1Questions.map((q, idx) => (
                    <RadioQuestion
                      key={q.key}
                      questionNumber={idx + 1}
                      questionText={q.text}
                      questionContent={q.content}
                      selectedValue={answers[q.key]}
                      onChange={(val) => handleChange(q.key, val)}
                    />
                  ))}

                  {error && (
                    <p className="text-red-600 font-medium mb-4">{error}</p>
                  )}

                  <button
                    onClick={() => handleNextPage(isAYOrder ? ['q1', 'q3'] : ['q1', 'q2', 'q3'], 2)}
                    className={`w-full py-3 px-6 ${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white font-semibold rounded-lg transition-colors shadow-md hover:shadow-lg`}
                  >
                    Next
                  </button>
                </div>
              </>
            )}

            {page === 2 && (
              <>
                <p className="text-base text-gray-800 mb-8">
                  You made decisions about {CONFIG.playerName0} for {CONFIG.nRounds} weeks; please only consider the second half of that period (weeks {Math.floor(CONFIG.nRounds / 2)} to {CONFIG.nRounds}) when answering these questions.
                </p>
                <div className="bg-white border border-gray-200 rounded-xl p-8 shadow-sm">
                <RadioQuestion
                  questionNumber={isAYOrder ? 3 : 4}
                  questionText={q4.text}
                  selectedValue={answers.q4}
                  onChange={(val) => handleChange('q4', val)}
                />

                <RadioQuestion
                  questionNumber={isAYOrder ? 4 : 5}
                  questionText={q5.text}
                  selectedValue={answers.q5}
                  onChange={(val) => handleChange('q5', val)}
                />

                {error && (
                  <p className="text-red-600 font-medium mb-4">{error}</p>
                )}

                <button
                  onClick={() => handleNextPage(['q4', 'q5'], 3)}
                  className={`w-full py-3 px-6 ${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white font-semibold rounded-lg transition-colors shadow-md hover:shadow-lg`}
                >
                  Next
                </button>
              </div>
              </>
            )}

            {page === 3 && (
              <div className="bg-white border border-gray-200 rounded-xl p-8 shadow-sm">
                <div className="mb-8">
                  <p className="text-base text-gray-800 mb-4">
                    Q{isAYOrder ? 5 : 6}. In your own words, please describe how you usually chose between "drink {CONFIG.playerName0}" <DrinkIcon className={`inline-block w-4 h-4 align-middle mx-1 ${getThemeClassesLocal().iconColor}`} drinkName={CONFIG.playerName0} /> and "Skip" <SkipIcon className={`inline-block w-4 h-4 align-middle mx-1 ${getThemeClassesLocal().iconColor}`} />. How did your decision making evolve over time?
                  </p>
                  <textarea
                    value={answers.q7}
                    onChange={(e) => handleInputChange(e, keylogQ7, lastLenQ7, 'q7')}
                    onKeyDown={(e) => handleKeyDown(e, keylogQ7)}
                    className={`w-full h-40 p-4 border border-gray-300 rounded-lg text-sm text-gray-700 resize-y focus:outline-none focus:ring-2 ${getThemeClassesLocal().focusRing} ${getThemeClassesLocal().focusBorder}`}
                  />
                </div>

                <div className="mb-8">
                  <p className="text-base text-gray-800 mb-4">
                    {isAYOrder
                      ? `Q6. In your own words, describe how your choice to drink ${CONFIG.playerName0} influence how you feel.`
                      : `Q7. In your own words, describe how your choice to drink ${CONFIG.playerName0}, your ${CONFIG.playerName1} level, and how you feel influence each other, and in what ways.`
                    }
                  </p>
                  <textarea
                    value={answers.q8}
                    onChange={(e) => handleInputChange(e, keylogQ8, lastLenQ8, 'q8')}
                    onKeyDown={(e) => handleKeyDown(e, keylogQ8)}
                    className={`w-full h-40 p-4 border border-gray-300 rounded-lg text-sm text-gray-700 resize-y focus:outline-none focus:ring-2 ${getThemeClassesLocal().focusRing} ${getThemeClassesLocal().focusBorder}`}
                  />
                </div>

                {error && (
                  <p className="text-red-600 font-medium mb-4">{error}</p>
                )}

                <button
                  onClick={handleSubmit}
                  className={`w-full py-3 px-6 ${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white font-semibold rounded-lg transition-colors shadow-md hover:shadow-lg`}
                >
                  Submit
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
