<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Causal Belief Elicitation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; background: #ffffff; }
    
    .pie-segment {
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .pie-segment:hover {
      opacity: 0.8;
    }
    
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-in-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.5s ease-in forwards;
    }

    .animate-blink {
      position: relative;
    }

    .animate-blink::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: #fefce8;
      border-radius: inherit;
      animation: pulse 1.5s ease-in-out infinite;
      z-index: 0;
    }

    .animate-blink > * {
      position: relative;
      z-index: 1;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.25;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    // =============== QUALTRICS COMMUNICATION ===============
    let participantId = null;
    let gameId = null;
    
    window.addEventListener('message', function(event) {
      if (event.data.type === 'INIT') {
        console.log('Received INIT from Qualtrics:', event.data);
        participantId = event.data.participantId;
        gameId = event.data.gameId;

        if (event.data.gameConfig) {
          const qConfig = event.data.gameConfig;
          if (qConfig.playerName0) CONFIG.playerName0 = qConfig.playerName0;
          if (qConfig.playerName1) CONFIG.playerName1 = qConfig.playerName1;
          if (qConfig.playerName2Pos) CONFIG.playerName2Pos = qConfig.playerName2Pos;
          if (qConfig.playerName2Neg) CONFIG.playerName2Neg = qConfig.playerName2Neg;
          if (qConfig.playerName2PosExo) CONFIG.playerName2PosExo = qConfig.playerName2PosExo;
          if (qConfig.playerName2NegExo) CONFIG.playerName2NegExo = qConfig.playerName2NegExo;
          if (qConfig.playerIcon0) CONFIG.playerIcon0 = qConfig.playerIcon0;
          if (qConfig.id !== undefined) CONFIG.id = qConfig.id;
          if (qConfig.beliefPaymentMax !== undefined) CONFIG.beliefPaymentMax = qConfig.beliefPaymentMax;
          if (qConfig.beliefPaymentIncentive !== undefined) CONFIG.beliefPaymentIncentive = qConfig.beliefPaymentIncentive;
          if (qConfig.aCost !== undefined) CONFIG.aCost = qConfig.aCost;
          if (qConfig.currency) CONFIG.currency = qConfig.currency;
          if (qConfig.nRounds !== undefined) CONFIG.nRounds = qConfig.nRounds;
          if (qConfig.currentSymbol) CONFIG.currentSymbol = qConfig.currentSymbol;
          if (qConfig.rationalInference) CONFIG.rationalInference = qConfig.rationalInference;
          if (qConfig.increasingOrder !== undefined) CONFIG.increasingOrder = qConfig.increasingOrder;
          if (qConfig.order) CONFIG.order = qConfig.order;
          if (qConfig.themeColor) CONFIG.themeColor = qConfig.themeColor;
          if (qConfig.skipIntro !== undefined) CONFIG.skipIntro = qConfig.skipIntro;

          // Accept mainCausals as a single array OR as individual fields (mainCausal1, mainCausal2, ...)
          if (qConfig.mainCausals) {
            CONFIG.mainCausals = qConfig.mainCausals;
          } else if (qConfig.mainCausal1) {
            // Build mainCausals from individual fields - keep going until we miss one
            const allMetaData = [];
            for (let i = 1; qConfig['mainCausal' + i]; i++) {
              allMetaData.push(qConfig['mainCausal' + i]);
            }
            if (allMetaData.length > 0) {
              CONFIG.mainCausals = allMetaData;
            }
          }

          // Apply order-based filtering
          applyOrderFilter();

          console.log('Applied config:', CONFIG);
        }

        markInitialized();
        sendDataToQualtrics('ELICIT_START', { started: true });
      }
    });
    
    function sendDataToQualtrics(dataType, data) {
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'GAME_DATA',
          gameId: gameId,
          dataType: dataType,
          data: data,
          participantId: participantId,
          timestamp: new Date().toISOString()
        }, '*');
      }
      console.log('Sent to Qualtrics:', dataType, data);
    }
    
    let isInitialized = false;
    let initCallbacks = [];
    
    function onInitialized(callback) {
      if (isInitialized) callback();
      else initCallbacks.push(callback);
    }
    
    function markInitialized() {
      isInitialized = true;
      initCallbacks.forEach(cb => cb());
      initCallbacks = [];
    }
    
    // Configuration
    const CONFIG = {
      playerName0: 'Zerqalase-norm',  // Drink name (A)
      playerName1: 'Zerqalase',       // Chemical name (X)
      playerName2Pos: 'energetic', // Positive outcome (Y=1)
      playerName2Neg: 'tired',     // Negative outcome (Y=0)
      playerName2PosExo: 'Energenix',  // Medication that causes positive outcome
      playerName2NegExo: 'Somnexil',   // Medication that causes negative outcome
      playerIcon0: '🥤',
      id: 1,                      // Participant ID for data storage
      beliefPaymentMax: 6.00,     // Max payment per question
      beliefPaymentIncentive: 0.10, // Payment reduction per step wrong
      aCost: 0.00,                // Cost of drinking
      currency: '$',              // Currency symbol
      nRounds: 10,                // Number of rounds played
      currentSymbol: null,        // HTML for scenario tile display
      rationalInference: null,    // Will be set from Qualtrics
      // Default mainCausals - will be overwritten by Qualtrics
      increasingOrder: Math.random() < 0.5 ? 1 : 0,  // 1 = increases first, 0 = decreases first
      order: 'AXY',               // 'AXY' shows all questions, 'AY' shows only AY question
      themeColor: 'purple',      // Theme color: 'blue', 'purple', 'teal', 'yellow'
      skipIntro: false,          // Skip intro page when embedded from main game
      mainCausals: [
        { causalElicit: "XY", exoButton: null, id: "XY" },
        { causalElicit: "AX", exoButton: 0, id: "AX0" },
        { causalElicit: "AX", exoButton: 1, id: "AX1" },
        { causalElicit: "AY", exoButton: 0, id: "AY0" },
        { causalElicit: "AY", exoButton: 1, id: "AY1" },
        { causalElicit: "AX", exoButton: null, id: "AX" },
        { causalElicit: "AY", exoButton: null, id: "AY" },
        { causalElicit: "XY", exoButton: 0, id: "XY0" },
        { causalElicit: "XY", exoButton: 1, id: "XY1" },
        { causalElicit: "YX", exoButton: 0, id: "YX0" },
        { causalElicit: "YX", exoButton: 1, id: "YX1" }
      ]
    };

    // Apply order-based filtering to mainCausals
    function applyOrderFilter() {
      if (CONFIG.order === 'AY') {
        CONFIG.mainCausals = [
          { causalElicit: "AY", exoButton: null, id: "AY" }
        ];
      }
    }

    // Apply filter for standalone testing
    applyOrderFilter();

    // Theme classes helper - wrapper for shared function
    const getThemeClassesLocal = () => getThemeClasses(CONFIG.themeColor);

    // Get theme hex color for pie chart
    function getThemeHexColor() {
      const colors = {
        blue: '#3b82f6',
        purple: '#9333ea',
        teal: '#0d9488',
        yellow: '#d97706'
      };
      return colors[CONFIG.themeColor] || colors.blue;
    }

    // Helper function to convert percentage to option index (0-20)
    function getOptionIndex(percentage) {
      if (percentage === null || percentage === undefined) return null;

      if (percentage <= -90) return 0;
      if (percentage <= -80) return 1;
      if (percentage <= -70) return 2;
      if (percentage <= -60) return 3;
      if (percentage <= -50) return 4;
      if (percentage <= -40) return 5;
      if (percentage <= -30) return 6;
      if (percentage <= -20) return 7;
      if (percentage <= -10) return 8;
      if (percentage < 0) return 9;
      if (percentage === 0) return 10;
      if (percentage < 10) return 11;
      if (percentage < 20) return 12;
      if (percentage < 30) return 13;
      if (percentage < 40) return 14;
      if (percentage < 50) return 15;
      if (percentage < 60) return 16;
      if (percentage < 70) return 17;
      if (percentage < 80) return 18;
      if (percentage < 90) return 19;
      return 20;
    }

    // Calculate payments based on responses and correct answers
    function calculatePayments(responses) {
      const beliefPaymentMax = CONFIG.beliefPaymentMax;
      const beliefPaymentIncentive = CONFIG.beliefPaymentIncentive;
      const rationalInference = CONFIG.rationalInference;

      const correctAnswers = [];
      const correctAnswersSlider1 = [];
      const correctAnswersSlider2 = [];

      // Get correct answers for each response
      responses.forEach(r => {
        const causalElicitID = r.id;
        if (rationalInference) {
          correctAnswers.push(rationalInference["causal_" + causalElicitID] ?? null);
          correctAnswersSlider1.push(rationalInference["pNo_" + causalElicitID] ?? null);
          correctAnswersSlider2.push(rationalInference["pYes_" + causalElicitID] ?? null);
        } else {
          correctAnswers.push(null);
          correctAnswersSlider1.push(null);
          correctAnswersSlider2.push(null);
        }
      });

      // Calculate verbal scale payment
      const beliefPayment = correctAnswers.map((correct, index) => {
        const userChoice = responses[index].verbalValue;
        if (userChoice === null || userChoice === undefined) {
          return null;
        }
        if (correct === null || correct === undefined) {
          return beliefPaymentMax;
        }
        const correctOptionIndex = getOptionIndex(correct);
        const absoluteDifference = Math.abs(correctOptionIndex - userChoice);
        return beliefPaymentMax - (absoluteDifference * beliefPaymentIncentive);
      });

      // Calculate slider 1 (pie1) payment
      const beliefPaymentSlider1 = correctAnswersSlider1.map((correct, index) => {
        const userValue = responses[index].pie1Value;
        if (userValue === null || userValue === undefined) {
          return null;
        }
        if (correct === null || correct === undefined) {
          return beliefPaymentMax;
        }
        const nearestCategory = Math.round(correct / 10) * 10;
        const absoluteDifference = Math.abs(nearestCategory - userValue) / 10;
        return beliefPaymentMax - (absoluteDifference * beliefPaymentIncentive);
      });

      // Calculate slider 2 (pie2) payment
      const beliefPaymentSlider2 = correctAnswersSlider2.map((correct, index) => {
        const userValue = responses[index].pie2Value;
        if (userValue === null || userValue === undefined) {
          return null;
        }
        if (correct === null || correct === undefined) {
          return beliefPaymentMax;
        }
        const nearestCategory = Math.round(correct / 10) * 10;
        const absoluteDifference = Math.abs(nearestCategory - userValue) / 10;
        return beliefPaymentMax - (absoluteDifference * beliefPaymentIncentive);
      });

      return {
        beliefPayment,
        beliefPaymentSlider1,
        beliefPaymentSlider2,
        correctAnswers,
        correctAnswersSlider1,
        correctAnswersSlider2
      };
    }
  </script>

    function SadFaceIcon({ className }) {

    function NeutralFaceIcon({ className }) {

    // Pie Chart Component
    function PieChart({ value, onChange, highlightColor }) {
      const UNFILLED_COLOR = '#e5e7eb';
      const FILLED_COLOR = highlightColor || getThemeHexColor();
      
      const polarToCartesian = (cx, cy, radius, angle) => {
        const rad = (angle - 90) * Math.PI / 180;
        return {
          x: cx + radius * Math.cos(rad),
          y: cy + radius * Math.sin(rad)
        };
      };
      
      const createSegmentPath = (index, innerRadius, outerRadius) => {
        const startAngle = index * 36;
        const endAngle = (index + 1) * 36;
        const start = polarToCartesian(0, 0, outerRadius, startAngle);
        const end = polarToCartesian(0, 0, outerRadius, endAngle);
        const startInner = polarToCartesian(0, 0, innerRadius, startAngle);
        const endInner = polarToCartesian(0, 0, innerRadius, endAngle);
        
        return `M ${start.x} ${start.y} A ${outerRadius} ${outerRadius} 0 0 1 ${end.x} ${end.y} L ${endInner.x} ${endInner.y} A ${innerRadius} ${innerRadius} 0 0 0 ${startInner.x} ${startInner.y} Z`;
      };
      
      const handleClick = (index) => {
        const filledCount = value !== null ? value / 10 : 0;
        if (filledCount === 1 && index === 0) {
          onChange(0);
        } else {
          onChange((index + 1) * 10);
        }
      };
      
      const filledCount = value !== null ? value / 10 : 0;
      
      return (
        <div className="flex flex-col items-center">
          <svg viewBox="-130 -130 260 260" className="w-56 h-56">
            {[...Array(10)].map((_, i) => {
              const midAngle = (i * 36 + 18) - 90;
              const labelRadius = 115;
              const labelX = Math.cos(midAngle * Math.PI / 180) * labelRadius;
              const labelY = Math.sin(midAngle * Math.PI / 180) * labelRadius;
              
              return (
                <g key={i}>
                  <path
                    d={createSegmentPath(i, 35, 95)}
                    fill={i < filledCount ? FILLED_COLOR : UNFILLED_COLOR}
                    stroke="white"
                    strokeWidth="2"
                    className="pie-segment"
                    onClick={() => handleClick(i)}
                  />
                  <text
                    x={labelX}
                    y={labelY}
                    textAnchor="middle"
                    dominantBaseline="middle"
                    className="text-xs fill-gray-500 pointer-events-none"
                  >
                    {(i + 1) * 10}%
                  </text>
                </g>
              );
            })}
            <text x="0" y="8" textAnchor="middle" className="text-2xl font-bold fill-gray-700">
              {value !== null ? `${value}%` : '?%'}
            </text>
          </svg>
        </div>
      );
    }

    // Verbal Scale Options Component
    function VerbalScale({ value, onChange, options, increasingOrder }) {
      // Always use original options array structure:
      // options[0-9] = Decreases (90-100% down to 1-9%)
      // options[10] = No change
      // options[11-20] = Increases (1-9% up to 90-100%)

      // Reverse decrease options so both columns go from low to high numbers (1-9% at top)
      const decreaseOptions = [...options.slice(0, 10)].reverse();
      const noChangeOption = options[10];
      const increaseOptions = options.slice(11);

      const accentColor = getThemeHexColor();

      const decreaseColumn = (
        <div className="space-y-1">
          <div className="text-sm text-gray-700 font-medium mb-2 text-center">Decreases</div>
          {decreaseOptions.map((option, idx) => {
            // decreaseOptions is reversed, so idx 0 = options[9], idx 9 = options[0]
            const actualIndex = 9 - idx;
            const isSelected = value === actualIndex;
            return (
              <label
                key={actualIndex}
                className={`flex items-center p-1.5 rounded-lg border-2 cursor-pointer transition-all text-sm whitespace-nowrap ${
                  isSelected
                    ? `${getThemeClassesLocal().buttonBg} text-white border-transparent font-medium`
                    : 'bg-white border-gray-200 hover:border-gray-300'
                }`}
                onClick={() => onChange(actualIndex)}
              >
                <input
                  type="radio"
                  name="causalEffect"
                  checked={isSelected}
                  onChange={() => onChange(actualIndex)}
                  className="mr-1.5 w-3 h-3"
                  style={{ accentColor }}
                />
                <span>{option}</span>
              </label>
            );
          })}
        </div>
      );

      const increaseColumn = (
        <div className="space-y-1">
          <div className="text-sm text-gray-700 font-medium mb-2 text-center">Increases</div>
          {increaseOptions.map((option, idx) => {
            // increaseOptions starts at options[11], so idx 0 = options[11], idx 9 = options[20]
            const actualIndex = 11 + idx;
            const isSelected = value === actualIndex;
            return (
              <label
                key={actualIndex}
                className={`flex items-center p-1.5 rounded-lg border-2 cursor-pointer transition-all text-sm whitespace-nowrap ${
                  isSelected
                    ? `${getThemeClassesLocal().buttonBg} text-white border-transparent font-medium`
                    : 'bg-white border-gray-200 hover:border-gray-300'
                }`}
                onClick={() => onChange(actualIndex)}
              >
                <input
                  type="radio"
                  name="causalEffect"
                  checked={isSelected}
                  onChange={() => onChange(actualIndex)}
                  className="mr-1.5 w-3 h-3"
                  style={{ accentColor }}
                />
                <span>{option}</span>
              </label>
            );
          })}
        </div>
      );

      return (
        <div>
          <div className="grid grid-cols-2 gap-2 mb-2">
            {increasingOrder ? increaseColumn : decreaseColumn}
            {increasingOrder ? decreaseColumn : increaseColumn}
          </div>
          {/* No change option - centered below */}

            className={`flex items-center justify-center p-2 rounded-lg border-2 cursor-pointer transition-all text-sm font-medium ${

            }`}
            onClick={() => onChange(10)}
          >

              type="radio"
              name="causalEffect"
              checked={value === 10}
              onChange={() => onChange(10)}
              className="mr-2"
              style={{ accentColor }}
            />
            <span>{noChangeOption}</span>
          </label>
        </div>
      );
    }

    // Variable Panel Component - shows 3 variables with game-style visuals
    function VariablePanel({ causalElicit, exoButton, stage, pie1Value, pie2Value, playerName0, playerName1, playerName2Pos, playerName2Neg, highlightPanel, isWalkthrough, highlightButton, showArrow }) {
      // Determine variable states based on causalElicit and stage
      // A = Drink, X = Chemical (Qivaryn), Y = How You Feel

      const getVariableStates = () => {
        let aState = 'neutral';  // 'neutral', 'off', 'on', 'question', 'fixed-on', 'fixed-off'
        let xState = 'neutral';
        let yState = 'neutral';

        // During walkthrough, show the final state of all panels
        if (isWalkthrough) {
          if (causalElicit === 'AX') {
            aState = 'cause';
            xState = 'question';
            if (exoButton === 0) yState = 'fixed-off';
            else if (exoButton === 1) yState = 'fixed-on';
            else yState = 'neutral';
          }
          else if (causalElicit === 'AY') {
            aState = 'cause';
            yState = 'question';
            if (exoButton === 0) xState = 'fixed-off';
            else if (exoButton === 1) xState = 'fixed-on';
            else xState = 'neutral';
          }
          else if (causalElicit === 'XY') {
            xState = 'cause';
            yState = 'question';
            if (exoButton === 0) aState = 'fixed-off';
            else if (exoButton === 1) aState = 'fixed-on';
            else aState = 'neutral';
          }
          else if (causalElicit === 'YX') {
            yState = 'cause';
            xState = 'question';
            if (exoButton === 0) aState = 'fixed-off';
            else if (exoButton === 1) aState = 'fixed-on';
          }
          return { aState, xState, yState };
        }

        if (causalElicit === 'AX') {
          if (stage === 1) aState = 'off';
          else if (stage === 2) aState = 'on';
          else aState = 'cause';
          xState = 'question';
          if (exoButton === 0) yState = 'fixed-off';
          else if (exoButton === 1) yState = 'fixed-on';
          else yState = 'neutral';
        }
        else if (causalElicit === 'AY') {
          if (stage === 1) aState = 'off';
          else if (stage === 2) aState = 'on';
          else aState = 'cause';
          yState = 'question';
          if (exoButton === 0) xState = 'fixed-off';
          else if (exoButton === 1) xState = 'fixed-on';
          else xState = 'neutral';
        }
        else if (causalElicit === 'XY') {
          if (stage === 1) xState = 'off';
          else if (stage === 2) xState = 'on';
          else xState = 'cause';
          yState = 'question';
          if (exoButton === 0) aState = 'fixed-off';
          else if (exoButton === 1) aState = 'fixed-on';
          else aState = 'neutral';
        }
        else if (causalElicit === 'YX') {
          if (stage === 1) yState = 'off';
          else if (stage === 2) yState = 'on';
          else yState = 'cause';
          xState = 'question';
          if (exoButton === 0) aState = 'fixed-off';
          else if (exoButton === 1) aState = 'fixed-on';
        }

        return { aState, xState, yState };
      };

      const { aState, xState, yState } = getVariableStates();

      // Check if each panel should be highlighted (highlightPanel can be string or array)
      const highlightPanels = Array.isArray(highlightPanel) ? highlightPanel : (highlightPanel ? [highlightPanel] : []);
      const isAHighlighted = highlightPanels.includes('A');
      const isXHighlighted = highlightPanels.includes('X');
      const isYHighlighted = highlightPanels.includes('Y');
      
      // Drink buttons component (A) - matches game style
      const DrinkPanel = ({ state, highlightButton }) => {

                <DrinkIcon className={`w-8 h-8 ${drinkActive ? theme.iconColor : 'text-gray-400'}`} drinkName={playerName0} />
                <div className={`text-sm ${drinkActive ? 'text-gray-500' : 'text-gray-300'}`}>-{CONFIG.currency}{CONFIG.aCost}</div>

              </div>
              {/* Skip button */}

      // BioClip machine component (X) - matches game exactly
      const MachinePanel = ({ state }) => {

                {/* Question mark - in place of status text */}
                {isQuestion && (
                  <text x="60" y="62" textAnchor="middle" fill="white" fontSize="28" fontWeight="bold">?</text>
                )}
                {/* Status text */}
                {isAYOrder && !isOn && !isOff ? (

                <path d="M0 50 L10 50 L10 110 L0 110 C-4 110 -6 105 -6 100 L-6 60 C-6 55 -4 50 0 50 Z" fill="#475569" />
              </svg>
            </div>
          </div>
        );
      };
      
      // Outcome icon component (Y)
      const OutcomePanel = ({ state }) => {
        const isOn = state === 'on' || state === 'fixed-on';
        const isOff = state === 'off' || state === 'fixed-off';
        const isLocked = state === 'fixed-on' || state === 'fixed-off';
        const isQuestion = state === 'question';

        const getIcon = () => {
          if (isOn) return <HappyFaceIcon className="w-10 h-10 text-white" />;
          if (isOff) return <SadFaceIcon className="w-10 h-10 text-white" />;

          return <NeutralFaceIcon className="w-10 h-10 text-gray-400 opacity-30" />;
        };

        const getStatusText = () => {
          if (isOn) return playerName2Pos.charAt(0).toUpperCase() + playerName2Pos.slice(1) + '!';
          if (isOff) return playerName2Neg.charAt(0).toUpperCase() + playerName2Neg.slice(1);
          if (isQuestion) return '?';
          return '';
        };

        const getCircleStyle = () => {
          if (isOn) return 'bg-gradient-to-br from-emerald-400 to-green-600';
          if (isOff) return 'bg-gradient-to-br from-rose-400 to-red-600';
          if (isQuestion) return 'bg-gray-200';
          return 'bg-gray-200';
        };

        return (
          <div className="flex flex-col items-center">

              </div>
            </div>
          </div>

      };
      
      // Rectangular arrow component that goes above panels (up, horizontal, down)
      // Adjusted for actual panel widths with justify-around layout
      const RectArrow = () => {
        // Panel center positions (percentage of container width)
        const aCenter = 21;
        const xCenter = 56;
        const yCenter = 86;

        if (causalElicit === 'AX') {

          return (
            <div className="absolute top-0 h-12 flex items-start" style={{ left: `${aCenter}%`, width: `${xCenter - aCenter}%` }}>
              <svg className="w-full h-full overflow-visible" viewBox="0 0 100 48" preserveAspectRatio="none">

              <span className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/3 text-amber-500 text-5xl bg-gray-50 px-2">?</span>
            </div>
          );
        }
        if (causalElicit === 'AY') {
          // Arrow from A to Y, over X
          return (
            <div className="absolute top-0 h-12 flex items-start" style={{ left: `${aCenter}%`, width: `${yCenter - aCenter}%` }}>
              <svg className="w-full h-full overflow-visible" viewBox="0 0 100 48" preserveAspectRatio="none">
                <defs>
                  <marker id="arrowhead-ay" markerWidth="10" markerHeight="8" refX="5" refY="4" orient="auto">
                    <polygon points="0 0, 10 4, 0 8" fill="#f59e0b" />
                  </marker>
                </defs>
                <path d="M 0 46 L 0 6 L 100 6 L 100 42" stroke="#f59e0b" strokeWidth="4" fill="none" strokeLinejoin="round" markerEnd="url(#arrowhead-ay)" vectorEffect="non-scaling-stroke" />
              </svg>
              <span className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/3 text-amber-500 text-5xl bg-gray-50 px-2">?</span>
            </div>
          );
        }
        if (causalElicit === 'XY') {
          // Arrow from X to Y
          return (
            <div className="absolute top-0 h-12 flex items-start" style={{ left: `${xCenter}%`, width: `${yCenter - xCenter}%` }}>

                <defs>
                  <marker id="arrowhead-xy" markerWidth="10" markerHeight="8" refX="5" refY="4" orient="auto">
                    <polygon points="0 0, 10 4, 0 8" fill="#f59e0b" />
                  </marker>
                </defs>
                <path d="M 0 46 L 0 6 L 100 6 L 100 42" stroke="#f59e0b" strokeWidth="4" fill="none" strokeLinejoin="round" markerEnd="url(#arrowhead-xy)" vectorEffect="non-scaling-stroke" />
              </svg>
              <span className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/3 text-amber-500 text-5xl bg-gray-50 px-2">?</span>
            </div>
          );
        }
        if (causalElicit === 'YX') {
          // Arrow from Y to X
          return (
            <div className="absolute top-0 h-12 flex items-start" style={{ left: `${xCenter}%`, width: `${yCenter - xCenter}%` }}>
              <svg className="w-full h-full overflow-visible" viewBox="0 0 100 48" preserveAspectRatio="none">
                <defs>
                  <marker id="arrowhead-yx" markerWidth="10" markerHeight="8" refX="5" refY="4" orient="auto">
                    <polygon points="0 0, 10 4, 0 8" fill="#f59e0b" />
                  </marker>
                </defs>
                <path d="M 100 46 L 100 6 L 0 6 L 0 42" stroke="#f59e0b" strokeWidth="4" fill="none" strokeLinejoin="round" markerEnd="url(#arrowhead-yx)" vectorEffect="non-scaling-stroke" />
              </svg>
              <span className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/3 text-amber-500 text-5xl bg-gray-50 px-2">?</span>
            </div>
          );
        }
        return null;
      };

      // Determine which panels are locked
      const isALocked = aState === 'fixed-on' || aState === 'fixed-off';
      const isXLocked = xState === 'fixed-on' || xState === 'fixed-off';
      const isYLocked = yState === 'fixed-on' || yState === 'fixed-off';

      const LockBadge = () => (

    // Single Belief Elicitation Component
    function BeliefElicitation({
      scenario,
      questionNumber,
      totalQuestions,
      playerName0,
      playerName1,
      playerName2Pos,
      playerName2Neg,
      playerName2PosExo,
      playerName2NegExo,
      increasingOrder,
      skipIntro,
      onComplete
    }) {
      // Stage 0 = walkthrough (with walkthroughStep 0, 1, 2), Stage 3 = verbal question
      // Skip stages 1 and 2 (pie charts), except when order is 'AY' (show pie charts for AY)
      const skipPieCharts = CONFIG.order !== 'AY';
      const [stage, setStage] = useState(0);
      const [walkthroughStep, setWalkthroughStep] = useState(0); // 0 = condition, 1 = cause, 2 = effect
      const [pie1Value, setPie1Value] = useState(null);
      const [pie2Value, setPie2Value] = useState(null);
      const [verbalValue, setVerbalValue] = useState(null);
      const [startTime] = useState(Date.now());
      const [showNextButton, setShowNextButton] = useState(false);
      const [showPaymentDetails, setShowPaymentDetails] = useState(false);

      const { causalElicit, exoButton, id } = scenario;

      // 5-second delay for showing the next button when stage changes
      useEffect(() => {
        setShowNextButton(false);
        const timer = setTimeout(() => {
          setShowNextButton(true);
        }, 5000);
        return () => clearTimeout(timer);
      }, [stage, walkthroughStep]);

      // Scroll to top when component mounts (new scenario starts)
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        // Also tell parent window to scroll (for iframe embedding)
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'SCROLL_TO_TOP' }, '*');
        }
      }, []);

      // Auto-advance to step 1 if there's no condition (step 0)
      useEffect(() => {
        if (stage === 0 && walkthroughStep === 0) {
          // For AX/AY with no exoButton, skip to step 1
          if ((causalElicit === 'AX' || causalElicit === 'AY') && exoButton === null) {
            setWalkthroughStep(1);
          }
        }
      }, [stage, walkthroughStep, causalElicit, exoButton]);
      
      // Generate questions based on causalElicit type
      const getQuestionConfig = () => {
        // A = Drink decision, X = Chemical level, Y = How You Feel (outcome)
        
        const instructionConfigs = {
          AX: {
            // Walkthrough text for each step
            walkthroughStep0: exoButton === null
              ? null
              : `In this scenario, you are required to take ${exoButton === 1 ? playerName2PosExo : playerName2NegExo} which makes you feel <strong>${exoButton === 1 ? playerName2Pos : playerName2Neg}</strong>...`,
            walkthroughStep1: exoButton === null
              ? `Report how <strong>your choice to drink ${playerName0}</strong>...`
              : `Report how <strong>your subsequent choice to drink ${playerName0}</strong>...`,
            walkthroughStep2: `...affects your <strong>${playerName1} level</strong>.`,
            walkthroughHighlight: { step0: 'Y', step1: 'A', step2: ['A', 'X'] },
            causePanel: 'A',
            outcomePanel: 'X',
            pie1Question: exoButton === null
              ? `What is the chance that your <strong>${playerName1} level is normal</strong> if you are <strong>required to NOT drink ${playerName0}</strong>?`
              : `Suppose you are required to take ${exoButton === 1 ? playerName2PosExo : playerName2NegExo} which makes you feel <strong>${exoButton === 1 ? playerName2Pos : playerName2Neg}</strong>. Subsequently, you are <strong>required to NOT drink ${playerName0}</strong>.<br>What is the chance that your <strong>${playerName1} level is normal</strong>?`,
            pie2Question: exoButton === null
              ? `What is the chance that your <strong>${playerName1} level is normal</strong> if you are <strong>required to drink ${playerName0}</strong>?`
              : `Suppose you are required to take ${exoButton === 1 ? playerName2PosExo : playerName2NegExo} which makes you feel <strong>${exoButton === 1 ? playerName2Pos : playerName2Neg}</strong>. Subsequently, you are <strong>required to drink ${playerName0}</strong>.<br>What is the chance that your <strong>${playerName1} level is normal</strong>?`,
            verbalQuestion: exoButton === null
              ? `How does <strong>drinking ${playerName0}</strong> change the chance that your <strong>${playerName1} level is normal</strong>?`
              : `Suppose you are required to take ${exoButton === 1 ? playerName2PosExo : playerName2NegExo} which makes you feel <strong>${exoButton === 1 ? playerName2Pos : playerName2Neg}</strong>.<br>How does <strong>your subsequent choice to drink ${playerName0}</strong> change the chance that your <strong>${playerName1} level is normal</strong>?`,
            pie1Color: getThemeHexColor(),
            pie2Color: getThemeHexColor()
          },
          AY: {
            // Walkthrough text for each step
            walkthroughStep0: exoButton === null
              ? null
              : `In this scenario, immediately after deciding whether to drink ${playerName0}, you are required to take ${playerName1}-${exoButton === 1 ? 'normal-injection' : 'abnormal-injection'} which sets your ${playerName1} level to <strong>${exoButton === 1 ? 'normal' : 'abnormal'}</strong>...`,
            walkthroughStep1: `Report how <strong>your choice to drink ${playerName0}</strong>...`,
            walkthroughStep2: `...affects <strong>how you feel</strong>.`,
            walkthroughHighlight: { step0: 'X', step1: 'A', step2: ['A', 'Y'] },
            causePanel: 'A',
            outcomePanel: 'Y',
            pie1Question: exoButton === null
              ? `What is the chance that you feel <strong>${playerName2Pos}</strong> if you must <strong>not</strong> drink ${playerName0}?`

            walkthroughHighlight: { step0: 'A', step1: 'X', step2: ['X', 'Y'] },
            causePanel: 'X',
            outcomePanel: 'Y',
            pie1Question: exoButton === null
              ? `What is the chance that you feel <strong>${playerName2Pos}</strong> if your <strong>${playerName1} level is abnormal</strong>?`
              : `Suppose you must ${exoButton === 1 ? '<strong>drink</strong>' : '<strong>not</strong> drink'} ${playerName0}. Immediately after, you are required to take ${playerName1}-abnormal-injection which sets your ${playerName1} level to <strong>abnormal</strong>.<br>What is the chance that you feel <strong>${playerName2Pos}</strong>?`,
            pie2Question: exoButton === null
              ? `What is the chance that you feel <strong>${playerName2Pos}</strong> if your <strong>${playerName1} level is normal</strong>?`
              : `Suppose you must ${exoButton === 1 ? '<strong>drink</strong>' : '<strong>not</strong> drink'} ${playerName0}. Immediately after, you are required to take ${playerName1}-normal-injection which sets your ${playerName1} level to <strong>normal</strong>.<br>What is the chance that you feel <strong>${playerName2Pos}</strong>?`,
            verbalQuestion: exoButton === null
              ? `How does having a <strong>normal ${playerName1}</strong> (rather than abnormal) level change the chance that you feel <strong>${playerName2Pos}</strong>?`
              : `Suppose you must ${exoButton === 1 ? '<strong>drink</strong>' : '<strong>not</strong> drink'} ${playerName0}.<br>How does having a <strong>normal ${playerName1}</strong> (rather than abnormal) level change the chance that you feel <strong>${playerName2Pos}</strong>?`,
            pie1Color: getThemeHexColor(),
            pie2Color: getThemeHexColor()
          },
          YX: {
            // Walkthrough text for each step
            walkthroughStep0: `In this scenario, you must ${exoButton === 1 ? '<strong>drink</strong>' : '<strong>not</strong> drink'} ${playerName0} ...`,
            walkthroughStep1: `Report how <strong>how you feel</strong>...`,
            walkthroughStep2: `...affects your <strong>${playerName1} level</strong>.`,
            walkthroughHighlight: { step0: 'A', step1: 'Y', step2: ['Y', 'X'] },
            causePanel: 'Y',
            outcomePanel: 'X',
            pie1Question: `Suppose you must ${exoButton === 1 ? '<strong>drink</strong>' : '<strong>not</strong> drink'} ${playerName0}. Immediately after, you are required to take ${playerName2NegExo} which makes you feel <strong>${playerName2Neg}</strong>.<br>What is the chance that your <strong>${playerName1} level is normal</strong>?`,
            pie2Question: `Suppose you must ${exoButton === 1 ? '<strong>drink</strong>' : '<strong>not</strong> drink'} ${playerName0}. Immediately after, you are required to take ${playerName2PosExo} which makes you feel <strong>${playerName2Pos}</strong>.<br>What is the chance that your <strong>${playerName1} level is normal</strong>?`,
            verbalQuestion: `Suppose you must ${exoButton === 1 ? '<strong>drink</strong>' : '<strong>not</strong> drink'} ${playerName0}.<br>How does feeling <strong>${playerName2Pos}</strong> (rather than being ${playerName2Neg}) change the chance that your <strong>${playerName1} level is normal</strong>?`,
            pie1Color: getThemeHexColor(),
            pie2Color: getThemeHexColor()
          }
        };
        
        return instructionConfigs[causalElicit];
      };
      
      const config = getQuestionConfig();
      
      const verbalOptions = [
        `Decreases the chance by 90-100%`,
        `Decreases the chance by 80-89%`,
        `Decreases the chance by 70-79%`,
        `Decreases the chance by 60-69%`,
        `Decreases the chance by 50-59%`,
        `Decreases the chance by 40-49%`,
        `Decreases the chance by 30-39%`,
        `Decreases the chance by 20-29%`,
        `Decreases the chance by 10-19%`,
        `Decreases the chance by 1-9%`,
        `No change`,
        `Increases the chance by 1-9%`,
        `Increases the chance by 10-19%`,
        `Increases the chance by 20-29%`,
        `Increases the chance by 30-39%`,
        `Increases the chance by 40-49%`,
        `Increases the chance by 50-59%`,
        `Increases the chance by 60-69%`,
        `Increases the chance by 70-79%`,
        `Increases the chance by 80-89%`,
        `Increases the chance by 90-100%`
      ];
      
      const handleSubmit = () => {
        const roundTime = (Date.now() - startTime) / 1000;
        onComplete({
          id: id,
          causalElicit: causalElicit,
          exoButton: exoButton,
          pie1Value: pie1Value,
          pie2Value: pie2Value,
          verbalValue: verbalValue,
          verbalText: verbalOptions[verbalValue],
          roundTime: roundTime
        });
      };
      
      const canProceedToStage2 = pie1Value !== null;
      const canProceedToStage3 = pie2Value !== null;
      const canSubmit = verbalValue !== null;

      // Get walkthrough text and highlight based on current step
      const getWalkthroughContent = () => {
        if (!config.walkthroughHighlight) return { text: '', highlight: null };

        const stepKey = `step${walkthroughStep}`;
        const highlightKey = config.walkthroughHighlight[stepKey];

        // For step 0, skip if there's no condition (exoButton === null for AX/AY)
        if (walkthroughStep === 0 && !config.walkthroughStep0) {
          return { text: config.walkthroughStep1, highlight: config.walkthroughHighlight.step1, skipToStep1: true };
        }

        const texts = {
          0: config.walkthroughStep0,
          1: config.walkthroughStep1,
          2: config.walkthroughStep2
        };

        return { text: texts[walkthroughStep], highlight: highlightKey, skipToStep1: false };
      };

      const walkthroughContent = getWalkthroughContent();

      // Handle walkthrough next button
      const handleWalkthroughNext = () => {
        // If we should skip step 0 (no condition), start from step 1
        if (walkthroughStep === 0 && walkthroughContent.skipToStep1) {
          setWalkthroughStep(1);
          return;
        }

        if (walkthroughStep < 2) {
          setWalkthroughStep(walkthroughStep + 1);
        } else {
          // Move to question stage - skip to stage 3 if pie charts are skipped
          setStage(skipPieCharts ? 3 : 1);
        }
      };

      // Determine the actual starting step for walkthrough
      const effectiveWalkthroughStep = walkthroughContent.skipToStep1 && walkthroughStep === 0 ? 1 : walkthroughStep;

      return (
        <div className="min-h-screen bg-white px-4 pt-0 pb-4">

              <div className="mb-6">
                <div className="flex justify-between text-sm text-gray-600 mb-2">
                  <span>Question {questionNumber} of {totalQuestions}</span>

                </div>
                <div className="h-2 bg-gray-300 rounded-full overflow-hidden">
                  <div
                    className={`h-full ${getThemeClassesLocal().buttonBg} transition-all duration-300`}
                    style={{ width: `${(questionNumber / totalQuestions) * 100}%` }}
                  />
                </div>
              </div>
            )}

            {/* Main Card - Contains everything */}
            <div className="bg-white rounded-xl shadow-lg p-6">
              {/* Walkthrough Stage */}
              {stage === 0 && (

                  {/* Intro message when redirected from main game */}
                  {skipIntro && (
                    <h2 className="text-2xl font-bold text-gray-800 text-center mb-4">
                      Before making your decisions for the rest of the weeks for this drink...<br />Please answer the following question.
                    </h2>
                  )}

                  {/* Payment notice when redirected from main game */}
                  {skipIntro && (
                    <div className="mb-4">
                      <p className="text-gray-600 text-sm">
                        If this question is randomly selected to determine your bonus payment, you will receive {CONFIG.currency}{Number(CONFIG.beliefPaymentMax).toFixed(0)} if your report is accurate. The less accurate your report, the lower this bonus will be.{' '}
                        {!showPaymentDetails && (
                          <button
                            onClick={() => setShowPaymentDetails(true)}
                            className={`${getThemeClassesLocal().pillText} hover:opacity-80 underline`}
                          >
                            Show details
                          </button>
                        )}
                      </p>
                      {showPaymentDetails && (
                        <div className="bg-gray-50 rounded-lg p-4 mt-3 text-sm text-gray-700">
                          <p className="font-bold mb-2">How is my payment determined if this part counts?</p>
                          <p className="mb-2">
                            You will select a line from a list describing how much one factor affects another.
                          </p>
                          <p>
                            You will earn <strong>{CONFIG.currency}{Number(CONFIG.beliefPaymentMax).toFixed(0)}</strong> if you choose the segment or line that matches what actually happened. For each segment or line by which your estimate deviates from the correct answer, your bonus shrinks by <strong>{CONFIG.currency}{Number(CONFIG.beliefPaymentIncentive).toFixed(2)}</strong>.
                          </p>
                        </div>
                      )}
                    </div>
                  )}
                  {/* Walkthrough text */}
                  <div key={walkthroughStep} className="border border-yellow-200 rounded-lg p-4 mb-4 animate-blink">
                    <p className="text-gray-700 text-center text-lg" dangerouslySetInnerHTML={{ __html: walkthroughContent.text }} />
                  </div>

                  {/* Variable Panel with highlight */}
                  <VariablePanel
                    causalElicit={causalElicit}
                    exoButton={exoButton}
                    stage={stage}
                    pie1Value={pie1Value}
                    pie2Value={pie2Value}
                    playerName0={playerName0}
                    playerName1={playerName1}
                    playerName2Pos={playerName2Pos}
                    playerName2Neg={playerName2Neg}
                    highlightPanel={walkthroughContent.highlight}
                    isWalkthrough={true}
                    highlightButton={null}
                    showArrow={!skipPieCharts ? false : walkthroughStep === 2}
                  />

                  {/* Next button */}
                  <div className="flex justify-center">
                    <button
                      onClick={handleWalkthroughNext}
                      className="px-8 py-3 rounded-lg font-medium text-lg transition-all bg-yellow-500 hover:bg-yellow-600 text-white"
                    >
                      {walkthroughStep === 2 ? 'I understand this scenario →' : 'Continue'}
                    </button>
                  </div>
                </div>
              )}

              {/* Questions Stage (stage >= 1) */}
              {stage >= 1 && (
                <>
                  {/* Variable Panel */}
                  <VariablePanel
                    causalElicit={causalElicit}
                    exoButton={exoButton}
                    stage={stage}
                    pie1Value={pie1Value}
                    pie2Value={pie2Value}
                    playerName0={playerName0}
                    playerName1={playerName1}
                    playerName2Pos={playerName2Pos}
                    playerName2Neg={playerName2Neg}
                    highlightPanel={(stage === 1 || stage === 2 || stage === 3) ? [config.causePanel, config.outcomePanel] : null}
                    isWalkthrough={false}
                    highlightButton={config.causePanel === 'A' ? (stage === 1 ? 'skip' : stage === 2 ? 'drink' : null) : null}
                    showArrow={!skipPieCharts ? stage === 3 : true}
                  />

                  {/* Divider */}
                  <div className="border-t border-gray-200 my-6" />

                  {/* Step indicator - hide when skipping pie charts */}
                  {!skipPieCharts && (
                    <div className="flex justify-center mb-4">
                      <div className="flex items-center gap-2">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${
                          stage === 1 ? `${getThemeClassesLocal().buttonBg} text-white` : 'bg-gray-300 text-gray-500'
                        }`}>
                          1
                        </div>
                        <div className={`w-12 h-1 bg-gray-300`} />
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${
                          stage === 2 ? `${getThemeClassesLocal().buttonBg} text-white` : 'bg-gray-300 text-gray-500'
                        }`}>
                          2
                        </div>
                        <div className={`w-12 h-1 bg-gray-300`} />
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${
                          stage === 3 ? `${getThemeClassesLocal().buttonBg} text-white` : 'bg-gray-300 text-gray-500'
                        }`}>
                          3
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Question content - changes based on stage */}
                  <div>
                {/* Stage 1: First Pie Chart */}
                {stage === 1 && (
                  <div className="animate-fadeIn">
                    <p className="text-gray-700 text-center mb-6" dangerouslySetInnerHTML={{ __html: config.pie1Question }} />
                    <div className="flex justify-center mb-6">
                      <PieChart
                        value={pie1Value}
                        onChange={setPie1Value}
                        highlightColor={config.pie1Color}
                      />
                    </div>
                    <div className="flex justify-center">
                      <button
                        onClick={() => setStage(2)}
                        disabled={!canProceedToStage2 || !showNextButton}
                        className={`px-8 py-3 rounded-lg font-medium text-lg ${
                          showNextButton ? 'opacity-100 transition-opacity duration-[2000ms] ease-in' : 'opacity-0 pointer-events-none'
                        } ${
                          canProceedToStage2
                            ? `${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white`
                            : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                        }`}
                      >
                        Continue
                      </button>
                    </div>
                  </div>
                )}

                {/* Stage 2: Second Pie Chart */}
                {stage === 2 && (
                  <div className="animate-fadeIn">
                    <p className="text-gray-700 text-center mb-6" dangerouslySetInnerHTML={{ __html: config.pie2Question }} />
                    <div className="flex justify-center mb-6">
                      <PieChart
                        value={pie2Value}
                        onChange={setPie2Value}
                        highlightColor={config.pie2Color}
                      />
                    </div>
                    <div className="flex justify-center gap-4">
                      <button
                        onClick={() => setStage(1)}
                        className="px-6 py-3 rounded-lg font-medium text-lg transition-all bg-gray-200 hover:bg-gray-300 text-gray-700"
                      >
                        ← Back
                      </button>
                      <button
                        onClick={() => setStage(3)}
                        disabled={!canProceedToStage3 || !showNextButton}
                        className={`px-8 py-3 rounded-lg font-medium text-lg ${
                          showNextButton ? 'opacity-100 transition-opacity duration-[2000ms] ease-in' : 'opacity-0 pointer-events-none'
                        } ${
                          canProceedToStage3
                            ? `${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white`
                            : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                        }`}
                      >
                        Continue
                      </button>
                    </div>
                  </div>
                )}

                {/* Stage 3: Verbal Scale */}
                {stage === 3 && (
                  <div className="animate-fadeIn">
                    <p className="text-gray-700 text-center mb-4" dangerouslySetInnerHTML={{ __html: config.verbalQuestion }} />
                    <div className="max-w-2xl mx-auto">
                      <VerbalScale
                        value={verbalValue}
                        onChange={setVerbalValue}
                        options={verbalOptions}
                        increasingOrder={increasingOrder === 1}
                      />
                    </div>
                    <div className="flex justify-center gap-4 mt-4">
                      {!skipPieCharts && (
                        <button
                          onClick={() => setStage(2)}
                          className="px-6 py-3 rounded-lg font-medium text-lg transition-all bg-gray-200 hover:bg-gray-300 text-gray-700"
                        >
                          ← Back
                        </button>
                      )}
                      <button
                        onClick={handleSubmit}
                        disabled={!canSubmit || !showNextButton}
                        className={`px-8 py-3 rounded-lg font-medium text-lg ${
                          showNextButton ? 'opacity-100 transition-opacity duration-[2000ms] ease-in' : 'opacity-0 pointer-events-none'
                        } ${
                          canSubmit
                            ? `${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white`
                            : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                        }`}
                      >
                        Submit
                      </button>
                    </div>
                  </div>
                    )}
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Intro Page Component

      const [introStep, setIntroStep] = useState(0);

        const timer = setTimeout(() => {
          setShowNextButton(true);

              {/* Next button for step 1 */}

                <div className="flex justify-end mb-6">

                    className={`px-8 py-3 ${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white font-medium text-lg rounded-lg ${

                  >
                    Continue

                  {/* Continue Button */}
                  <div className="flex justify-end">
                    <button
                      onClick={onContinue}
                      disabled={!showNextButton}
                      className={`px-8 py-3 ${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white font-medium text-lg rounded-lg ${
                        showNextButton ? 'opacity-100 transition-opacity duration-[2000ms] ease-in' : 'opacity-0 pointer-events-none'
                      }`}
                    >
                      Continue
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );

    // Main App Component
    function CausalBeliefApp() {
      const [ready, setReady] = useState(false);
      const [showIntro, setShowIntro] = useState(true);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [allResponses, setAllResponses] = useState([]);
      const [completed, setCompleted] = useState(false);
      
      useEffect(() => {
        const timeout = setTimeout(() => {
          if (!ready) {
            console.log('Timeout: starting with default config');
            setReady(true);
          }
        }, 3000);
        
        onInitialized(() => {
          clearTimeout(timeout);
          setReady(true);
          // Skip intro if configured (when embedded from main game)
          if (CONFIG.skipIntro) {
            setShowIntro(false);
          }
        });
        
        return () => clearTimeout(timeout);
      }, []);
      
      const handleComplete = useCallback((response) => {
        const newResponses = [...allResponses, response];
        setAllResponses(newResponses);
        
        if (currentIndex < CONFIG.mainCausals.length - 1) {
          setCurrentIndex(prev => prev + 1);
          window.scrollTo({ top: 0, behavior: 'smooth' });
          // Also tell parent window to scroll (for iframe embedding)
          if (window.parent !== window) {
            window.parent.postMessage({ type: 'SCROLL_TO_TOP' }, '*');
          }
        } else {
          // All done - calculate payments and send data
          setCompleted(true);

          const payments = calculatePayments(newResponses);
          const id = CONFIG.id;

          // Prepare data in the format expected by Qualtrics
          const beliefHistory = newResponses.map(r => ({
            id: r.id,
            causalElicit: r.causalElicit,
            exoButton: r.exoButton,
            pie1Value: r.pie1Value,
            pie2Value: r.pie2Value,
            verbalValue: r.verbalValue,
            verbalText: r.verbalText
          }));

          const beliefRoundTimes = newResponses.map(r => r.roundTime);

          sendDataToQualtrics('CAUSAL_BELIEFS', {
            id: id,
            responses: newResponses,
            beliefHistory: beliefHistory,
            beliefRoundTimes: beliefRoundTimes,
            beliefPayment: payments.beliefPayment,
            beliefPaymentSlider1: payments.beliefPaymentSlider1,
            beliefPaymentSlider2: payments.beliefPaymentSlider2,
            beliefCorrectAnswer: payments.correctAnswers,
            beliefCorrectAnswerSlider1: payments.correctAnswersSlider1,
            beliefCorrectAnswerSlider2: payments.correctAnswersSlider2,
            // Also include raw values for convenience
            pie1Values: newResponses.map(r => r.pie1Value),
            pie2Values: newResponses.map(r => r.pie2Value),
            verbalValues: newResponses.map(r => r.verbalValue),
            beliefs: newResponses.map(r => r.verbalValue),
            increasingOrder: CONFIG.increasingOrder
          });

          console.log('Payments calculated:', payments);
          console.log('beliefHistory:', beliefHistory);
          console.log('beliefRoundTimes:', beliefRoundTimes);

          setTimeout(() => {
            sendDataToQualtrics('ELICIT_COMPLETE', { completed: true, id: id });
          }, 500);
        }
      }, [allResponses, currentIndex]);
      
      if (!ready) {
        return (
          <div className="min-h-screen bg-white flex items-start justify-center pt-8">
            <div className="text-gray-600 text-xl">Loading...</div>
          </div>
        );
      }

      if (showIntro) {
        return <IntroPage onContinue={() => setShowIntro(false)} />;
      }

      if (completed) {
        return null;
      }

      const currentScenario = CONFIG.mainCausals[currentIndex];

      return (
        <BeliefElicitation
          key={currentIndex}
          scenario={currentScenario}
          questionNumber={currentIndex + 1}
          totalQuestions={CONFIG.mainCausals.length}
          playerName0={CONFIG.playerName0}
          playerName1={CONFIG.playerName1}
          playerName2Pos={CONFIG.playerName2Pos}
          playerName2Neg={CONFIG.playerName2Neg}
          playerName2PosExo={CONFIG.playerName2PosExo}
          playerName2NegExo={CONFIG.playerName2NegExo}
          increasingOrder={CONFIG.increasingOrder}
          skipIntro={CONFIG.skipIntro}
          onComplete={handleComplete}
        />
      );
    }

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<CausalBeliefApp />);
  </script>
</body>
</html>
