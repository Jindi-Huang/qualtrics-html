<!DOCTYPE html>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; background: #ffffff; }

    .pie-segment { cursor: pointer; transition: opacity 0.2s; }
    .pie-segment:hover { opacity: 0.8; }

    .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .fade-in { animation: fadeIn 0.5s ease-in forwards; }

    .animate-blink { position: relative; }
    .animate-blink::before {
      content: ''; position: absolute; inset: 0;
      background-color: #fefce8; border-radius: inherit;
      animation: pulse 1.5s ease-in-out infinite; z-index: 0;
    }
    .animate-blink > * { position: relative; z-index: 1; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // =============== QUALTRICS COMMUNICATION ===============
    let participantId = null;
    let gameId = null;
    let configReceived = false;

    window.addEventListener('message', function(event) {
      if (event.data.type === 'INIT') {
        console.log('Received INIT from Qualtrics:', event.data);
        configReceived = true;
        participantId = event.data.participantId;
        gameId = event.data.gameId;

        if (event.data.gameConfig) {
          const qConfig = event.data.gameConfig;

          // Handle supergame first so defaults reset properly
          if (qConfig.supergame) {
            CONFIG.supergame = qConfig.supergame;
            if (qConfig.aCost === undefined) CONFIG.aCost = null;
            if (qConfig.mainCausals === undefined && qConfig.mainCausal1 === undefined) CONFIG.mainCausals = null;
          }

          if (qConfig.playerName0) CONFIG.playerName0 = qConfig.playerName0;
          if (qConfig.playerName1) CONFIG.playerName1 = qConfig.playerName1;
          if (qConfig.playerName2Pos) CONFIG.playerName2Pos = qConfig.playerName2Pos;
          if (qConfig.playerName2Neg) CONFIG.playerName2Neg = qConfig.playerName2Neg;
          if (qConfig.playerName2PosExo) CONFIG.playerName2PosExo = qConfig.playerName2PosExo;
          if (qConfig.playerName2NegExo) CONFIG.playerName2NegExo = qConfig.playerName2NegExo;
          if (qConfig.playerIcon0) CONFIG.playerIcon0 = qConfig.playerIcon0;
          if (qConfig.id !== undefined) CONFIG.id = qConfig.id;
          if (qConfig.beliefPaymentMax !== undefined) CONFIG.beliefPaymentMax = qConfig.beliefPaymentMax;
          if (qConfig.beliefPaymentIncentive !== undefined) CONFIG.beliefPaymentIncentive = qConfig.beliefPaymentIncentive;
          if (qConfig.aCost !== undefined) CONFIG.aCost = qConfig.aCost;
          if (qConfig.currency) CONFIG.currency = qConfig.currency;
          if (qConfig.nRounds !== undefined) CONFIG.nRounds = qConfig.nRounds;
          if (qConfig.currentSymbol) CONFIG.currentSymbol = qConfig.currentSymbol;
          if (qConfig.rationalInference) CONFIG.rationalInference = qConfig.rationalInference;
          if (qConfig.increasingOrder !== undefined) CONFIG.increasingOrder = qConfig.increasingOrder;
          if (qConfig.order) CONFIG.order = qConfig.order;
          if (qConfig.themeColor) CONFIG.themeColor = qConfig.themeColor;
          if (qConfig.skipIntro !== undefined) CONFIG.skipIntro = qConfig.skipIntro;
          if (qConfig.forceSkipPieCharts !== undefined) CONFIG.forceSkipPieCharts = qConfig.forceSkipPieCharts;

          if (qConfig.mainCausals) {
            CONFIG.mainCausals = qConfig.mainCausals;
          } else {
            const prefix = qConfig.supergame === 'migraines' ? 'mainCausalMigraines' : 'mainCausal';
            if (qConfig[prefix + '1']) {
              const allMetaData = [];
              for (let i = 1; qConfig[prefix + i]; i++) {
                allMetaData.push(qConfig[prefix + i]);
              }
              if (allMetaData.length > 0) CONFIG.mainCausals = allMetaData;
            }
          }

          applySupergameDefaults();
          applyOrderFilter();
          console.log('Applied config:', CONFIG);
        }

        markInitialized();
        sendDataToQualtrics('ELICIT_START', { started: true });
      }
    });

    if (window.parent !== window) {
      window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
    }

    function sendDataToQualtrics(dataType, data) {
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'GAME_DATA',
          gameId: gameId,
          dataType: dataType,
          data: data,
          participantId: participantId,
          configReceived: configReceived,
          timestamp: new Date().toISOString()
        }, '*');
      }
      console.log('Sent to Qualtrics:', dataType, data);
    }

    let isInitialized = false;
    let initCallbacks = [];
    function onInitialized(callback) {
      if (isInitialized) callback();
      else initCallbacks.push(callback);
    }
    function markInitialized() {
      isInitialized = true;
      initCallbacks.forEach(cb => cb());
      initCallbacks = [];
    }

    // =============== CONFIGURATION ===============
    // supergame: 'dieter' replicates dietersDilemmaBeliefV2.html behavior
    //            'migraines' replicates confoundedChoiceBeliefV2.html behavior
    const CONFIG = {
      supergame: 'dieter',         // 'dieter' or 'migraines'
      playerName0: 'Zerqalase-norm',
      playerName1: 'Zerqalase',
      playerName2Pos: 'energetic',
      playerName2Neg: 'tired',
      playerName2PosExo: 'Energenix',
      playerName2NegExo: 'Somnexil',
      playerIcon0: '🥤',
      id: 1,
      beliefPaymentMax: 6.00,
      beliefPaymentIncentive: 0.10,
      aCost: null,                 // null → use supergame default
      currency: '$',
      nRounds: 10,
      currentSymbol: null,
      rationalInference: null,
      increasingOrder: Math.random() < 0.5 ? 1 : 0,
      order: 'AYX',
      themeColor: 'purple',
      skipIntro: false,
      forceSkipPieCharts: false,  // when true (set by parent), always skip pie-chart elicitation
      mainCausals: null            // null → use supergame default
    };

    // =============== SUPERGAME DEFAULTS ===============
    const defaultMainCausalsDieter = [
      { causalElicit: "XY", exoButton: null, id: "XY" },
      { causalElicit: "AX", exoButton: 0, id: "AX0" },
      { causalElicit: "AX", exoButton: 1, id: "AX1" },
      { causalElicit: "AY", exoButton: 0, id: "AY0" },
      { causalElicit: "AY", exoButton: 1, id: "AY1" },
      { causalElicit: "AX", exoButton: null, id: "AX" },
      { causalElicit: "AY", exoButton: null, id: "AY" },
      { causalElicit: "XY", exoButton: 0, id: "XY0" },
      { causalElicit: "XY", exoButton: 1, id: "XY1" },
      { causalElicit: "YX", exoButton: 0, id: "YX0" },
      { causalElicit: "YX", exoButton: 1, id: "YX1" }
    ];

    const groupsMigraines = [
      [
        { causalElicit: "AY", exoButton: 0, id: "AY0" },
        { causalElicit: "AY", exoButton: 1, id: "AY1" }
      ],
      [
        { causalElicit: "XY", exoButton: 0, id: "XY0" },
        { causalElicit: "XY", exoButton: 1, id: "XY1" },
        { causalElicit: "XY", exoButton: null, id: "XY" }
      ],
      [
        { causalElicit: "YX", exoButton: 0, id: "YX0" },
        { causalElicit: "YX", exoButton: 1, id: "YX1" }
      ],
      [
        { causalElicit: "XA", exoButton: null, id: "XA" }
      ]
    ];

    function applySupergameDefaults() {
      const isMig = CONFIG.supergame === 'migraines';
      if (CONFIG.aCost === null || CONFIG.aCost === undefined) {
        CONFIG.aCost = isMig ? 1.50 : 0.00;
      }
      if (CONFIG.mainCausals === null || CONFIG.mainCausals === undefined ||
          (Array.isArray(CONFIG.mainCausals) && CONFIG.mainCausals.length === 0)) {
        CONFIG.mainCausals = isMig ? groupsMigraines.flat() : defaultMainCausalsDieter.slice();
      }
    }

    function applyOrderFilter() {
      if (CONFIG.order === 'AY') {
        CONFIG.mainCausals = [{ causalElicit: "AY", exoButton: null, id: "AY" }];
      }
    }

    // Allow standalone testing: ?supergame=migraines or ?supergame=dieter
    try {
      const urlSupergame = new URLSearchParams(window.location.search).get('supergame');
      if (urlSupergame === 'migraines' || urlSupergame === 'dieter') {
        CONFIG.supergame = urlSupergame;
      }
    } catch (e) {}

    // Apply defaults for standalone testing
    applySupergameDefaults();
    applyOrderFilter();

    // =============== THEME / HELPERS ===============
    const getThemeClassesLocal = () => getThemeClasses(CONFIG.themeColor);

    function getThemeHexColor() {
      const colors = { blue: '#3b82f6', purple: '#9333ea', teal: '#0d9488', yellow: '#d97706' };
      return colors[CONFIG.themeColor] || colors.blue;
    }

    function getOptionIndex(percentage) {
      if (percentage === null || percentage === undefined) return null;
      if (percentage <= -90) return 0;
      if (percentage <= -80) return 1;
      if (percentage <= -70) return 2;
      if (percentage <= -60) return 3;
      if (percentage <= -50) return 4;
      if (percentage <= -40) return 5;
      if (percentage <= -30) return 6;
      if (percentage <= -20) return 7;
      if (percentage <= -10) return 8;
      if (percentage < 0) return 9;
      if (percentage === 0) return 10;
      if (percentage < 10) return 11;
      if (percentage < 20) return 12;
      if (percentage < 30) return 13;
      if (percentage < 40) return 14;
      if (percentage < 50) return 15;
      if (percentage < 60) return 16;
      if (percentage < 70) return 17;
      if (percentage < 80) return 18;
      if (percentage < 90) return 19;
      return 20;
    }

    function calculatePayments(responses) {
      const beliefPaymentMax = CONFIG.beliefPaymentMax;
      const beliefPaymentIncentive = CONFIG.beliefPaymentIncentive;
      const rationalInference = CONFIG.rationalInference;

      const correctAnswers = [];
      const correctAnswersSlider1 = [];
      const correctAnswersSlider2 = [];

      responses.forEach(r => {
        const causalElicitID = r.id;
        if (rationalInference) {
          correctAnswers.push(rationalInference["causal_" + causalElicitID] ?? null);
          correctAnswersSlider1.push(rationalInference["pNo_" + causalElicitID] ?? null);
          correctAnswersSlider2.push(rationalInference["pYes_" + causalElicitID] ?? null);
        } else {
          correctAnswers.push(null);
          correctAnswersSlider1.push(null);
          correctAnswersSlider2.push(null);
        }
      });

      const beliefPayment = correctAnswers.map((correct, index) => {
        const userChoice = responses[index].verbalValue;
        if (userChoice === null || userChoice === undefined) return null;
        if (correct === null || correct === undefined) return beliefPaymentMax;
        const correctOptionIndex = getOptionIndex(correct);
        const absoluteDifference = Math.abs(correctOptionIndex - userChoice);
        return beliefPaymentMax - (absoluteDifference * beliefPaymentIncentive);
      });

      const beliefPaymentSlider1 = correctAnswersSlider1.map((correct, index) => {
        const userValue = responses[index].pie1Value;
        if (userValue === null || userValue === undefined) return null;
        if (correct === null || correct === undefined) return beliefPaymentMax;
        const nearestCategory = Math.round(correct / 10) * 10;
        const absoluteDifference = Math.abs(nearestCategory - userValue) / 10;
        return beliefPaymentMax - (absoluteDifference * beliefPaymentIncentive);
      });

      const beliefPaymentSlider2 = correctAnswersSlider2.map((correct, index) => {
        const userValue = responses[index].pie2Value;
        if (userValue === null || userValue === undefined) return null;
        if (correct === null || correct === undefined) return beliefPaymentMax;
        const nearestCategory = Math.round(correct / 10) * 10;
        const absoluteDifference = Math.abs(nearestCategory - userValue) / 10;
        return beliefPaymentMax - (absoluteDifference * beliefPaymentIncentive);
      });

      return {
        beliefPayment, beliefPaymentSlider1, beliefPaymentSlider2,
        correctAnswers, correctAnswersSlider1, correctAnswersSlider2
      };
    }
  </script>

    // =============== PIE CHART ===============
    function PieChart({ value, onChange, highlightColor }) {
      const UNFILLED_COLOR = '#e5e7eb';
      const FILLED_COLOR = highlightColor || getThemeHexColor();

      const polarToCartesian = (cx, cy, radius, angle) => {
        const rad = (angle - 90) * Math.PI / 180;
        return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
      };

      const createSegmentPath = (index, innerRadius, outerRadius) => {
        const startAngle = index * 36;
        const endAngle = (index + 1) * 36;
        const start = polarToCartesian(0, 0, outerRadius, startAngle);
        const end = polarToCartesian(0, 0, outerRadius, endAngle);
        const startInner = polarToCartesian(0, 0, innerRadius, startAngle);
        const endInner = polarToCartesian(0, 0, innerRadius, endAngle);
        return `M ${start.x} ${start.y} A ${outerRadius} ${outerRadius} 0 0 1 ${end.x} ${end.y} L ${endInner.x} ${endInner.y} A ${innerRadius} ${innerRadius} 0 0 0 ${startInner.x} ${startInner.y} Z`;
      };

      const handleClick = (index) => {
        const filledCount = value !== null ? value / 10 : 0;
        if (filledCount === 1 && index === 0) onChange(0);
        else onChange((index + 1) * 10);
      };

      const filledCount = value !== null ? value / 10 : 0;

      return (
        <div className="flex flex-col items-center">
          <svg viewBox="-130 -130 260 260" className="w-56 h-56">
            {[...Array(10)].map((_, i) => {
              const midAngle = (i * 36 + 18) - 90;
              const labelRadius = 115;
              const labelX = Math.cos(midAngle * Math.PI / 180) * labelRadius;
              const labelY = Math.sin(midAngle * Math.PI / 180) * labelRadius;
              return (
                <g key={i}>
                  <path
                    d={createSegmentPath(i, 35, 95)}
                    fill={i < filledCount ? FILLED_COLOR : UNFILLED_COLOR}
                    stroke="white"
                    strokeWidth="2"
                    className="pie-segment"
                    onClick={() => handleClick(i)}
                  />
                  <text x={labelX} y={labelY} textAnchor="middle" dominantBaseline="middle" className="text-xs fill-gray-500 pointer-events-none">
                    {(i + 1) * 10}%
                  </text>
                </g>
              );
            })}
            <text x="0" y="8" textAnchor="middle" className="text-2xl font-bold fill-gray-700">
              {value !== null ? `${value}%` : '?%'}
            </text>
          </svg>
        </div>
      );
    }

    // =============== VERBAL SCALE ===============
    function VerbalScale({ value, onChange, options, increasingOrder }) {

              value === 10 ? `${getThemeClassesLocal().buttonBg} text-white border-transparent` : 'bg-white border-gray-200 hover:border-gray-300'
            }`}
            onClick={() => onChange(10)}

    // =============== VARIABLE PANEL ===============
    function VariablePanel({ causalElicit, exoButton, stage, pie1Value, pie2Value, playerName0, playerName1, playerName2Pos, playerName2Neg, highlightPanel, isWalkthrough, highlightButton, showArrow }) {
      const isMig = CONFIG.supergame === 'migraines';

      const getVariableStates = () => {
        let aState = 'neutral', xState = 'neutral', yState = 'neutral';

        if (isWalkthrough) {
          if (causalElicit === 'AX') {
            aState = 'cause'; xState = 'question';
            if (exoButton === 0) yState = 'fixed-off';
            else if (exoButton === 1) yState = 'fixed-on';
          } else if (causalElicit === 'AY') {
            aState = 'cause'; yState = 'question';
            if (exoButton === 0) xState = 'fixed-off';
            else if (exoButton === 1) xState = 'fixed-on';
          } else if (causalElicit === 'XY') {
            xState = 'cause'; yState = 'question';
            if (exoButton === 0) aState = 'fixed-off';
            else if (exoButton === 1) aState = 'fixed-on';
          } else if (causalElicit === 'YX') {
            yState = 'cause'; xState = 'question';
            if (exoButton === 0) aState = 'fixed-off';
            else if (exoButton === 1) aState = 'fixed-on';
          } else if (causalElicit === 'XA') {
            xState = 'cause'; aState = 'question';
            if (exoButton === 0) yState = 'fixed-off';
            else if (exoButton === 1) yState = 'fixed-on';
          }
          return { aState, xState, yState };
        }

        if (causalElicit === 'AX') {
          if (stage === 1) aState = 'off';
          else if (stage === 2) aState = 'on';
          else aState = 'cause';
          xState = 'question';
          if (exoButton === 0) yState = 'fixed-off';
          else if (exoButton === 1) yState = 'fixed-on';
        } else if (causalElicit === 'AY') {
          if (stage === 1) aState = 'off';
          else if (stage === 2) aState = 'on';
          else aState = 'cause';
          yState = 'question';
          if (exoButton === 0) xState = 'fixed-off';
          else if (exoButton === 1) xState = 'fixed-on';
        } else if (causalElicit === 'XY') {
          if (stage === 1) xState = 'off';
          else if (stage === 2) xState = 'on';
          else xState = 'cause';
          yState = 'question';
          if (exoButton === 0) aState = 'fixed-off';
          else if (exoButton === 1) aState = 'fixed-on';
        } else if (causalElicit === 'YX') {
          if (stage === 1) yState = 'off';
          else if (stage === 2) yState = 'on';
          else yState = 'cause';
          xState = 'question';
          if (exoButton === 0) aState = 'fixed-off';
          else if (exoButton === 1) aState = 'fixed-on';
        } else if (causalElicit === 'XA') {
          if (stage === 1) xState = 'off';
          else if (stage === 2) xState = 'on';
          else xState = 'cause';
          aState = 'question';
          if (exoButton === 0) yState = 'fixed-off';
          else if (exoButton === 1) yState = 'fixed-on';
        }
        return { aState, xState, yState };
      };

      const { aState, xState, yState } = getVariableStates();

      const highlightPanels = Array.isArray(highlightPanel) ? highlightPanel : (highlightPanel ? [highlightPanel] : []);
      const isAHighlighted = highlightPanels.includes('A');
      const isXHighlighted = highlightPanels.includes('X');
      const isYHighlighted = highlightPanels.includes('Y');

      // ----- Drink/Skip buttons (A) -----
      const DrinkPanel = ({ state, highlightButton }) => {
        const theme = getThemeClassesLocal();
        const isOn = state === 'on' || state === 'fixed-on';
        const isOff = state === 'off' || state === 'fixed-off';
        const isQuestion = state === 'question';
        const isCause = state === 'cause';
        const isNeutral = state === 'neutral';

        const drinkSelected = isOn;
        const skipSelected = isOff;
        const drinkActive = isOn || isCause || isNeutral || isQuestion;
        const skipActive = isOff || isCause || isNeutral || isQuestion;

        const drinkHighlight = (highlightButton === 'drink' || highlightButton === 'both') ? 'ring-4 ring-yellow-400 ring-offset-2 ring-offset-white' : '';
        const skipHighlight = (highlightButton === 'skip' || highlightButton === 'both') ? 'ring-4 ring-yellow-400 ring-offset-2 ring-offset-white' : '';

        // Migraines: Drink=red, Skip=green. Dieter: Drink=green, Skip=red.
        const drinkColor = isMig ? 'red' : 'green';
        const skipColor = isMig ? 'green' : 'red';
        const colorClass = (color, shade) => `bg-${color}-${shade}`;
        const ringClass = (color, shade) => `ring-${color}-${shade}`;
        const borderClass = (color, shade) => `border-${color}-${shade}`;

        // Drink cost text: migraines uses X-conditional payoff; dieter is static.
        let drinkPayoffText;
        if (isMig) {
          const xIsOn = xState === 'on' || xState === 'fixed-on';
          const xIsOff = xState === 'off' || xState === 'fixed-off';
          drinkPayoffText = xIsOn
            ? `+${CONFIG.currency}${CONFIG.aCost}`
            : xIsOff
              ? `-${CONFIG.currency}${CONFIG.aCost}`
              : `±${CONFIG.currency}${CONFIG.aCost}`;
        } else {
          drinkPayoffText = `-${CONFIG.currency}${CONFIG.aCost}`;
        }

        const decisionLabel = isMig ? 'Decision' : 'Morning Decision';

        return (
          <div className="flex flex-col items-center">
            <div className="text-xs text-gray-500 mb-1 h-4">{decisionLabel}</div>
            <div className="flex gap-3 items-center mt-4">
              {/* Drink button */}
              <div className={`relative w-28 h-24 px-2 py-2 rounded-xl font-bold transition-all flex flex-col items-center justify-center gap-1 border-2 ${
                drinkSelected
                  ? `${colorClass(drinkColor, 600)} ${borderClass(drinkColor, 600)} shadow-md`
                  : drinkActive
                    ? `${colorClass(drinkColor, 500)} ${borderClass(drinkColor, 500)} shadow-md`
                    : 'bg-gray-100 border-gray-200'
              } ${drinkHighlight}`}>
                <DrinkIcon className={`w-8 h-8 ${drinkActive ? theme.iconColor : 'text-gray-400'}`} drinkName={playerName0} />
                <div className={`text-sm ${drinkActive ? 'text-white' : 'text-gray-300'}`}>{drinkPayoffText}</div>
                <div className={`text-[9px] whitespace-nowrap ${drinkActive ? 'text-white' : 'text-gray-400'}`}>Drink {playerName0}</div>
              </div>
              {/* Skip button */}
              <div className={`relative w-28 h-24 px-2 py-2 rounded-xl font-bold transition-all flex flex-col items-center justify-center gap-1 border-2 ${
                skipSelected
                  ? `${colorClass(skipColor, 600)} ${borderClass(skipColor, 600)} shadow-md`
                  : skipActive
                    ? `${colorClass(skipColor, 500)} ${borderClass(skipColor, 500)} shadow-md`
                    : 'bg-gray-100 border-gray-200'
              } ${skipHighlight}`}>
                <SkipIcon className={`w-8 h-8 ${skipActive ? 'text-white' : 'text-gray-400'}`} />
                <div className={`text-sm ${skipActive ? 'text-white' : 'text-gray-300'}`}>{CONFIG.currency}0</div>
                <div className={`text-[9px] ${skipActive ? 'text-white' : 'text-gray-400'}`}>Skip</div>

      // ----- BioClip machine (dieter X-panel) -----
      const MachinePanel = ({ state }) => {
        const isOn = state === 'on' || state === 'fixed-on';
        const isOff = state === 'off' || state === 'fixed-off';
        const isQuestion = state === 'question';
        const isCause = state === 'cause';
        const isAYOrder = CONFIG.order === 'AY';

        const getStatusColor = () => {
          if (isAYOrder && !isOn && !isOff) return '#475569';
          if (isOn) return '#22c55e';
          if (isOff) return '#ef4444';
          if (isQuestion || isCause) return '#64748b';
          return '#64748b';
        };
        const getStatusBg = () => {
          if (isOn) return '#14532d';
          if (isOff) return '#7f1d1d';
          return '#1e293b';
        };
        const getStatusText = () => {
          if (isOn) return 'NORMAL';
          if (isOff) return 'ABNORMAL';
          if (isAYOrder) return null;
          return 'READING...';
        };

        return (
          <div className="flex flex-col items-center">
            <div className="text-xs text-gray-500 mb-1 h-4">{playerName1} Level</div>
            <div className="relative flex items-center justify-center h-32">
              <svg viewBox="0 0 120 160" className="w-24 h-32">
                <rect x="10" y="10" width="100" height="140" rx="12" fill="#0f172a" stroke="#334155" strokeWidth="2" />
                <rect x="18" y="20" width="84" height="100" rx="6" fill="#1e293b" />
                <rect x="22" y="24" width="76" height="92" rx="4" fill={getStatusBg()} className="transition-all duration-500" />
                <circle cx="60" cy="55" r="24" fill={getStatusColor()} className="transition-all duration-300">
                  {isQuestion && <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite" />}
                </circle>
                {isOn && (
                  <path d="M48 55 L56 63 L72 47" stroke="white" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round" />
                )}
                {isOff && (
                  <g stroke="white" strokeWidth="4" strokeLinecap="round">
                    <line x1="50" y1="45" x2="70" y2="65" />
                    <line x1="70" y1="45" x2="50" y2="65" />
                  </g>
                )}
                {isQuestion && (
                  <text x="60" y="62" textAnchor="middle" fill="white" fontSize="28" fontWeight="bold">?</text>
                )}
                {isAYOrder && !isOn && !isOff ? (
                  <text x="60" y="93" textAnchor="middle" fill="#94a3b8" fontSize="9" fontWeight="bold">
                    <tspan x="60" dy="0">SUBSCRIPTION</tspan>
                    <tspan x="60" dy="12">EXPIRED</tspan>
                  </text>
                ) : (
                  <text x="60" y="100" textAnchor="middle" fill={isOn || isOff ? 'white' : '#64748b'} fontSize="11" fontWeight="bold">
                    {getStatusText()}
                  </text>
                )}
                <rect x="30" y="126" width="60" height="18" rx="4" fill="#334155" />
                <text x="60" y="139" textAnchor="middle" fill="#94a3b8" fontSize="10" fontFamily="monospace">BioClip™</text>
                <path d="M0 50 L10 50 L10 110 L0 110 C-4 110 -6 105 -6 100 L-6 60 C-6 55 -4 50 0 50 Z" fill="#475569" />
              </svg>
            </div>
          </div>
        );
      };

      // ----- Morning panel (migraines X-panel) -----
      const MorningPanel = ({ state }) => {
        const isOn = state === 'on' || state === 'fixed-on';
        const isOff = state === 'off' || state === 'fixed-off';
        const isQuestion = state === 'question';
        const X = isOn ? 1 : isOff ? 0 : null;

        return (
          <div className="flex flex-col items-center">
            <div className="text-xs text-gray-500 mb-1 h-4">Morning</div>
            <div className="relative flex items-center justify-center h-24">
              <MorningIcon className="w-24 h-24 text-gray-700" drinkName={playerName0} X={X} />
            </div>
            <div className={`${isQuestion ? 'text-2xl leading-none' : 'text-sm'} font-bold text-gray-900 mt-1 h-6 flex items-center justify-center`}>
              {isQuestion ? '?' : X === 1 ? 'Craving' : X === 0 ? 'NO craving' : ' '}
            </div>
          </div>
        );
      };

      // ----- Outcome icon (Y) -----
      const OutcomePanel = ({ state }) => {
        const isOn = state === 'on' || state === 'fixed-on';
        const isOff = state === 'off' || state === 'fixed-off';
        const isQuestion = state === 'question';

        const getIcon = () => {
          if (isOn) return <HappyFaceIcon className="w-10 h-10 text-white" />;
          if (isOff) return <SadFaceIcon className="w-10 h-10 text-white" />;
          if (isQuestion) return <NeutralFaceIcon className="w-10 h-10 text-gray-500" />;
          return <NeutralFaceIcon className="w-10 h-10 text-gray-400 opacity-30" />;
        };
        const getStatusText = () => {
          if (isOn) return playerName2Pos.charAt(0).toUpperCase() + playerName2Pos.slice(1) + '!';
          if (isOff) return playerName2Neg.charAt(0).toUpperCase() + playerName2Neg.slice(1);
          if (isQuestion) return '?';
          return '';
        };
        const getCircleStyle = () => {
          if (isOn) return 'bg-gradient-to-br from-emerald-400 to-green-600';
          if (isOff) return 'bg-gradient-to-br from-rose-400 to-red-600';
          return 'bg-gray-200';
        };

        // Migraines enlarges the "?" label; dieter keeps text-sm.
        const statusClasses = (isMig && isQuestion)
          ? 'text-2xl leading-none font-bold text-gray-900'
          : 'text-sm font-bold text-gray-900';

        return (
          <div className="flex flex-col items-center">
            <div className="text-xs text-gray-500 mb-1 h-4">{(!isMig && CONFIG.order === 'AYX') ? 'Shortly After...' : 'Later this day...'}</div>
            <div className="relative h-32 flex flex-col items-center justify-center">
              <div className={`w-20 h-20 rounded-full flex-shrink-0 flex items-center justify-center transition-all duration-500 ${getCircleStyle()}`}>
                {getIcon()}
              </div>
              <div className="text-center mt-2">
                <span className={statusClasses}>{getStatusText()}</span>
              </div>
            </div>
          </div>
        );
      };

      // ----- Rectangular arrow -----
      const RectArrow = () => {
        // Panel centers depend on supergame (and order for dieter)
        // Dieter AYX swaps X and Y positions: Y in the middle, X on the right
        const isAYXDieter = !isMig && CONFIG.order === 'AYX';
        const { aCenter, xCenter, yCenter } = isMig
          ? { aCenter: 48, xCenter: 18, yCenter: 86 }
          : isAYXDieter
            ? { aCenter: 21, xCenter: 86, yCenter: 56 }
            : { aCenter: 21, xCenter: 56, yCenter: 86 };

        // Generic arrow renderer: arrow runs from `fromPct` → `toPct`
        const renderArrow = (fromPct, toPct, idSuffix) => {
          const leftPct = Math.min(fromPct, toPct);
          const widthPct = Math.abs(toPct - fromPct);
          const headOnRight = toPct > fromPct;
          const path = headOnRight
            ? 'M 0 46 L 0 6 L 100 6 L 100 36'
            : 'M 100 46 L 100 6 L 0 6 L 0 36';
          // Fixed-pixel arrowhead sized in CSS units so it stays consistent across devices,
          // independent of the non-uniformly stretched SVG below it.
          const headW = 20, headH = 16;
          const arrowheadStyle = {
            top: `${(36 / 48) * 100}%`,
            [headOnRight ? 'right' : 'left']: `-${headW / 2}px`,
            pointerEvents: 'none',
          };
          return (
            <div className="absolute top-0 h-12 flex items-start" style={{ left: `${leftPct}%`, width: `${widthPct}%` }}>
              <svg className="w-full h-full overflow-visible" viewBox="0 0 100 48" preserveAspectRatio="none">
                <path d={path} stroke="#f59e0b" strokeWidth="4" fill="none" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
              </svg>
              {/* Fixed-pixel-size arrowhead overlay positioned at the path endpoint */}
              <svg width={headW} height={headH} viewBox={`0 0 ${headW} ${headH}`} className="absolute overflow-visible" style={arrowheadStyle}>
                <polygon points={`0,0 ${headW},0 ${headW / 2},${headH}`} fill="#f59e0b" />
              </svg>
              <span className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/3 text-amber-500 text-5xl bg-gray-50 px-2">?</span>
            </div>
          );
        };

        if (causalElicit === 'AX') return renderArrow(aCenter, xCenter, 'ax');
        if (causalElicit === 'AY') return renderArrow(aCenter, yCenter, 'ay');
        if (causalElicit === 'XY') return renderArrow(xCenter, yCenter, 'xy');
        if (causalElicit === 'YX') return renderArrow(yCenter, xCenter, 'yx');
        if (causalElicit === 'XA') return renderArrow(xCenter, aCenter, 'xa');
        return null;

        const stepKey = `step${walkthroughStep}`;
        const highlightKey = config.walkthroughHighlight[stepKey];
        if (walkthroughStep === 0 && !config.walkthroughStep0) {
          return { text: config.walkthroughStep1, highlight: config.walkthroughHighlight.step1, skipToStep1: true };
        }
        const texts = { 0: config.walkthroughStep0, 1: config.walkthroughStep1, 2: config.walkthroughStep2 };
        return { text: texts[walkthroughStep], highlight: highlightKey, skipToStep1: false };
      };

      const walkthroughContent = getWalkthroughContent();

      const handleWalkthroughNext = () => {
        if (walkthroughStep === 0 && walkthroughContent.skipToStep1) {
          setWalkthroughStep(1);
          return;
        }
        if (walkthroughStep < 2) {
          setWalkthroughStep(walkthroughStep + 1);
        } else {
          setStage(skipPieCharts ? 3 : 1);
        }
      };

      return (
        <div className="min-h-screen bg-white px-4 pt-0 pb-4">
          <div className="max-w-5xl mx-auto">
            {!skipIntro && (
              <div className="mb-6">
                <div className="flex justify-between text-sm text-gray-600 mb-2">
                  <span>Question {questionNumber} of {totalQuestions}</span>
                  <span>{Math.round((questionNumber / totalQuestions) * 100)}%</span>
                </div>
                <div className="h-2 bg-gray-300 rounded-full overflow-hidden">
                  <div className={`h-full ${getThemeClassesLocal().buttonBg} transition-all duration-300`} style={{ width: `${(questionNumber / totalQuestions) * 100}%` }} />
                </div>
              </div>
            )}

            <div className="bg-white rounded-xl shadow-lg p-6">
              {stage === 0 && (
                <div className="animate-fadeIn">
                  {skipIntro && (
                    <h2 className="text-2xl font-bold text-gray-800 text-center mb-4">
                      Before making your decisions for the rest of the weeks for this drink...<br />Please answer the following question.
                    </h2>
                  )}

                  {skipIntro && (
                    <div className="mb-4">
                      <p className="text-gray-600 text-sm">
                        If this question is randomly selected to determine your bonus payment, you will receive {CONFIG.currency}{Number(CONFIG.beliefPaymentMax).toFixed(0)} if your report is accurate. The less accurate your report, the lower this bonus will be.{' '}
                        {!showPaymentDetails && (
                          <button onClick={() => setShowPaymentDetails(true)} className={`${getThemeClassesLocal().pillText} hover:opacity-80 underline`}>
                            Show details
                          </button>
                        )}
                      </p>
                      {showPaymentDetails && (
                        <div className="bg-gray-50 rounded-lg p-4 mt-3 text-sm text-gray-700">
                          <p className="font-bold mb-2">How is my payment determined if this part counts?</p>
                          <p>
                            You will earn up to <strong>{CONFIG.currency}{Number(CONFIG.beliefPaymentMax).toFixed(0)}</strong>. Your bonus shrinks by <strong>{CONFIG.currency}{Number(CONFIG.beliefPaymentIncentive).toFixed(2)}</strong> for each step away from the correct answer: on the wheel, for each <strong>segment</strong>; in the list of options, for each <strong>option</strong>.
                          </p>
                        </div>
                      )}
                    </div>
                  )}

                  {skipIntro && !isMig && causalElicit === 'XY' && (
                    <div className="text-gray-700 space-y-3 mb-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                      <p>This question asks what will happen if your {playerName1} level are set by one of two treatments:</p>
                      <ul className="list-disc list-inside space-y-1 ml-4">
                        <li><strong>{playerName1}-normal-injection</strong> normalizes your {playerName1} level <strong>for sure</strong>.</li>
                        <li><strong>{playerName1}-abnormal-injection</strong> makes your {playerName1} levels abnormal <strong>for sure</strong>.</li>
                      </ul>
                      <p>These treatments have <i>no direct effects</i> on how you feel. However, <i>if</i> how you feel is a response of your body to your {playerName1} level, you may feel different if you receive {playerName1}-normal-injection or {playerName1}-abnormal-injection.</p>
                    </div>
                  )}

                  <div key={walkthroughStep} className="border border-yellow-200 rounded-lg p-4 mb-4 animate-blink">
                    <p className="text-gray-700 text-center text-lg" dangerouslySetInnerHTML={{ __html: walkthroughContent.text }} />
                  </div>

                  <VariablePanel
                    causalElicit={causalElicit} exoButton={exoButton} stage={stage}
                    pie1Value={pie1Value} pie2Value={pie2Value}
                    playerName0={playerName0} playerName1={playerName1}
                    playerName2Pos={playerName2Pos} playerName2Neg={playerName2Neg}
                    highlightPanel={walkthroughContent.highlight}
                    isWalkthrough={true} highlightButton={null}
                    showArrow={!skipPieCharts ? false : walkthroughStep === 2}
                  />

                  <div className="flex justify-center">
                    <button onClick={handleWalkthroughNext} className="px-8 py-3 rounded-lg font-medium text-lg transition-all bg-yellow-500 hover:bg-yellow-600 text-white">
                      {walkthroughStep === 2 ? 'I understand this scenario →' : 'Continue'}
                    </button>
                  </div>
                </div>
              )}

              {stage >= 1 && (
                <>
                  <VariablePanel
                    causalElicit={causalElicit} exoButton={exoButton} stage={stage}
                    pie1Value={pie1Value} pie2Value={pie2Value}
                    playerName0={playerName0} playerName1={playerName1}
                    playerName2Pos={playerName2Pos} playerName2Neg={playerName2Neg}
                    highlightPanel={(stage === 1 || stage === 2 || stage === 3) ? [config.causePanel, config.outcomePanel] : null}
                    isWalkthrough={false}
                    highlightButton={null}
                    showArrow={!skipPieCharts ? stage === 3 : true}
                  />

                  <div className="border-t border-gray-200 my-6" />

                  {!skipPieCharts && (
                    <div className="flex justify-center mb-4">
                      <div className="flex items-center gap-2">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${stage === 1 ? `${getThemeClassesLocal().buttonBg} text-white` : 'bg-gray-300 text-gray-500'}`}>1</div>
                        <div className={`w-12 h-1 bg-gray-300`} />
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${stage === 2 ? `${getThemeClassesLocal().buttonBg} text-white` : 'bg-gray-300 text-gray-500'}`}>2</div>
                        <div className={`w-12 h-1 bg-gray-300`} />
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${stage === 3 ? `${getThemeClassesLocal().buttonBg} text-white` : 'bg-gray-300 text-gray-500'}`}>3</div>
                      </div>
                    </div>
                  )}

                  <div>
                    {stage === 1 && (
                      <div className="animate-fadeIn">
                        <p className="text-gray-700 text-center mb-6" dangerouslySetInnerHTML={{ __html: config.pie1Question }} />
                        <div className="flex justify-center mb-6">
                          <PieChart value={pie1Value} onChange={setPie1Value} highlightColor={config.pie1Color} />
                        </div>
                        <div className="flex justify-center">
                          <button
                            onClick={() => setStage(2)}
                            disabled={!canProceedToStage2 || !showNextButton}
                            className={`px-8 py-3 rounded-lg font-medium text-lg ${showNextButton ? 'opacity-100 transition-opacity duration-[2000ms] ease-in' : 'opacity-0 pointer-events-none'} ${canProceedToStage2 ? `${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white` : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                          >Continue</button>
                        </div>
                      </div>
                    )}

                    {stage === 2 && (
                      <div className="animate-fadeIn">
                        <p className="text-gray-700 text-center mb-6" dangerouslySetInnerHTML={{ __html: config.pie2Question }} />
                        <div className="flex justify-center mb-6">
                          <PieChart value={pie2Value} onChange={setPie2Value} highlightColor={config.pie2Color} />
                        </div>
                        <div className="flex justify-center gap-4">
                          <button onClick={() => setStage(1)} className="px-6 py-3 rounded-lg font-medium text-lg transition-all bg-gray-200 hover:bg-gray-300 text-gray-700">← Back</button>
                          <button
                            onClick={() => setStage(3)}
                            disabled={!canProceedToStage3 || !showNextButton}
                            className={`px-8 py-3 rounded-lg font-medium text-lg ${showNextButton ? 'opacity-100 transition-opacity duration-[2000ms] ease-in' : 'opacity-0 pointer-events-none'} ${canProceedToStage3 ? `${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white` : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                          >Continue</button>
                        </div>
                      </div>
                    )}

                    {stage === 3 && (
                      <div className="animate-fadeIn">
                        <p className="text-gray-700 text-center mb-4" dangerouslySetInnerHTML={{ __html: config.verbalQuestion }} />
                        <div className="max-w-2xl mx-auto">
                          <VerbalScale value={verbalValue} onChange={setVerbalValue} options={verbalOptions} increasingOrder={increasingOrder === 1} />
                        </div>
                        <div className="flex justify-center gap-4 mt-4">
                          {!skipPieCharts && (
                            <button onClick={() => setStage(2)} className="px-6 py-3 rounded-lg font-medium text-lg transition-all bg-gray-200 hover:bg-gray-300 text-gray-700">← Back</button>
                          )}
                          <button
                            onClick={handleSubmit}
                            disabled={!canSubmit || !showNextButton}
                            className={`px-8 py-3 rounded-lg font-medium text-lg ${showNextButton ? 'opacity-100 transition-opacity duration-[2000ms] ease-in' : 'opacity-0 pointer-events-none'} ${canSubmit ? `${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white` : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                          >Submit</button>
                        </div>
                      </div>
                    )}
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // =============== INTRO PAGE ===============
    function IntroPage({ onContinue }) {
      const isMig = CONFIG.supergame === 'migraines';
      const [showDetails, setShowDetails] = useState(false);
      const [introStep, setIntroStep] = useState(0);
      const [showNextButton, setShowNextButton] = useState(false);

      useEffect(() => {
        setShowNextButton(false);
        const timer = setTimeout(() => setShowNextButton(true), 3000);
        return () => clearTimeout(timer);
      }, [introStep]);

      const handleNextStep = () => setIntroStep(prev => prev + 1);

      // Step 0 paragraph differs slightly by supergame (and by order for dieter)
      const step0Content = CONFIG.order === 'AY' ? (
        <>The next decision screen will ask about how your decision to drink <strong>{CONFIG.playerName0}</strong> is related to <strong>how you feel</strong>.</>
      ) : isMig ? (
        <>What do you believe about the relationship between <strong>cravings (or not)</strong>, your decision to drink <strong>{CONFIG.playerName0}</strong>, and <strong>how you feel</strong>? To answer this question, each of the next {CONFIG.mainCausals.length} decision screens show you a different scenario.</>
      ) : CONFIG.order === 'AYX' ? (
        <>What do you believe about the relationship between your decision to drink <strong>{CONFIG.playerName0}</strong>, <strong>how you feel</strong>, and your <strong>{CONFIG.playerName1} level</strong>? To answer this question, each of the next {CONFIG.mainCausals.length} decision screens show you a different scenario.</>
      ) : (
        <>What do you believe about the relationship between your decision to drink <strong>{CONFIG.playerName0}</strong>, your <strong>{CONFIG.playerName1} level</strong>, and <strong>how you feel</strong>? To answer this question, each of the next {CONFIG.mainCausals.length} decision screens show you a different scenario.</>
      );

      // Step 1 (X-intervention intro) differs by supergame
      const step1Block = isMig ? (
        <div className="text-gray-700 space-y-4 mb-6 fade-in">
          <p>Some scenarios ask what will happen if your cravings are switched on or off by one of these two medicines:</p>
          <ul className="list-disc list-inside space-y-2 ml-4 mb-4">
            <li><strong>CraveOn</strong> makes you crave <strong>for sure</strong>.</li>
            <li><strong>CraveOff</strong> makes you not crave <strong>for sure</strong>.</li>
          </ul>
          <p>These medicines have <i>no direct effects</i> on how you feel. However, <i>if</i> how you feel is a response of your body to your cravings, you may feel different if you take CraveOn or CraveOff.</p>
        </div>
      ) : (
        <div className="text-gray-700 space-y-4 mb-6 fade-in">
          <p>Some scenarios ask what will happen if your {CONFIG.playerName1} level are set by one of two treatments:</p>
          <ul className="list-disc list-inside space-y-2 ml-4 mb-4">
            <li><strong>{CONFIG.playerName1}-normal-injection</strong> normalizes your {CONFIG.playerName1} level <strong>for sure</strong>.</li>
            <li><strong>{CONFIG.playerName1}-abnormal-injection</strong> makes your {CONFIG.playerName1} levels abnormal <strong>for sure</strong>.</li>
          </ul>
          <p>These treatments have <i>no direct effects</i> on how you feel. However, <i>if</i> how you feel is a response of your body to your {CONFIG.playerName1} level, you may feel different if you receive {CONFIG.playerName1}-normal-injection or {CONFIG.playerName1}-abnormal-injection.</p>
        </div>
      );

      // Step 2 (Y-intervention intro) differs slightly by supergame
      const step2Block = isMig ? (
        <div className="text-gray-700 space-y-4 mb-6 fade-in">
          <p>Other scenarios ask what will happen if how you feel is fixed by one of two other medications:</p>
          <ul className="list-disc list-inside space-y-2 ml-4 mb-4">
            <li><strong>{CONFIG.playerName2PosExo}</strong> makes you {CONFIG.playerName2Pos} for sure.</li>
            <li><strong>{CONFIG.playerName2NegExo}</strong> makes you {CONFIG.playerName2Neg} for sure.</li>
          </ul>
          <p>These medications do not directly affect whether you experience cravings. However, <i>if</i> craving is a response of your body to feeling {CONFIG.playerName2Neg} or {CONFIG.playerName2Pos}, taking {CONFIG.playerName2PosExo} or {CONFIG.playerName2NegExo} may affect whether you experience cravings.</p>
        </div>
      ) : (
        <div className="text-gray-700 space-y-4 mb-6 fade-in">
          <p>Other scenarios ask what will happen if how you feel is fixed by one of two other medications:</p>
          <ul className="list-disc list-inside space-y-2 ml-4 mb-4">
            <li><strong>{CONFIG.playerName2PosExo}</strong> makes you {CONFIG.playerName2Pos} for sure.</li>
            <li><strong>{CONFIG.playerName2NegExo}</strong> makes you {CONFIG.playerName2Neg} for sure.</li>
          </ul>
          <p>These medications have <i>no direct effects</i> on your {CONFIG.playerName1} levels. However, <i>if</i> {CONFIG.playerName1} is a response of your body to feeling {CONFIG.playerName2Neg} or {CONFIG.playerName2Pos}, you may see your {CONFIG.playerName1} level change if you consume {CONFIG.playerName2PosExo} or {CONFIG.playerName2NegExo}.</p>
        </div>
      );

      const NextStepButton = ({ onClick }) => (
        <div className="flex justify-end mb-6">
          <button
            onClick={onClick}
            disabled={!showNextButton}
            className={`px-8 py-3 ${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white font-medium text-lg rounded-lg ${showNextButton ? 'opacity-100 transition-opacity duration-[2000ms] ease-in' : 'opacity-0 pointer-events-none'}`}
          >Continue</button>
        </div>
      );

      return (
        <div className="min-h-screen bg-white px-4 pt-0 pb-4">
          <div className="max-w-5xl mx-auto">
            <div className="p-8">
              <div className="text-center mb-6">
                <div className="flex items-center justify-center gap-3 mb-4">
                  <h1 className="text-2xl font-bold text-gray-800">Your Beliefs About Cause and Effect</h1>
                </div>
              </div>

              {/* Step 0 */}
              <div className="text-gray-700 space-y-4 mb-6">
                <p>{step0Content}</p>
              </div>
              {introStep === 0 && <NextStepButton onClick={handleNextStep} />}

              {/* Step 1 — first intervention intro (X-intervention by default, Y-intervention for AYX) */}
              {CONFIG.order !== 'AY' && introStep >= 1 && (CONFIG.order === 'AYX' ? step2Block : step1Block)}
              {CONFIG.order !== 'AY' && introStep === 1 && <NextStepButton onClick={handleNextStep} />}

              {/* Step 2 — second intervention intro (Y-intervention by default, X-intervention for AYX) */}
              {CONFIG.order !== 'AY' && introStep >= 2 && (CONFIG.order === 'AYX' ? step1Block : step2Block)}
              {CONFIG.order !== 'AY' && introStep === 2 && <NextStepButton onClick={handleNextStep} />}

              {/* Final step — payment info */}
              {((CONFIG.order === 'AY' && introStep >= 1) || (CONFIG.order !== 'AY' && introStep >= 3)) && (
                <div className="fade-in">
                  <div className="text-gray-700 space-y-4 mb-6">
                    <p>
                      One of your responses in this part may randomly be chosen to determine your bonus payment. If so, then you will receive {CONFIG.currency}{CONFIG.beliefPaymentMax} if your report is accurate. The less accurate your report, the lower this bonus will be. The payment system is designed such that it is in your own interest to report your beliefs truthfully.
                    </p>
                  </div>

                  {!showDetails && (
                    <button onClick={() => setShowDetails(true)} className={`${getThemeClassesLocal().pillText} hover:opacity-80 underline mb-6 block`}>
                      Show payment details
                    </button>
                  )}

                  {showDetails && (
                    <div className="bg-gray-50 rounded-lg p-6 mb-6 text-sm text-gray-700">
                      <p className="font-bold mb-3">How is my payment determined if this part counts?</p>
                      <p>
                        You will earn up to <strong>{CONFIG.currency}{CONFIG.beliefPaymentMax}</strong>. Your bonus shrinks by <strong>{CONFIG.currency}{CONFIG.beliefPaymentIncentive}</strong> for each step away from the correct answer: on the wheel, for each <strong>segment</strong>; in the list of options, for each <strong>option</strong>.
                      </p>
                    </div>
                  )}

                  <div className="flex justify-end">
                    <button
                      onClick={onContinue}
                      disabled={!showNextButton}
                      className={`px-8 py-3 ${getThemeClassesLocal().buttonBg} ${getThemeClassesLocal().buttonHover} text-white font-medium text-lg rounded-lg ${showNextButton ? 'opacity-100 transition-opacity duration-[2000ms] ease-in' : 'opacity-0 pointer-events-none'}`}
                    >Continue</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // =============== APP SHELL ===============
    function CausalBeliefApp() {
      const [ready, setReady] = useState(false);
      const [showIntro, setShowIntro] = useState(true);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [allResponses, setAllResponses] = useState([]);
      const [completed, setCompleted] = useState(false);

      useEffect(() => {
        const timeout = setTimeout(() => {
          if (!ready) {
            console.log('Timeout: starting with default config');
            setReady(true);
          }
        }, 3000);

        onInitialized(() => {
          clearTimeout(timeout);
          setReady(true);
          if (CONFIG.skipIntro) setShowIntro(false);
        });

        return () => clearTimeout(timeout);
      }, []);

      const handleComplete = useCallback((response) => {
        const newResponses = [...allResponses, response];
        setAllResponses(newResponses);

        if (currentIndex < CONFIG.mainCausals.length - 1) {
          setCurrentIndex(prev => prev + 1);
          window.scrollTo({ top: 0, behavior: 'smooth' });
          if (window.parent !== window) window.parent.postMessage({ type: 'SCROLL_TO_TOP' }, '*');
        } else {
          setCompleted(true);
          const payments = calculatePayments(newResponses);
          const id = CONFIG.id;
          const beliefHistory = newResponses.map(r => ({
            id: r.id, causalElicit: r.causalElicit, exoButton: r.exoButton,
            pie1Value: r.pie1Value, pie2Value: r.pie2Value,
            verbalValue: r.verbalValue, verbalText: r.verbalText
          }));
          const beliefRoundTimes = newResponses.map(r => r.roundTime);

          sendDataToQualtrics('CAUSAL_BELIEFS', {
            id, responses: newResponses, beliefHistory, beliefRoundTimes,
            beliefPayment: payments.beliefPayment,
            beliefPaymentSlider1: payments.beliefPaymentSlider1,
            beliefPaymentSlider2: payments.beliefPaymentSlider2,
            beliefCorrectAnswer: payments.correctAnswers,
            beliefCorrectAnswerSlider1: payments.correctAnswersSlider1,
            beliefCorrectAnswerSlider2: payments.correctAnswersSlider2,
            pie1Values: newResponses.map(r => r.pie1Value),
            pie2Values: newResponses.map(r => r.pie2Value),
            verbalValues: newResponses.map(r => r.verbalValue),
            beliefs: newResponses.map(r => r.verbalValue),
            increasingOrder: CONFIG.increasingOrder
          });

          console.log('Payments calculated:', payments);
          console.log('beliefHistory:', beliefHistory);
          console.log('beliefRoundTimes:', beliefRoundTimes);

          setTimeout(() => {
            sendDataToQualtrics('ELICIT_COMPLETE', { completed: true, id });
          }, 500);
        }
      }, [allResponses, currentIndex]);

      if (!ready) {
        return (
          <div className="min-h-screen bg-white flex items-start justify-center pt-8">
            <div className="text-gray-600 text-xl">Loading...</div>
          </div>
        );
      }

      if (showIntro) return <IntroPage onContinue={() => setShowIntro(false)} />;
      if (completed) return null;

      const currentScenario = CONFIG.mainCausals[currentIndex];

      return (
        <BeliefElicitation
          key={currentIndex}
          scenario={currentScenario}
          questionNumber={currentIndex + 1}
          totalQuestions={CONFIG.mainCausals.length}
          playerName0={CONFIG.playerName0}
          playerName1={CONFIG.playerName1}
          playerName2Pos={CONFIG.playerName2Pos}
          playerName2Neg={CONFIG.playerName2Neg}
          playerName2PosExo={CONFIG.playerName2PosExo}
          playerName2NegExo={CONFIG.playerName2NegExo}
          increasingOrder={CONFIG.increasingOrder}
          skipIntro={CONFIG.skipIntro}
          onComplete={handleComplete}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CausalBeliefApp />);
  </script>
</body>
</html>
